<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛵 Entregador — O Rei da Coxinha</title>
<meta name="theme-color" content="#1a1a2e">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --primary: #f5a623;
    --primary-glow: rgba(245,166,35,0.3);
    --green: #00e87a;
    --green-glow: rgba(0,232,122,0.25);
    --blue: #3d9cff;
    --red: #ff4757;
    --text: #f0f0f8;
    --text-dim: rgba(240,240,248,0.5);
    --text-muted: rgba(240,240,248,0.28);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

  /* MAPA FULLSCREEN */
  #map { position:fixed; inset:0; width:100%; height:100%; z-index:1; }

  /* ABAS SUPERIORES */
  #tabBar {
    position:fixed;
    top:14px; left:12px;
    display:flex;
    gap:6px;
    z-index:400;
    pointer-events:all;
  }
  .tab-btn {
    padding:8px 14px;
    border:1px solid var(--border);
    border-radius:22px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    background:rgba(10,10,15,0.82);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    color:var(--text-dim);
    transition:all 0.2s;
    font-family:'DM Sans',sans-serif;
    display:flex; align-items:center; gap:5px;
  }
  .tab-btn:active { transform:scale(0.94); }
  .tab-btn.active {
    background:rgba(245,166,35,0.18);
    border-color:rgba(245,166,35,0.45);
    color:var(--primary);
  }
  .tab-btn.inactive {
    background:rgba(10,10,15,0.82);
    color:var(--text-dim);
    border:1px solid var(--border);
  }

  /* INDICADOR GPS — estilo badge antigo */
  #gpsIndicator {
    position:fixed;
    top:14px; right:12px;
    display:flex; align-items:center; gap:6px;
    padding:7px 13px; border-radius:22px;
    font-size:11px; font-weight:700;
    background:rgba(255,71,87,0.12);
    border:1px solid rgba(255,71,87,0.35);
    color:var(--red);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    white-space:nowrap;
    transition:all 0.3s;
    z-index:400;
  }
  #gpsIndicator.ok {
    background:rgba(0,232,122,0.15);
    border-color:rgba(0,232,122,0.35);
    color:var(--green);
  }
  .gps-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--red);
    animation:gpsDot 1.2s ease-in-out infinite;
    flex-shrink:0;
  }
  #gpsIndicator.ok .gps-dot { background:var(--green); }
  @keyframes gpsDot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.7);} }

  /* MARCADORES AVATAR */
  .marker-avatar-wrap {
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer; user-select:none;
  }
  .marker-name {
    background:rgba(18,18,26,0.93);
    color:var(--text);
    font-size:11px; font-weight:700;
    padding:2px 9px;
    border-radius:8px;
    margin-bottom:4px;
    white-space:nowrap;
    backdrop-filter:blur(8px);
    border:1px solid var(--border);
    box-shadow:0 1px 6px rgba(0,0,0,0.5);
    line-height:1.6;
    font-family:'DM Sans',sans-serif;
  }
  .marker-avatar {
    width:44px; height:44px;
    border-radius:50%;
    border:2.5px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 14px rgba(0,0,0,0.55);
    overflow:hidden;
  }
  .marker-avatar.pendente  { background:radial-gradient(circle at 35% 35%, #8878e8, #5040b8); }
  .marker-avatar.ativa     { background:radial-gradient(circle at 35% 35%, #e08838, #b05015); border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-glow),0 3px 14px rgba(0,0,0,0.55); }
  .marker-avatar.entregue  { background:radial-gradient(circle at 35% 35%, #40b870, #1e7848); border-color:var(--green); }
  .marker-avatar svg { width:30px; height:30px; }

  /* MARCADOR MOTO */
  .moto-wrap {
    width:46px; height:46px; border-radius:50%;
    background:rgba(245,166,35,0.15);
    border:2.5px solid rgba(245,166,35,0.5);
    box-shadow:0 0 0 7px var(--primary-glow), 0 3px 16px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    font-size:24px; line-height:1;
  }

  /* FAB MOTO */
  #fabMoto {
    position:fixed; bottom:20px; right:16px;
    width:52px; height:52px; border-radius:50%;
    background:var(--primary);
    border:none;
    box-shadow:0 4px 20px var(--primary-glow);
    font-size:24px; cursor:pointer; z-index:500;
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.2s;
  }
  #fabMoto:active { transform:scale(0.9); }

  /* BÚSSOLA */
  #compass {
    position:fixed; bottom:84px; right:16px;
    width:44px; height:44px; border-radius:50%;
    background:rgba(10,10,15,0.88);
    border:1px solid var(--border);
    backdrop-filter:blur(14px);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; z-index:500;
    box-shadow:0 2px 14px rgba(0,0,0,0.5);
    transition:all 0.2s;
  }
  #compass:active { transform:scale(0.9); }

  /* PAINEL INFERIOR */
  #paradasPanel {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--surface);
    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);
    border-top:1px solid var(--border);
    border-radius:24px 24px 0 0;
    z-index:700;
    display:none; flex-direction:column;
    max-height:75vh;
    box-shadow:0 -8px 40px rgba(0,0,0,0.6);
    transform:translateY(100%);
    transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
    padding-bottom:28px;
  }
  #paradasPanel.show { display:flex; transform:translateY(0); }

  #panelHandle {
    width:40px; height:4px;
    background:rgba(255,255,255,0.15);
    border-radius:2px;
    margin:12px auto 0; flex-shrink:0;
  }
  #panelTitle {
    padding:12px 16px 8px;
    font-family:'Syne',sans-serif;
    font-size:16px; font-weight:900; color:var(--text);
    flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  }
  #panelClose {
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:16px; padding:5px 13px;
    font-size:12px; font-weight:700; cursor:pointer;
    font-family:'DM Sans',sans-serif;
  }

  /* PROGRESS */
  #progressBar {
    height:3px; background:rgba(255,255,255,0.06);
    flex-shrink:0; margin:0 16px 10px; border-radius:10px; overflow:hidden;
  }
  #progressFill {
    height:100%;
    background:linear-gradient(90deg,var(--green),#00c060);
    transition:width 0.5s ease; width:0%; border-radius:10px;
  }

  /* STATUS */
  #statusBar {
    display:grid; grid-template-columns:repeat(4,1fr);
    padding:0 14px 10px; flex-shrink:0;
    border-bottom:1px solid var(--border);
    margin-bottom:6px; gap:8px;
  }
  .status-item {
    background:var(--surface2);
    border-radius:12px; padding:10px 8px; text-align:center;
  }
  .status-num  { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; color:var(--text); }
  .status-label{ font-size:9px; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

  /* LISTA */
  #paradasList {
    overflow-y:auto; padding:6px 12px 8px;
    -webkit-overflow-scrolling:touch;
  }
  #loadingState {
    display:flex; flex-direction:column; align-items:center;
    padding:40px; color:var(--text-muted); gap:12px;
  }
  .spinner {
    width:32px; height:32px;
    border:3px solid rgba(255,255,255,0.06);
    border-top-color:var(--primary);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to{ transform:rotate(360deg); } }
  #emptyState {
    display:none; flex-direction:column; align-items:center;
    padding:40px 20px; text-align:center; color:var(--text-muted);
  }
  #emptyState .emoji { font-size:48px; margin-bottom:12px; opacity:0.5; }
  #emptyState h3 { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--text-dim); margin-bottom:6px; }
  #emptyState p  { font-size:13px; line-height:1.6; }

  /* CARD PARADA */
  .parada-card {
    background:var(--surface2);
    border-radius:16px; padding:12px 14px; margin-bottom:8px;
    border:1px solid var(--border);
    border-left:3px solid rgba(61,156,255,0.5);
    transition:opacity 0.3s;
  }
  .parada-card.entregue { border-left-color:rgba(0,232,122,0.4); opacity:0.45; }
  .parada-card.ativa    { border-left-color:var(--primary); background:rgba(245,166,35,0.07); box-shadow:0 0 0 1px rgba(245,166,35,0.2); }
  .parada-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .parada-num {
    width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:12px; flex-shrink:0;
    background:rgba(61,156,255,0.2); color:var(--blue);
    border:1.5px solid rgba(61,156,255,0.4);
  }
  .parada-card.entregue .parada-num { background:rgba(0,232,122,0.15); color:var(--green); border-color:rgba(0,232,122,0.3); }
  .parada-card.ativa    .parada-num { background:rgba(245,166,35,0.2); color:var(--primary); border-color:rgba(245,166,35,0.4); animation:gpsDot 1.2s infinite; }
  .parada-nome { font-size:14px; font-weight:700; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .parada-end  { font-size:11px; color:var(--text-muted); margin-bottom:8px; line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .parada-info { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
  .badge { font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .badge-pendente { background:rgba(61,156,255,0.13); color:var(--blue); border:1px solid rgba(61,156,255,0.25); }
  .badge-entregue { background:rgba(0,232,122,0.12); color:var(--green); border:1px solid rgba(0,232,122,0.25); }
  .badge-eta      { background:rgba(245,166,35,0.12); color:var(--primary); border:1px solid rgba(245,166,35,0.25); }
  .parada-actions { display:flex; gap:6px; }
  .btn-nav {
    flex:1; padding:9px; border:none; border-radius:12px;
    font-size:12px; font-weight:700; cursor:pointer; transition:0.15s;
    display:flex; align-items:center; justify-content:center; gap:4px;
    font-family:'DM Sans',sans-serif;
  }
  .btn-nav:active { transform:scale(0.96); }
  .btn-maps    { background:rgba(61,156,255,0.12); color:var(--blue); border:1px solid rgba(61,156,255,0.3); }
  .btn-waze    { background:rgba(0,232,122,0.1); color:var(--green); border:1px solid rgba(0,232,122,0.28); }
  .btn-entregue{ background:var(--green); color:#000; border:none; font-weight:800; }
  .btn-entregue:disabled { background:rgba(255,255,255,0.06); color:var(--text-muted); cursor:not-allowed; border:1px solid var(--border); }

  /* ROTA CHIPS */
  #rotaBar {
    padding:0 12px 10px; flex-shrink:0;
    overflow-x:auto; gap:6px; align-items:center;
    display:none;
  }
  #rotaBar.show { display:flex; }
  .rota-chip {
    white-space:nowrap; padding:5px 14px; border-radius:20px;
    font-size:11px; font-weight:700; cursor:pointer; flex-shrink:0;
    background:rgba(255,255,255,0.04); color:var(--text-dim);
    border:1px solid var(--border); transition:0.2s;
  }
  .rota-chip.active { background:rgba(245,166,35,0.18); color:var(--primary); border-color:rgba(245,166,35,0.45); }

  /* TOAST */
  .toast-msg {
    position:fixed; bottom:90px; left:50%;
    transform:translateX(-50%) translateY(60px);
    background:var(--surface2);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 20px; border-radius:20px;
    font-size:13px; font-weight:700;
    z-index:9999; backdrop-filter:blur(14px);
    opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap; pointer-events:none;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    font-family:'DM Sans',sans-serif;
  }
  .toast-msg.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* MARCADORES CLIENTES */
  .marker-client-wrap {
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer; user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }

  /* Container relativo só ao redor do avatar — não afeta o marcador no mapa */
  .marker-avatar-container {
    position:relative;
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
  }

  /* ANEL DE PROGRESSO — long-press 2s */
  .lp-ring {
    position:absolute;
    width:58px; height:58px;
    top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-90deg);
    pointer-events:none;
    opacity:0;
    transition:opacity 0.15s;
  }
  .lp-ring circle {
    fill:none;
    stroke:var(--green);
    stroke-width:3.5;
    stroke-linecap:round;
    r:26; cx:29; cy:29;
    stroke-dasharray:163.4;
    stroke-dashoffset:163.4;
    filter:drop-shadow(0 0 5px var(--green));
  }
  .pressing .lp-ring { opacity:1; }
  .pressing .lp-ring circle {
    animation:lpFill 2s linear forwards;
  }
  @keyframes lpFill {
    from { stroke-dashoffset:163.4; }
    to   { stroke-dashoffset:0; }
  }
  .pressing .marker-avatar {
    animation:avatarPress 0.4s ease-in-out infinite alternate;
  }
  @keyframes avatarPress {
    from { transform:scale(1); }
    to   { transform:scale(1.14); box-shadow:0 0 0 8px rgba(0,232,122,0.22), 0 3px 14px rgba(0,0,0,0.55); }
  }
  /* Cliente selecionado na fila de rota */
  .nav-ativo .marker-avatar {
    border-color:var(--green) !important;
    box-shadow:0 0 0 5px rgba(0,232,122,0.3), 0 3px 14px rgba(0,0,0,0.55) !important;
  }
  .nav-ativo .marker-name {
    background:rgba(0,232,122,0.18);
    border-color:rgba(0,232,122,0.4);
    color:var(--green);
  }

  /* POPUP MapLibre — desativado, não usado */
  .maplibregl-popup { display:none !important; }
  .maplibregl-ctrl-attrib { display:none !important; }
  .maplibregl-ctrl-bottom-right { bottom:92px !important; right:70px !important; }

  /* BADGE DE ROTA NO HEADER */
  #rotaBadge {
    position:fixed;
    top:14px; left:50%; transform:translateX(-50%);
    z-index:500;
    display:none; align-items:center; gap:8px;
    padding:7px 14px 7px 12px;
    border-radius:22px;
    background:rgba(10,10,15,0.92);
    border:1.5px solid rgba(0,232,122,0.55);
    box-shadow:0 3px 18px rgba(0,232,122,0.18);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    white-space:nowrap;
    font-family:'DM Sans',sans-serif;
  }
  #rotaBadge.visivel { display:flex; }
  #rotaBadge .rb-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--green); flex-shrink:0;
    animation:gpsDot 1s ease-in-out infinite;
  }
  #rotaBadge .rb-info { display:flex; flex-direction:column; gap:1px; }
  #rotaBadge .rb-nome { font-family:'Syne',sans-serif; font-size:12px; font-weight:900; color:var(--green); }
  #rotaBadge .rb-dist { font-size:10px; color:var(--text-dim); }
  #rotaBadge .rb-fechar {
    width:24px; height:24px; border-radius:50%; padding:0;
    background:rgba(255,71,87,0.15); color:var(--red);
    border:1px solid rgba(255,71,87,0.4);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; cursor:pointer; flex-shrink:0;
    transition:transform 0.15s; margin-left:2px;
  }
  #rotaBadge .rb-fechar:active { transform:scale(0.88); }
</style>
</head>
<body>

<div id="map"></div>

<!-- ABAS -->
<div id="tabBar">
  <button class="tab-btn active"   id="tabRota"    onclick="setTab('rota')">   🗺️ Rota   </button>
  <button class="tab-btn inactive" id="tabParadas" onclick="setTab('paradas')">📋 Paradas</button>
  <button class="tab-btn inactive" id="tabTodas"   onclick="setTab('todas')">  📁 Todas  </button>
</div>

<!-- GPS -->
<div id="gpsIndicator"><div class="gps-dot"></div>GPS erro</div>

<!-- BÚSSOLA -->
<div id="compass" onclick="resetNorth()">🧭</div>

<!-- FAB MOTO -->
<button id="fabMoto" onclick="abrirParadas()">🛵</button>

<!-- PAINEL PARADAS -->
<div id="paradasPanel">
  <div id="panelHandle"></div>
  <div id="panelTitle">
    <span>📦 Entregas</span>
    <button id="panelClose" onclick="fecharParadas()">✕ Fechar</button>
  </div>
  <div id="rotaBar"></div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="statusBar">
    <div class="status-item">
      <div class="status-num" id="statTotal">0</div>
      <div class="status-label">Total</div>
    </div>
    <div class="status-item">
      <div class="status-num" id="statPendente" style="color:#e67e22">0</div>
      <div class="status-label">Pendentes</div>
    </div>
    <div class="status-item">
      <div class="status-num" id="statEntregue" style="color:#2ecc71">0</div>
      <div class="status-label">Entregues</div>
    </div>
    <div class="status-item">
      <div class="status-num" id="statEta" style="color:#5dade2">--</div>
      <div class="status-label">Min rest.</div>
    </div>
  </div>
  <div id="paradasList">
    <div id="loadingState">
      <div class="spinner"></div>
      <div style="font-size:13px">Carregando rotas...</div>
    </div>
    <div id="emptyState">
      <div class="emoji">🛵</div>
      <h3>Sem entregas hoje</h3>
      <p>Nenhuma rota em andamento.</p>
    </div>
  </div>
</div>


<!-- BADGE DE ROTA NO HEADER -->
<div id="rotaBadge">
  <div class="rb-dot"></div>
  <div class="rb-info">
    <div class="rb-dist" id="rbDist">Calculando...</div>
  </div>
  <button class="rb-fechar" style="width:auto;border-radius:14px;padding:0 12px;font-size:11px;font-weight:800;" onclick="cancelarNavAvulsa()">✕ Cancelar Rota</button>
</div>

<div class="toast-msg" id="toastMsg"></div>

<script>
// ── CONFIG ──
const SUPABASE_URL = "https://vpeyqgijajywgswmezlh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──
let map;
let rotaAtual = null, paradasAtuais = [], rotasDisponiveis = [];
let marcadoresMapLibre = [];
let marcadoresClientes = [];
let todosClientes = [];
let minhaPosicao = null;         // [lng, lat]
let meuMarcador = null, meuMarcadorEl = null;
let paradaAtivIdx = -1;
let tabAtual = 'rota';
let ultimaPosicao = null;        // {lat, lng}
let ultimaDirecao = 0;

// ── GERENCIAMENTO DE ESTADO DE CÂMERA ──
// modoNavegacao = true  → 3D  (rota em_transito)
// modoNavegacao = false → 2D  (exploração livre)
let modoNavegacao = false;

/**
 * Ativa o modo Navegação 3D:
 * - flyTo zoom 18, pitch 60, bearing da direção atual
 * - offset [0,150] para moto na base da tela
 * - Bloqueia dragPan e scrollZoom
 */
function ativarModo3D() {
  if (modoNavegacao) return; // já ativo
  modoNavegacao = true;

  // Bloqueia interação manual do usuário
  map.dragPan.disable();
  map.scrollZoom.disable();
  map.touchZoomRotate.disable();

  const centro = minhaPosicao || [-34.9, -8.05];
  map.flyTo({
    center: centro,
    zoom: 18,
    pitch: 60,
    bearing: ultimaDirecao,
    offset: [0, 150],
    duration: 1200,
    essential: true
  });

  // Indicador visual no badge GPS
  const badge = document.getElementById('gpsIndicator');
  badge.dataset.modo = '3d';
  _atualizarBadgeModo();

  console.log('[Camera] Modo 3D (Navegação) ativado');
}

/**
 * Ativa o modo Exploração 2D:
 * - Reset pitch 0, bearing 0, zoom 14
 * - offset [0,0]
 * - Libera dragPan e scrollZoom
 */
function ativarModo2D() {
  if (!modoNavegacao) return; // já ativo
  modoNavegacao = false;

  // Libera interação manual
  map.dragPan.enable();
  map.scrollZoom.enable();
  map.touchZoomRotate.enable();

  map.easeTo({
    pitch: 0,
    bearing: 0,
    zoom: 15,
    center: [-34.9384332, -8.1837433],
    offset: [0, 0],
    duration: 900,
    essential: true
  });

  const badge = document.getElementById('gpsIndicator');
  badge.dataset.modo = '2d';
  _atualizarBadgeModo();

  console.log('[Camera] Modo 2D (Exploração) ativado');
}

/** Atualiza texto do badge GPS com o modo atual */
function _atualizarBadgeModo() {
  const badge = document.getElementById('gpsIndicator');
  const gpsOk = badge.classList.contains('ok');
  const modo = badge.dataset.modo === '3d' ? ' · 3D' : '';
  badge.innerHTML = `<div class="gps-dot"></div>GPS ${gpsOk ? 'ok' : 'erro'}${modo}`;
}

/**
 * verificarEstadoDaEntrega(dados)
 * Gatilho principal: recebe dados do Supabase e decide o modo de câmera.
 * Se dados.em_transito === true → Modo 3D (Navegação)
 * Se dados.em_transito === false/null → Modo 2D (Exploração)
 */
function verificarEstadoDaEntrega(dados) {
  if (!dados) {
    ativarModo2D();
    return;
  }
  if (dados.em_transito === true) {
    ativarModo3D();
  } else {
    ativarModo2D();
  }
}

// ── MAPA ──
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-34.9384332, -8.1837433],
    zoom: 15,
    pitch: 0,
    bearing: 0,
    attributionControl: false
  });

  map.on('load', () => {
    map.addSource('rota-line', {
      type: 'geojson',
      data: { type:'FeatureCollection', features:[] }
    });
    map.addLayer({
      id: 'rota-line-layer',
      type: 'line',
      source: 'rota-line',
      paint: {
        'line-color': '#f5a623',
        'line-width': 3,
        'line-opacity': 0.6,
        'line-dasharray': [3, 3]
      }
    });

    // Source + layers da navegação avulsa (long-press em cliente)
    map.addSource('nav-avulsa-line', {
      type: 'geojson',
      data: { type:'FeatureCollection', features:[] }
    });
    // Rota total — linha vermelha transparente
    map.addLayer({
      id: 'nav-avulsa-total',
      type: 'line',
      source: 'nav-avulsa-line',
      paint: {
        'line-color': '#ff4757',
        'line-width': 3,
        'line-opacity': 0.35,
        'line-dasharray': [4, 3]
      }
    });

    // Source separado para o segmento atual (verde)
    map.addSource('nav-proximo-line', {
      type: 'geojson',
      data: { type:'FeatureCollection', features:[] }
    });
    // Glow verde
    map.addLayer({
      id: 'nav-proximo-glow',
      type: 'line',
      source: 'nav-proximo-line',
      paint: {
        'line-color': '#00e87a',
        'line-width': 14,
        'line-opacity': 0.12,
        'line-blur': 5
      }
    });
    // Linha verde principal
    map.addLayer({
      id: 'nav-proximo-layer',
      type: 'line',
      source: 'nav-proximo-line',
      paint: {
        'line-color': '#00e87a',
        'line-width': 4,
        'line-opacity': 0.95,
        'line-dasharray': [2, 2.5]
      }
    });

    // Clientes são renderizados por carregarClientes() após os dados chegarem do Supabase
  });

  // GPS
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        setGpsStatus(true);
        moverEntregador(pos.coords.latitude, pos.coords.longitude, pos.coords.heading);
      },
      () => setGpsStatus(false)
    );
    navigator.geolocation.watchPosition(
      pos => {
        setGpsStatus(true);
        moverEntregador(pos.coords.latitude, pos.coords.longitude, pos.coords.heading);
      },
      () => setGpsStatus(false),
      { enableHighAccuracy: true, maximumAge: 3000 }
    );
  } else {
    setGpsStatus(false);
  }
}

function setGpsStatus(ok) {
  const el = document.getElementById('gpsIndicator');
  if (ok) {
    el.classList.add('ok');
  } else {
    el.classList.remove('ok');
  }
  _atualizarBadgeModo();
}

// ── CÁLCULO DE ÂNGULO ──
function calcularAngulo(lat1, lng1, lat2, lng2) {
  const toRad = d => d * Math.PI / 180;
  const dLng = toRad(lng2 - lng1);
  const lat1r = toRad(lat1), lat2r = toRad(lat2);
  const y = Math.sin(dLng) * Math.cos(lat2r);
  const x = Math.cos(lat1r) * Math.sin(lat2r) - Math.sin(lat1r) * Math.cos(lat2r) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ── MOVER ENTREGADOR ──
function moverEntregador(novaLat, novaLng, headingGPS) {
  let angulo = ultimaDirecao;

  if (ultimaPosicao) {
    const dLat = Math.abs(novaLat - ultimaPosicao.lat);
    const dLng = Math.abs(novaLng - ultimaPosicao.lng);
    if (dLat + dLng > 0.00001) {
      angulo = calcularAngulo(ultimaPosicao.lat, ultimaPosicao.lng, novaLat, novaLng);
    }
  } else if (headingGPS != null && !isNaN(headingGPS)) {
    angulo = headingGPS;
  }

  ultimaDirecao = angulo;
  minhaPosicao = [novaLng, novaLat];

  // Atualiza marcador da moto
  if (!meuMarcador) {
    const el = document.createElement('div');
    el.className = 'moto-wrap';
    el.innerHTML = '🛵';
    meuMarcadorEl = el;
    meuMarcador = new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([novaLng, novaLat])
      .addTo(map);
  } else {
    meuMarcador.setLngLat([novaLng, novaLat]);
  }

  // Só segue a moto com câmera se estiver no modo 3D
  if (modoNavegacao) {
    map.easeTo({
      center: [novaLng, novaLat],
      bearing: angulo,
      pitch: 60,
      zoom: 18,
      offset: [0, 150],
      duration: 1200,
      essential: true
    });
  }

  ultimaPosicao = { lat: novaLat, lng: novaLng };
}

function resetNorth() {
  // No modo 2D, permite resetar norte livremente
  // No modo 3D, apenas reseta o bearing sem sair do modo
  if (modoNavegacao) {
    map.easeTo({ bearing: 0, duration: 500 });
  } else {
    map.easeTo({ bearing: 0, pitch: 0, duration: 600 });
  }
}

// ── ABAS ──
function setTab(tab) {
  tabAtual = tab;
  ['rota','paradas','todas'].forEach(t => {
    const id = 'tab' + t.charAt(0).toUpperCase() + t.slice(1);
    document.getElementById(id).className = 'tab-btn ' + (t === tab ? 'active' : 'inactive');
  });
  renderMarcadores();
  if (document.getElementById('paradasPanel').classList.contains('show')) {
    renderParadas();
  }
}

// ── DADOS SUPABASE ──
async function carregarRotas() {
  const dia = diaHoje();
  const hoje = new Date().toISOString().split('T')[0];
  const { data: todasRotas } = await sb.from("delivery_routes").select("*").order("hora_saida", { ascending: true });

  const rotasDia = (todasRotas || []).filter(r => r.dias_semana && r.dias_semana.includes(dia));

  rotasDisponiveis = rotasDia.filter(r => {
    return (r.status === 'em_andamento' || r.status === 'criada' || r.status === 'aguardando')
      && (r.paradas || []).length > 0;
  }).map(r => {
    const emAndamentoHoje = r.saida_em && r.saida_em.startsWith(hoje);
    if (r.status === 'em_andamento' && !emAndamentoHoje) return { ...r, status: 'criada' };
    return r;
  });

  document.getElementById('loadingState').style.display = 'none';

  if (rotasDisponiveis.length === 0) {
    document.getElementById('emptyState').style.display = 'flex';
    // Sem rota → modo 2D para exploração
    verificarEstadoDaEntrega(null);
    return;
  }

  renderRotaBar();
  selecionarRota(rotasDisponiveis[0].id);
}

function diaHoje() {
  return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date().getDay()];
}

function renderRotaBar() {
  const bar = document.getElementById('rotaBar');
  if (rotasDisponiveis.length <= 1) { bar.className = ''; return; }
  bar.className = 'show';
  bar.innerHTML = rotasDisponiveis.map(r =>
    `<div class="rota-chip" id="chip-${r.id}" onclick="selecionarRota('${r.id}')">${r.nome}</div>`
  ).join('');
}

function selecionarRota(rotaId) {
  rotaAtual = rotasDisponiveis.find(r => r.id === rotaId);
  if (!rotaAtual) return;

  document.querySelectorAll('.rota-chip').forEach(c => c.classList.remove('active'));
  const chip = document.getElementById(`chip-${rotaId}`);
  if (chip) chip.classList.add('active');

  paradasAtuais = (rotaAtual.paradas || []).filter(p => p.status !== undefined);
  paradaAtivIdx = paradasAtuais.findIndex(p => p.status !== 'entregue');

  renderParadas();
  renderMarcadores();
  // Clientes sempre visíveis — re-renderiza para excluir duplicatas da rota atual
  renderMarcadoresClientes();
  atualizarStatus();

  // Verifica estado de câmera com base no campo em_transito da rota
  verificarEstadoDaEntrega(rotaAtual);

  // Só ajusta bounds se não estiver em modo navegação (3D já tem sua própria câmera)
  if (!modoNavegacao) {
    ajustarMapaBounds();
  }
}

// ── RENDER PARADAS ──
function renderParadas() {
  const list = document.getElementById('paradasList');
  let exibir = paradasAtuais;
  if (tabAtual === 'rota') exibir = paradasAtuais.filter(p => p.status !== 'entregue');
  list.innerHTML = '';

  if (exibir.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px">Nenhuma parada nesta aba</div>`;
    return;
  }

  exibir.forEach(p => {
    const i = paradasAtuais.indexOf(p);
    const entregue = p.status === 'entregue';
    const ativa = i === paradaAtivIdx;
    const card = document.createElement('div');
    card.className = `parada-card${entregue?' entregue':''}${ativa?' ativa':''}`;
    card.id = `parada-card-${p.id}`;

    const [lat, lon] = p.coords || [null, null];
    const temCoords = lat && lon;
    const endLabel = p.endereco || (temCoords ? `${lat.toFixed(4)}, ${lon.toFixed(4)}` : 'Sem endereço');

    card.innerHTML = `
      <div class="parada-header">
        <div class="parada-num">${entregue ? '✓' : i + 1}</div>
        <div class="parada-nome">${p.nome}</div>
        ${ativa ? '<span style="font-size:9px;font-weight:800;background:rgba(245,166,35,0.25);color:var(--primary);padding:2px 7px;border-radius:20px">▶ ATUAL</span>' : ''}
      </div>
      <div class="parada-end">📍 ${endLabel}</div>
      <div class="parada-info">
        <span class="badge ${entregue?'badge-entregue':'badge-pendente'}">${entregue?'✅ Entregue':'📦 Pendente'}</span>
        ${p.eta_min ? `<span class="badge badge-eta">⏱️ ~${p.eta_min}min</span>` : ''}
      </div>
      <div class="parada-actions">
        ${temCoords ? `
          <button class="btn-nav btn-maps" onclick="navegarMaps(${lat},${lon})">🗺️ Maps</button>
          <button class="btn-nav btn-waze" onclick="navegarWaze(${lat},${lon})">🚗 Waze</button>
        ` : '<span style="font-size:11px;color:var(--red)">⚠️ Sem coordenadas</span>'}
        <button class="btn-nav btn-entregue" id="btn-e-${p.id}" onclick="marcarEntregue('${p.id}')" ${entregue?'disabled':''}>${entregue?'✅ Entregue':'✔ Marcar Entregue'}</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// ── MARCADORES AVATAR ──
function avatarSVG() {
  return `<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="14" r="9" fill="rgba(255,255,255,0.5)"/>
    <path d="M3 40 C3 27 37 27 37 40" fill="rgba(255,255,255,0.5)"/>
  </svg>`;
}

function limparMarcadores() {
  marcadoresMapLibre.forEach(({ marker }) => marker.remove());
  marcadoresMapLibre = [];
  try { map.getSource('rota-line').setData({ type:'FeatureCollection', features:[] }); } catch(e){}
}

function renderMarcadores() {
  limparMarcadores();

  let exibir = paradasAtuais;
  if (tabAtual === 'rota') exibir = paradasAtuais.filter(p => p.status !== 'entregue');

  exibir.forEach(p => {
    const i = paradasAtuais.indexOf(p);
    const [lat, lon] = p.coords || [];
    if (!lat || !lon) return;

    const entregue = p.status === 'entregue';
    const ativa = i === paradaAtivIdx;
    const cls = entregue ? 'entregue' : ativa ? 'ativa' : 'pendente';

    const el = document.createElement('div');
    el.className = 'marker-avatar-wrap';
    el.innerHTML = `
      <div class="marker-name">${p.nome}</div>
      <div class="marker-avatar ${cls}">${avatarSVG()}</div>
    `;

    const popup = new maplibregl.Popup({ offset:[0,-52], closeButton:true, maxWidth:'230px' })
      .setHTML(`
        <b style="color:var(--text)">${p.nome}</b><br>
        <span style="color:var(--text-dim);font-size:11px">${p.endereco || ''}</span><br>
        <span style="color:${entregue?'var(--green)':'var(--primary)'};font-size:12px">${entregue?'✅ Entregue':'📦 Pendente'}</span>
      `);

    const marker = new maplibregl.Marker({ element:el, anchor:'bottom' })
      .setLngLat([lon, lat])
      .setPopup(popup)
      .addTo(map);

    el.addEventListener('click', () => {
      abrirParadas();
      setTimeout(() => {
        const cardEl = document.getElementById(`parada-card-${p.id}`);
        if (cardEl) cardEl.scrollIntoView({ behavior:'smooth', block:'center' });
      }, 250);
    });

    marcadoresMapLibre.push({ marker, idx:i });
  });

  // Linha de rota
  const pendentes = paradasAtuais.filter(p => p.status !== 'entregue' && p.coords?.[0]);
  if (pendentes.length >= 2) {
    try {
      map.getSource('rota-line').setData({
        type:'Feature',
        geometry:{ type:'LineString', coordinates: pendentes.map(p => [p.coords[1], p.coords[0]]) }
      });
    } catch(e){}
  }
}

function ajustarMapaBounds() {
  const pts = paradasAtuais.filter(p => p.coords?.[0]).map(p => [p.coords[1], p.coords[0]]);
  if (minhaPosicao) pts.push(minhaPosicao);
  if (pts.length === 0) return;
  const bounds = pts.reduce((b,p) => b.extend(p), new maplibregl.LngLatBounds(pts[0], pts[0]));
  map.fitBounds(bounds, { padding:55, maxZoom:16, duration:900 });
}

// ── STATUS ──
function atualizarStatus() {
  const total    = paradasAtuais.length;
  const entregues = paradasAtuais.filter(p => p.status === 'entregue').length;
  const pendentes = total - entregues;
  const eta = pendentes > 0 ? pendentes * 12 : 0;

  document.getElementById('statTotal').textContent    = total;
  document.getElementById('statPendente').textContent = pendentes;
  document.getElementById('statEntregue').textContent = entregues;
  document.getElementById('statEta').textContent      = eta > 0 ? eta : '✓';

  const pct = total > 0 ? (entregues/total)*100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── PAINEL ──
function abrirParadas() {
  renderParadas();
  document.getElementById('paradasPanel').classList.add('show');
}
function fecharParadas() {
  document.getElementById('paradasPanel').classList.remove('show');
}

// ── AÇÕES ──
async function marcarEntregue(paradaId) {
  const p = paradasAtuais.find(x => x.id === paradaId);
  if (!p || p.status === 'entregue') return;

  p.status = 'entregue';
  const { error } = await sb.from("delivery_routes")
    .update({ paradas: paradasAtuais })
    .eq("id", rotaAtual.id);

  if (error) {
    toast('❌ Erro ao salvar. Tente novamente.');
    p.status = 'pendente';
    return;
  }

  paradaAtivIdx = paradasAtuais.findIndex(p2 => p2.status !== 'entregue');
  renderParadas();
  renderMarcadores();
  atualizarStatus();

  // No modo 3D, avança câmera para próxima parada
  if (paradaAtivIdx >= 0) {
    const next = document.getElementById(`parada-card-${paradasAtuais[paradaAtivIdx].id}`);
    if (next) setTimeout(() => next.scrollIntoView({ behavior:'smooth', block:'center' }), 200);
    if (!modoNavegacao) {
      const coords = paradasAtuais[paradaAtivIdx].coords;
      if (coords?.[0]) map.easeTo({ center:[coords[1],coords[0]], zoom:15, duration:700 });
    }
  }

  // Verifica se todas foram entregues → volta ao modo 2D
  const todasEntregues = paradasAtuais.every(p2 => p2.status === 'entregue');
  if (todasEntregues && rotaAtual) {
    await sb.from("delivery_routes")
      .update({ em_transito: false })
      .eq("id", rotaAtual.id);
    rotaAtual.em_transito = false;
    verificarEstadoDaEntrega(rotaAtual);
    toast('🎉 Todas as entregas concluídas!');
  } else {
    toast(`✅ ${p.nome} marcado como entregue!`);
  }
}

function navegarMaps(lat, lon) {
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`,'_blank');
}
function navegarWaze(lat, lon) {
  window.open(`https://waze.com/ul?ll=${lat},${lon}&navigate=yes`,'_blank');
}

// ── TOAST ──
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toastMsg');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── CLIENTES — sempre visíveis, independente de rotas ──
async function carregarClientes() {
  const { data, error } = await sb.from("clients")
    .select("id,name,delivery_lat,delivery_lon,delivery_address,phone,fiado,debt")
    .not("delivery_lat", "is", null)
    .not("delivery_lon", "is", null);

  if (error) { console.warn("Erro ao carregar clientes:", error); return; }
  todosClientes = data || [];

  // Aguarda o mapa estar totalmente pronto antes de adicionar marcadores
  const _render = () => renderMarcadoresClientes();

  if (map.isStyleLoaded()) {
    _render();
  } else {
    // map.once garante que chama só após o load completo
    map.once('style.load', _render);
    // fallback caso o evento já tenha disparado antes deste código rodar
    setTimeout(() => {
      if (marcadoresClientes.length === 0 && todosClientes.length > 0) _render();
    }, 2000);
  }
}

function limparMarcadoresClientes() {
  marcadoresClientes.forEach(m => m.remove());
  marcadoresClientes = [];
}

/**
 * renderMarcadoresClientes()
 * Clientes SEMPRE aparecem no mapa — independente de ter rota ativa ou não.
 * Long-press de 2s inicia navegação avulsa até o cliente.
 */
function renderMarcadoresClientes() {
  limparMarcadoresClientes();

  const idsNaRota = new Set(paradasAtuais.map(p => p.client_id).filter(Boolean));

  todosClientes.forEach(c => {
    const lat = c.delivery_lat;
    const lng = c.delivery_lon;
    if (!lat || !lng) return;
    if (idsNaRota.has(c.id)) return;

    const el = document.createElement('div');
    el.className = 'marker-client-wrap';
    el.dataset.id = c.id;
    el.innerHTML = `
      <div class="marker-name">${c.name || 'Cliente'}</div>
      <div class="marker-avatar-container">
        <div class="marker-avatar pendente">${avatarSVG()}</div>
        <svg class="lp-ring" viewBox="0 0 58 58"><circle/></svg>
      </div>
    `;

    // ── Long-press: 2 segundos para iniciar navegação ──
    let pressTimer  = null;
    let pressing    = false;
    let pressStartX = 0;
    let pressStartY = 0;

    const startPress = (e) => {
      // Pega coordenadas iniciais do toque
      const touch = e.touches ? e.touches[0] : e;
      pressStartX = touch.clientX;
      pressStartY = touch.clientY;

      pressing = true;
      el.classList.add('pressing');

      pressTimer = setTimeout(() => {
        if (!pressing) return;
        pressing = false;
        el.classList.remove('pressing');
        if (navigator.vibrate) navigator.vibrate([40, 30, 60]);
        iniciarNavAvulsa(c);
      }, 2000);
    };

    const movePress = (e) => {
      if (!pressing) return;
      const touch = e.touches ? e.touches[0] : e;
      const dx = Math.abs(touch.clientX - pressStartX);
      const dy = Math.abs(touch.clientY - pressStartY);
      // Cancela se moveu mais de 10px (usuário está arrastando o mapa)
      if (dx > 10 || dy > 10) endPress();
    };

    const endPress = () => {
      if (!pressing) return;
      pressing = false;
      clearTimeout(pressTimer);
      el.classList.remove('pressing');
    };

    // stopPropagation impede que o MapLibre roube o evento touch
    el.addEventListener('touchstart', (e) => {
      e.stopPropagation();
      startPress(e);
    }, { passive: true });
    el.addEventListener('touchmove',   (e) => { e.stopPropagation(); movePress(e); }, { passive: true });
    el.addEventListener('touchend',    (e) => { e.stopPropagation(); endPress(); });
    el.addEventListener('touchcancel', (e) => { e.stopPropagation(); endPress(); });
    // Mouse (desktop)
    el.addEventListener('mousedown',  startPress);
    el.addEventListener('mousemove',  movePress);
    el.addEventListener('mouseup',    endPress);
    el.addEventListener('mouseleave', endPress);

    // Sem popup — long-press abre rota direto
    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([lng, lat])
      .addTo(map);

    marcadoresClientes.push(marker);
  });
}

// ── NAVEGAÇÃO AVULSA — múltiplos clientes, OSRM, badge no header ──
let navFila       = [];   // lista de clientes selecionados na ordem
let navRotaCoords = null; // coords OSRM da rota atual
let navTimer      = null; // intervalo de verificação de desvio
let navRecalc     = false;
const NAV_DESVIO  = 40;   // metros para recalcular

// Chamado pelo long-press — adiciona cliente à fila ou inicia nova
function iniciarNavAvulsa(cliente) {
  // Marca o avatar do cliente como selecionado
  _marcarClienteNaFila(cliente);

  navFila.push(cliente);
  navRotaCoords = null;

  _atualizarBadge();
  _calcularRotaFila();

  if (navFila.length === 1) {
    // Primeiro cliente — inicia o timer de desvio
    clearInterval(navTimer);
    navTimer = setInterval(_checarDesvio, 4000);
    toast(`🧭 Rota para ${cliente.name || 'cliente'}!`);
  } else {
    toast(`➕ ${cliente.name || 'cliente'} adicionado à rota!`);
  }
}

// Cancela tudo
function cancelarNavAvulsa() {
  navFila = [];
  navRotaCoords = null;
  clearInterval(navTimer);
  navTimer = null;

  document.getElementById('rotaBadge').classList.remove('visivel');
  try { map.getSource('nav-avulsa-line').setData({ type:'FeatureCollection', features:[] }); } catch(e){}
  try { map.getSource('nav-proximo-line').setData({ type:'FeatureCollection', features:[] }); } catch(e){}

  // Remove marcação visual dos clientes
  document.querySelectorAll('.marker-client-wrap.nav-ativo').forEach(el => el.classList.remove('nav-ativo'));
  toast('🛵 Rota encerrada');
}

// Atualiza o badge no header com nomes + quantidade
function _atualizarBadge() {
  const badge = document.getElementById('rotaBadge');
  if (navFila.length === 0) { badge.classList.remove('visivel'); return; }

  document.getElementById('rbDist').textContent = '⏳ Calculando...';
  badge.classList.add('visivel');
}

// Monta a URL OSRM com todos os waypoints: moto → c1 → c2 → ...
async function _calcularRotaFila() {
  if (navFila.length === 0 || navRecalc) return;
  navRecalc = true;

  const origem = minhaPosicao;
  if (!origem) {
    document.getElementById('rbDist').textContent = '📡 Aguardando GPS...';
    navRecalc = false;
    return;
  }

  // Monta waypoints: origem + cada cliente na fila
  const pts = [
    `${origem[0]},${origem[1]}`,
    ...navFila.map(c => `${c.delivery_lon},${c.delivery_lat}`)
  ].join(';');

  const url = `https://router.project-osrm.org/route/v1/driving/${pts}?overview=full&geometries=geojson`;

  try {
    const res  = await fetch(url, { signal: AbortSignal.timeout(7000) });
    const json = await res.json();
    if (json.code !== 'Ok' || !json.routes?.length) throw new Error('sem rota');

    const rota    = json.routes[0];
    const coords  = rota.geometry.coordinates;
    const distM   = rota.distance;
    const minutos = Math.ceil(rota.duration / 60);

    navRotaCoords = coords;
    _aplicarRota(coords);

    // Centraliza primeira vez
    _fitBounds(coords, origem);

    const distLabel = distM < 1000 ? `${Math.round(distM)} m` : `${(distM/1000).toFixed(1)} km`;
    document.getElementById('rbDist').textContent = `🛣️ ${distLabel} · ⏱️ ~${minutos} min`;

  } catch(err) {
    // Fallback linha reta passando por todos
    const coords = [origem, ...navFila.map(c => [c.delivery_lon, c.delivery_lat])];
    _aplicarRota(coords);
    document.getElementById('rbDist').textContent = '📏 Linha reta (sem conexão)';
  }

  navRecalc = false;
}

// Verifica a cada 4s se saiu da rota → recalcula
function _checarDesvio() {
  if (navFila.length === 0) return;
  if (!minhaPosicao || !navRotaCoords) { _calcularRotaFila(); return; }

  const [lng, lat] = minhaPosicao;
  let minDist = Infinity;
  let closestIdx = 0;
  for (let i = 0; i < navRotaCoords.length - 1; i++) {
    const [aLng, aLat] = navRotaCoords[i];
    const [bLng, bLat] = navRotaCoords[i+1];
    const dx = bLng-aLng, dy = bLat-aLat;
    const len2 = dx*dx+dy*dy;
    let t = len2 === 0 ? 0 : Math.max(0,Math.min(1,((lng-aLng)*dx+(lat-aLat)*dy)/len2));
    const d = _distM(lat, lng, aLat+t*dy, aLng+t*dx);
    if (d < minDist) { minDist = d; closestIdx = i; }
  }

  if (minDist > NAV_DESVIO) {
    toast('↩️ Recalculando rota...');
    navRotaCoords = null;
    _calcularRotaFila();
  } else {
    // Apaga trecho já percorrido — mantém apenas da posição atual em diante
    if (closestIdx > 0) {
      navRotaCoords = [[lng, lat], ...navRotaCoords.slice(closestIdx + 1)];
    }
    // Atualiza linhas
    _aplicarRota(navRotaCoords);

    // Verifica chegada ao próximo destino
    const prox = navFila[0];
    const dist = _distM(lat, lng, prox.delivery_lat, prox.delivery_lon);
    if (dist < 35) {
      toast(`📍 Chegou em ${prox.name || 'cliente'}!`);
      document.querySelectorAll(`.marker-client-wrap[data-id="${prox.id}"]`).forEach(el => el.classList.remove('nav-ativo'));
      navFila.shift(); // remove o primeiro
      navRotaCoords = null;
      if (navFila.length === 0) {
        cancelarNavAvulsa();
      } else {
        _atualizarBadge();
        _calcularRotaFila();
      }
    }
  }
}

function _aplicarRota(coords) {
  try {
    // Linha vermelha transparente — rota total restante
    map.getSource('nav-avulsa-line').setData({
      type:'Feature', geometry:{ type:'LineString', coordinates:coords }
    });
  } catch(e) {}

  // Linha verde — apenas do entregador até o próximo destino
  try {
    if (minhaPosicao && navFila.length > 0) {
      const prox = navFila[0];
      // Pega somente a parte inicial da rota OSRM até o primeiro waypoint
      // Usa os primeiros pontos até chegar perto do destino da fila[0]
      const destLat = prox.delivery_lat;
      const destLng = prox.delivery_lon;
      let cutIdx = coords.length - 1;
      let minD = Infinity;
      for (let i = 0; i < coords.length; i++) {
        const d = _distM(destLat, destLng, coords[i][1], coords[i][0]);
        if (d < minD) { minD = d; cutIdx = i; }
      }
      const segmento = coords.slice(0, cutIdx + 1);
      map.getSource('nav-proximo-line').setData({
        type:'Feature', geometry:{ type:'LineString', coordinates: segmento.length >= 2 ? segmento : coords }
      });
    } else {
      map.getSource('nav-proximo-line').setData({
        type:'Feature', geometry:{ type:'LineString', coordinates: coords }
      });
    }
  } catch(e) {}
}

function _fitBounds(coords, origem) {
  const todos = [origem, ...coords];
  const bounds = todos.reduce((b,p) => b.extend(p), new maplibregl.LngLatBounds(todos[0],todos[0]));
  map.fitBounds(bounds, { padding:{ top:60,bottom:80,left:40,right:40 }, maxZoom:17, duration:800 });
}

function _marcarClienteNaFila(cliente) {
  marcadoresClientes.forEach(m => {
    const el = m.getElement();
    if (el && el.dataset.id === String(cliente.id)) {
      el.classList.add('nav-ativo');
    }
  });
}

function _distM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── SYNC SUPABASE (polling 15s) ──
async function syncSupabase() {
  if (!rotaAtual) return;

  const { data } = await sb.from("delivery_routes")
    .select("paradas,entregador_lat,entregador_lng,em_transito")
    .eq("id", rotaAtual.id).single();
  if (!data) return;

  // ── Gerenciamento de câmera via campo em_transito ──
  const eraNavegacao = modoNavegacao;
  verificarEstadoDaEntrega(data);

  // Posição do entregador vinda do admin/backend
  if (data.entregador_lat && data.entregador_lng) {
    moverEntregador(data.entregador_lat, data.entregador_lng, null);
  }

  // Sync status paradas
  (data.paradas || []).forEach(np => {
    const local = paradasAtuais.find(p => p.id === np.id);
    if (local && local.status !== np.status && local.status !== 'entregue') {
      local.status = np.status;
    }
  });

  // Atualiza em_transito localmente
  rotaAtual.em_transito = data.em_transito;

  paradaAtivIdx = paradasAtuais.findIndex(p => p.status !== 'entregue');
  atualizarStatus();
  renderMarcadores();

  if (document.getElementById('paradasPanel').classList.contains('show')) renderParadas();
}

// ── INIT ──
window.onload = async () => {
  initMap();

  // Clientes carregam em paralelo com as rotas — sempre presentes no mapa
  await Promise.all([carregarRotas(), carregarClientes()]);

  // Polling a cada 15s (mais rápido que os 30s anteriores para câmera reagir rápido)
  setInterval(syncSupabase, 15000);
};
