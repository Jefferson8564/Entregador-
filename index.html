<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛵 Entregador — O Rei da Coxinha</title>
    <link rel="icon" href="icone.png">
    <meta name="theme-color" content="#0a0a0f">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --primary: #f5a623;
            --primary-glow: rgba(245,166,35,0.3);
            --green: #00e87a;
            --green-glow: rgba(0,232,122,0.25);
            --blue: #3d9cff;
            --red: #ff4757;
            --text: #f0f0f8;
            --text-dim: rgba(240,240,248,0.5);
            --text-muted: rgba(240,240,248,0.28);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== LOADING ===== */
        #loadingScreen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        .load-logo {
            font-size: 56px;
            animation: logoPulse 1.4s ease-in-out infinite;
            filter: drop-shadow(0 0 24px var(--primary-glow));
        }
        @keyframes logoPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
        .load-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px; font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .load-sub { font-size: 13px; color: var(--text-muted); }
        .load-bar-wrap {
            width: 160px; height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px; overflow: hidden;
        }
        .load-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), #ff8c00);
            border-radius: 10px;
            animation: loadBar 1.8s ease forwards;
        }
        @keyframes loadBar { to { width: 100%; } }

        /* ===== HEADER ===== */
        #appHeader {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-brand {
            font-family: 'Syne', sans-serif;
            font-size: 18px; font-weight: 900;
            letter-spacing: -0.3px;
        }
        .header-brand span { color: var(--primary); }
        .gps-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            background: rgba(0,232,122,0.1);
            border: 1px solid rgba(0,232,122,0.25);
            color: var(--green);
            transition: all 0.3s;
        }
        .gps-badge.off {
            background: rgba(255,71,87,0.1);
            border-color: rgba(255,71,87,0.25);
            color: var(--red);
        }
        .gps-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green);
            animation: gpsDot 1.2s ease-in-out infinite;
        }
        .gps-badge.off .gps-dot { background: var(--red); animation: none; }
        @keyframes gpsDot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.7);} }

        /* ===== MAIN LAYOUT ===== */
        #mainApp { display: none; flex-direction: column; min-height: 100vh; }

        /* ===== MAPA ===== */
        #mapaWrapper {
            position: relative;
            height: 55vh; min-height: 300px;
            background: #111620;
        }
        #mapaDiv { width: 100%; height: 100%; }

        /* Botão recentrar */
        #btnRecentrar {
            position: absolute; bottom: 16px; right: 16px; z-index: 500;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--primary);
            border: none; cursor: pointer;
            font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px var(--primary-glow);
            transition: transform 0.2s;
        }
        #btnRecentrar:active { transform: scale(0.9); }

        /* Chip de proximidade */
        #proximidadeChip {
            position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
            z-index: 500; white-space: nowrap;
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
        }
        #proximidadeChip.chegando {
            background: rgba(0,232,122,0.2);
            border: 1px solid rgba(0,232,122,0.5);
            color: var(--green);
            animation: chipPulse 1s ease-in-out infinite;
        }
        #proximidadeChip.longe {
            background: rgba(61,156,255,0.15);
            border: 1px solid rgba(61,156,255,0.35);
            color: var(--blue);
        }
        @keyframes chipPulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

        /* ===== PAINEL INFERIOR ===== */
        #painelInferior {
            flex: 1;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            margin-top: -20px;
            position: relative; z-index: 10;
            overflow: hidden;
        }

        /* Alça */
        .drag-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 12px auto 0;
        }

        /* Tabs */
        .tabs {
            display: flex; gap: 4px;
            padding: 12px 14px 0;
        }
        .tab-btn {
            flex: 1; padding: 9px 8px;
            border: none; border-radius: 12px;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .tab-btn.active {
            background: var(--surface2);
            color: var(--text);
        }

        /* Tab content */
        .tab-content { display: none; padding: 14px; }
        .tab-content.active { display: block; }

        /* ===== ROTA ATIVA CARD ===== */
        .rota-ativa-card {
            background: linear-gradient(135deg, rgba(245,166,35,0.12), rgba(255,140,0,0.06));
            border: 1px solid rgba(245,166,35,0.25);
            border-radius: 18px; padding: 14px 16px;
            margin-bottom: 12px;
        }
        .rota-ativa-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
        }
        .rota-nome {
            font-family: 'Syne', sans-serif;
            font-size: 16px; font-weight: 900;
            color: var(--primary);
        }
        .rota-status-badge {
            font-size: 10px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            background: rgba(0,232,122,0.15);
            color: var(--green);
            border: 1px solid rgba(0,232,122,0.3);
        }
        .rota-stats {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .rota-stat {
            background: rgba(255,255,255,0.04);
            border-radius: 12px; padding: 10px 8px;
            text-align: center;
        }
        .rota-stat-val {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 900;
        }
        .rota-stat-lbl {
            font-size: 10px; color: var(--text-muted);
            margin-top: 2px;
        }

        /* ===== PRÓXIMA PARADA ===== */
        .proxima-card {
            background: var(--surface2);
            border-radius: 18px; padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .proxima-card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--blue);
            border-radius: 2px 0 0 2px;
        }
        .proxima-card.chegando::before { background: var(--green); }
        .proxima-lbl {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .proxima-nome {
            font-family: 'Syne', sans-serif;
            font-size: 17px; font-weight: 800;
        }
        .proxima-end {
            font-size: 12px; color: var(--text-dim);
            margin-top: 4px;
        }
        .proxima-dist {
            display: flex; align-items: center; gap: 8px;
            margin-top: 10px;
        }
        .dist-badge {
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            background: rgba(61,156,255,0.15);
            color: var(--blue);
            border: 1px solid rgba(61,156,255,0.3);
        }
        .eta-badge {
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            background: rgba(245,166,35,0.12);
            color: var(--primary);
            border: 1px solid rgba(245,166,35,0.25);
        }

        /* ===== LISTA DE PARADAS ===== */
        .parada-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 16px;
            margin-bottom: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            transition: opacity 0.3s;
        }
        .parada-item.entregue { opacity: 0.4; }
        .parada-num {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900;
            flex-shrink: 0;
        }
        .parada-num.pendente { background: rgba(61,156,255,0.2); color: var(--blue); border: 1.5px solid rgba(61,156,255,0.4); }
        .parada-num.proxima { background: rgba(245,166,35,0.2); color: var(--primary); border: 1.5px solid rgba(245,166,35,0.4); animation: gpsDot 1.2s infinite; }
        .parada-num.entregue { background: rgba(0,232,122,0.15); color: var(--green); border: 1.5px solid rgba(0,232,122,0.3); }
        .parada-info { flex: 1; min-width: 0; }
        .parada-nome { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .parada-end { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .parada-eta { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

        /* ===== SEM ROTA ===== */
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text-dim); margin-bottom: 6px; }
        .empty-sub { font-size: 13px; line-height: 1.6; }

        /* ===== TOAST ===== */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px; border-radius: 20px;
            font-size: 13px; font-weight: 700;
            z-index: 9998; opacity: 0;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { background: rgba(0,232,122,0.15); border-color: rgba(0,232,122,0.4); color: var(--green); }
        #toast.warn { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.4); color: var(--primary); }

        /* ===== CONFIRMAR ENTREGA MODAL ===== */
        #confirmModal {
            position: fixed; inset: 0; z-index: 8000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: none; align-items: flex-end; justify-content: center;
        }
        #confirmModal.show { display: flex; }
        .confirm-box {
            background: var(--surface);
            border-radius: 28px 28px 0 0;
            padding: 24px 20px 36px;
            width: 100%; max-width: 500px;
            border-top: 1px solid var(--border);
            animation: slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }
        @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
        .confirm-icon { font-size: 42px; text-align: center; margin-bottom: 12px; }
        .confirm-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 6px; }
        .confirm-sub { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 20px; }
        .confirm-btn {
            width: 100%; padding: 16px;
            border: none; border-radius: 16px;
            font-size: 15px; font-weight: 800;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            background: var(--green);
            color: #000;
            margin-bottom: 8px;
        }
        .confirm-cancel {
            width: 100%; padding: 14px;
            border: 1px solid var(--border);
            border-radius: 16px; background: transparent;
            color: var(--text-muted); font-size: 14px;
            font-weight: 700; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        /* ===== PAGAMENTO MODAL ===== */
        #pagamentoModal {
            position: fixed; inset: 0; z-index: 8500;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: flex-end; justify-content: center;
        }
        #pagamentoModal.show { display: flex; }
        .pag-box {
            background: var(--surface);
            border-radius: 28px 28px 0 0;
            padding: 28px 20px 40px;
            width: 100%; max-width: 500px;
            border-top: 1px solid var(--border);
            animation: slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }
        .pag-icon { font-size: 46px; text-align: center; margin-bottom: 10px; }
        .pag-title {
            font-family: 'Syne', sans-serif;
            font-size: 19px; font-weight: 900;
            text-align: center; margin-bottom: 4px;
        }
        .pag-sub {
            font-size: 13px; color: var(--text-dim);
            text-align: center; margin-bottom: 22px; line-height: 1.5;
        }
        .pag-valor {
            font-family: 'Syne', sans-serif;
            font-size: 32px; font-weight: 900;
            text-align: center; color: var(--primary);
            margin-bottom: 22px;
        }
        .pag-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pag-sim {
            padding: 16px; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 800; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            background: var(--green); color: #000;
        }
        .pag-nao {
            padding: 16px; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 800; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            background: rgba(255,71,87,0.15);
            color: var(--red);
            border: 1px solid rgba(255,71,87,0.35);
        }

        /* Leaflet dark overrides */
        .leaflet-popup-content-wrapper {
            background: var(--surface2) !important;
            color: var(--text) !important;
            border-radius: 16px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
            border: 1px solid var(--border) !important;
        }
        .leaflet-popup-tip { background: var(--surface2) !important; }
        .leaflet-popup-content { margin: 14px 16px !important; }
        .leaflet-bar a { background: var(--surface2) !important; color: var(--text) !important; border-color: var(--border) !important; }
        .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 12px !important; overflow: hidden; }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
    <div class="load-logo">🛵</div>
    <div class="load-title">Painel do Entregador</div>
    <div class="load-sub">Carregando rotas...</div>
    <div class="load-bar-wrap"><div class="load-bar"></div></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- PAGAMENTO MODAL -->
<div id="pagamentoModal">
    <div class="pag-box">
        <div class="pag-icon">💰</div>
        <div class="pag-title" id="pagNome">Cliente pagou?</div>
        <div class="pag-sub" id="pagSub">Este cliente escolheu pagar na entrega.</div>
        <div class="pag-valor" id="pagValor">R$ 0,00</div>
        <div class="pag-btns">
            <button class="pag-sim" onclick="responderPagamento(true)">✅ Sim, pagou</button>
            <button class="pag-nao" onclick="responderPagamento(false)">❌ Não pagou</button>
        </div>
    </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal">
    <div class="confirm-box">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title" id="confirmTitle">Entrega confirmada!</div>
        <div class="confirm-sub" id="confirmSub">Você saiu da área do cliente.</div>
        <button class="confirm-btn" onclick="confirmarEntregaModal()">✓ Confirmar entrega</button>
        <button class="confirm-cancel" onclick="fecharConfirmModal()">Cancelar</button>
    </div>
</div>

<!-- APP -->
<div id="mainApp">

    <!-- HEADER -->
    <div id="appHeader">
        <div class="header-brand">🛵 <span>Entregador</span></div>
        <div class="gps-badge off" id="gpsBadge">
            <div class="gps-dot"></div>
            <span id="gpsText">GPS off</span>
        </div>
    </div>

    <!-- MAPA -->
    <div id="mapaWrapper">
        <div id="mapaDiv"></div>
        <div id="proximidadeChip">📍 Calculando...</div>
        <button id="btnRecentrar" onclick="recentrarMapa()">🛵</button>
    </div>

    <!-- PAINEL INFERIOR -->
    <div id="painelInferior">
        <div class="drag-handle"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="abrirTab('rota')">🗺️ Rota Ativa</button>
            <button class="tab-btn" onclick="abrirTab('paradas')">📋 Paradas</button>
            <button class="tab-btn" onclick="abrirTab('todas')">📁 Todas</button>
        </div>

        <!-- TAB ROTA -->
        <div id="tab-rota" class="tab-content active">
            <div id="rotaAtivaContent"></div>
        </div>

        <!-- TAB PARADAS -->
        <div id="tab-paradas" class="tab-content">
            <div id="paradasContent"></div>
        </div>

        <!-- TAB TODAS AS ROTAS -->
        <div id="tab-todas" class="tab-content">
            <div id="todasRotasContent"></div>
        </div>
    </div>
</div>

<script>
// ===== CONFIGURAÇÃO =====
const SUPABASE_URL = "https://vpeyqgijajywgswmezlh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FABRICA = [-8.1837523, -34.9383004];
const RAIO_ENTREGA = 40; // metros para confirmar entrega
const INTERVALO_GPS = 4000; // ms entre envios de posição

// ===== ESTADO =====
let mapaObj = null;
let motoMarker = null;
let seguindoMoto = true;
let posAtual = null;
let motoBearing = 0;
let watchId = null;
let gpsInterval = null;
let rotaAtual = null;
let paradasList = [];
let paradaEmConfirmacao = null;
let estavaNaParada = false;
let paradaAtualId = null;
let realtimeCh = null;
let todasAsRotas = [];
let mediaMinPorParada = 12;
let toastTimer = null;
let paradaPagamentoPendente = null; // parada aguardando resposta de pagamento

// Limites do mapa — Pernambuco
const PE_BOUNDS = L.latLngBounds
    ? null // será setado após Leaflet carregar
    : null;
const PE_SW = [-9.48, -41.37]; // sudoeste PE
const PE_NE = [-7.15, -34.79]; // nordeste PE

// ===== INIT =====
window.onload = async () => {
    await carregarLeaflet();
    inicializarMapa();
    await carregarDados();
    iniciarGPS();
    iniciarRealtimeRotas();
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('mainApp').style.flexDirection = 'column';
};

// ===== LEAFLET =====
async function carregarLeaflet() {
    return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
        document.head.appendChild(link);
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
        script.onload = resolve; script.onerror = reject;
        document.head.appendChild(script);
    });
}

function inicializarMapa() {
    const peBounds = L.latLngBounds(PE_SW, PE_NE);

    mapaObj = L.map('mapaDiv', {
        zoomControl: false,
        attributionControl: false,
        maxBounds: peBounds,
        maxBoundsViscosity: 1.0,  // impede arrastar para fora de PE
        minZoom: 9,               // não deixa zoom muito afastado
        maxZoom: 20
    }).setView(FABRICA, 14);

    // Força mapa a ficar dentro de PE
    mapaObj.setMaxBounds(peBounds);

    // Tiles escuros
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        bounds: peBounds
    }).addTo(mapaObj);

    // Labels
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
        maxZoom: 20, opacity: 0.6,
        bounds: peBounds
    }).addTo(mapaObj);

    L.control.zoom({ position: 'topright' }).addTo(mapaObj);
    mapaObj.on('dragstart', () => { seguindoMoto = false; });
}

// ===== DADOS =====
async function carregarDados() {
    await calcularMediaEta();
    const { data: rotas } = await sb.from("delivery_routes")
        .select("*").order("hora_saida", { ascending: true });
    todasAsRotas = rotas || [];

    const emAndamento = todasAsRotas.find(r => r.status === 'em_andamento');
    if (emAndamento) {
        rotaAtual = emAndamento;
        paradasList = emAndamento.paradas || [];
    }

    renderTudo();
    renderizarMapaCompleto();
}

async function calcularMediaEta() {
    const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
    const base = ontem.toISOString().split('T')[0];
    const { data: hist } = await sb.from("delivery_routes")
        .select("paradas, saida_em, fim_em")
        .gte("created_at", base + 'T00:00:00')
        .lte("created_at", base + 'T23:59:59')
        .eq("status", "concluido").limit(5);
    if (hist?.length) {
        const ts = hist.filter(h => h.saida_em && h.fim_em && h.paradas?.length)
            .map(h => (new Date(h.fim_em) - new Date(h.saida_em)) / 60000 / h.paradas.length);
        if (ts.length) { mediaMinPorParada = ts.reduce((a, b) => a + b, 0) / ts.length; return; }
    }
    mediaMinPorParada = 12;
}

// ===== REALTIME =====
function iniciarRealtimeRotas() {
    if (realtimeCh) { try { sb.removeChannel(realtimeCh); } catch(e){} }
    realtimeCh = sb.channel('entregador_rotas')
        .on('postgres_changes', {
            event: '*', schema: 'public', table: 'delivery_routes'
        }, async () => {
            await carregarDados();
        })
        .subscribe();
}

// ===== GPS =====
function iniciarGPS() {
    if (!navigator.geolocation) {
        setBadge(false, 'Sem suporte');
        return;
    }
    setBadge(true, 'Conectando...');

    watchId = navigator.geolocation.watchPosition(
        pos => processarPosicao(pos),
        err => setBadge(false, 'GPS erro'),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 2000 }
    );

    // Fallback: envia posição a cada INTERVALO_GPS mesmo parado
    gpsInterval = setInterval(() => {
        if (posAtual) enviarPosicaoSupabase(posAtual[0], posAtual[1]);
    }, INTERVALO_GPS);
}

async function processarPosicao(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    setBadge(true, `±${Math.round(acc)}m`);

    // Calcula direção
    if (posAtual) {
        const dx = Math.abs(lat - posAtual[0]);
        const dy = Math.abs(lon - posAtual[1]);
        if (dx > 0.000005 || dy > 0.000005) motoBearing = calcBearing(posAtual, [lat, lon]);
    }
    posAtual = [lat, lon];

    // Atualiza marcador no mapa
    posicionarMoto([lat, lon]);

    // Envia para Supabase
    await enviarPosicaoSupabase(lat, lon, acc);

    // Verifica proximidade com paradas
    if (rotaAtual && paradasList.length) verificarProximidade(lat, lon);
}

async function enviarPosicaoSupabase(lat, lon, acc = 0) {
    try {
        const ts = new Date().toISOString();
        await sb.from("config").upsert(
            { key: "admin_gps", value: JSON.stringify({ lat, lon, ts, precisao: acc, rota_id: rotaAtual?.id || null }) },
            { onConflict: 'key' }
        );
        if (rotaAtual?.id) {
            await sb.from("delivery_routes")
                .update({ posicao_entregador: { lat, lon, ts, precisao: acc } })
                .eq("id", rotaAtual.id);
        }
    } catch(e) { console.warn('GPS send err:', e); }
}

function setBadge(on, txt) {
    const badge = document.getElementById('gpsBadge');
    const label = document.getElementById('gpsText');
    badge.className = 'gps-badge' + (on ? '' : ' off');
    label.textContent = txt;
}

// ===== PROXIMIDADE =====
function verificarProximidade(lat, lon) {
    const proxima = paradasList.find(p => p.status === 'pendente' && p.coords);
    if (!proxima) return;

    const dist = calcDistM(lat, lon, proxima.coords[0], proxima.coords[1]);
    const chip = document.getElementById('proximidadeChip');
    chip.style.display = 'block';

    if (dist <= RAIO_ENTREGA) {
        chip.className = 'proximidadeChip chegando';
        chip.textContent = `📍 Na área de ${proxima.nome}!`;
        if (!estavaNaParada || paradaAtualId !== proxima.id) {
            estavaNaParada = true;
            paradaAtualId = proxima.id;
            // Mostra confirm de chegada E checa se tem pagamento pendente
            mostrarConfirmModal(proxima);
            verificarPagamentoEntrega(proxima);
        }
    } else if (dist <= 200) {
        chip.className = 'proximidadeChip longe';
        chip.textContent = `🛵 ${Math.round(dist)}m de ${proxima.nome}`;
        if (estavaNaParada && paradaAtualId === proxima.id) {
            // Saiu da área → confirma entrega
            estavaNaParada = false;
            paradaAtualId = null;
            fecharConfirmModal();
            executarMarcarEntregue(proxima.id, proxima.nome);
        }
    } else {
        chip.className = 'proximidadeChip longe';
        chip.textContent = `🏁 ${Math.round(dist)}m — ${proxima.nome}`;
        if (estavaNaParada && paradaAtualId === proxima.id) {
            estavaNaParada = false;
            paradaAtualId = null;
            fecharConfirmModal();
            executarMarcarEntregue(proxima.id, proxima.nome);
        }
    }

    renderProximaCard(proxima, dist);
}

// ===== PAGAMENTO NA ENTREGA =====
async function verificarPagamentoEntrega(parada) {
    if (!parada.cliente_phone) return;

    // Busca pedido de hoje do cliente
    const hoje = new Date().toISOString().split('T')[0];
    const { data: pedidos } = await sb.from("orders")
        .select("id, total, payment_method, customer_name")
        .eq("customer_phone", parada.cliente_phone)
        .gte("created_at", hoje + 'T00:00:00')
        .lte("created_at", hoje + 'T23:59:59')
        .order("created_at", { ascending: false })
        .limit(1);

    if (!pedidos || !pedidos.length) return;
    const pedido = pedidos[0];

    // Só exibe se o pagamento for exatamente "PAGA NA ENTREGA"
    if ((pedido.payment_method || '').toUpperCase() !== 'PAGA NA ENTREGA') return;

    // Guarda parada para uso na resposta
    paradaPagamentoPendente = { parada, pedido };

    // Preenche modal
    document.getElementById('pagNome').textContent = `${parada.nome} pagou?`;
    document.getElementById('pagSub').textContent = `Pagamento: ${pedido.payment_method} · Pedido de hoje`;
    document.getElementById('pagValor').textContent = `R$ ${Number(pedido.total).toFixed(2).replace('.', ',')}`;

    // Pequeno delay para não sobrepor o confirm modal
    setTimeout(() => {
        document.getElementById('confirmModal').classList.remove('show');
        document.getElementById('pagamentoModal').classList.add('show');
    }, 800);
}

async function responderPagamento(pagou) {
    document.getElementById('pagamentoModal').classList.remove('show');
    if (!paradaPagamentoPendente) return;

    const { parada, pedido } = paradaPagamentoPendente;
    paradaPagamentoPendente = null;

    if (pagou) {
        // ✅ Pagou — marca pedido como pago
        await sb.from("orders")
            .update({ payment_method: pedido.payment_method + ' ✓' })
            .eq("id", pedido.id);
        showToast(`✅ Pagamento de ${parada.nome} confirmado!`, 'success');
    } else {
        // ❌ Não pagou — lança no fiado (débito)
        await sb.from("orders")
            .update({ payment_method: 'FIADO' })
            .eq("id", pedido.id);

        // Adiciona ao débito do cliente
        const { data: cliente } = await sb.from("clients")
            .select("debt").eq("phone", parada.cliente_phone).maybeSingle();
        const debtAtual = cliente?.debt || 0;
        const novaDebt = debtAtual + Number(pedido.total);
        await sb.from("clients")
            .update({ debt: novaDebt })
            .eq("phone", parada.cliente_phone);

        showToast(`⚠️ ${parada.nome} lançado no fiado — R$ ${Number(pedido.total).toFixed(2).replace('.', ',')}`, 'warn');
    }
}

// ===== CONFIRM MODAL =====
function mostrarConfirmModal(parada) {
    paradaEmConfirmacao = parada;
    document.getElementById('confirmTitle').textContent = `Chegou em ${parada.nome}!`;
    document.getElementById('confirmSub').textContent = `📍 ${parada.endereco}\nSaia da área para confirmar automaticamente, ou confirme agora.`;
    document.getElementById('confirmModal').classList.add('show');
}

function fecharConfirmModal() {
    document.getElementById('confirmModal').classList.remove('show');
}

async function confirmarEntregaModal() {
    fecharConfirmModal();
    if (paradaEmConfirmacao) {
        estavaNaParada = false;
        paradaAtualId = null;
        await executarMarcarEntregue(paradaEmConfirmacao.id, paradaEmConfirmacao.nome);
        paradaEmConfirmacao = null;
    }
}

async function executarMarcarEntregue(paradaId, nome) {
    const p = paradasList.find(x => x.id === paradaId);
    if (!p || p.status === 'entregue') return;
    p.status = 'entregue';

    await sb.from("delivery_routes")
        .update({ paradas: paradasList })
        .eq("id", rotaAtual.id);

    const proxNome = paradasList.find(x => x.status === 'pendente')?.nome;
    showToast(proxNome ? `✅ ${nome} entregue! Próximo: ${proxNome}` : `✅ ${nome} entregue! Rota concluída!`, 'success');

    // Verifica se todas as paradas foram entregues
    const todasEntregues = paradasList.every(p => p.status === 'entregue');
    if (todasEntregues) {
        await sb.from("delivery_routes")
            .update({ status: 'concluido', fim_em: new Date().toISOString() })
            .eq("id", rotaAtual.id);
        await sb.from("config").upsert({ key: "admin_gps", value: JSON.stringify({ lat: null, lon: null, ts: null }) }, { onConflict: 'key' });
        showToast('🏁 Todas as entregas concluídas!', 'success');
        rotaAtual = null;
    }

    renderTudo();
    renderizarMapaCompleto();
}

// ===== MAPA =====
function posicionarMoto(pos) {
    if (!mapaObj || !window.L) return;

    const html = `
        <div style="position:relative;width:56px;height:56px;display:flex;align-items:center;justify-content:center;">
            <div style="position:absolute;inset:-16px;border-radius:50%;
                background:radial-gradient(circle,rgba(245,166,35,0.18) 0%,transparent 70%);
                animation:ondaMoto 2.5s ease-out infinite;pointer-events:none;"></div>
            <div style="position:absolute;inset:-8px;border-radius:50%;
                border:2px solid rgba(245,166,35,0.35);
                animation:anelMoto 2.5s ease-out infinite;pointer-events:none;"></div>
            <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
                width:32px;height:7px;border-radius:50%;
                background:rgba(0,0,0,0.4);filter:blur(3px);"></div>
            <div style="font-size:30px;transform:rotate(${motoBearing}deg);
                transition:transform 0.5s ease;
                filter:drop-shadow(0 2px 8px rgba(245,166,35,0.8));
                position:relative;z-index:2;">🛵</div>
            <style>
                @keyframes ondaMoto{0%{transform:scale(0.5);opacity:0.8}80%{transform:scale(2.2);opacity:0}100%{transform:scale(0.5);opacity:0}}
                @keyframes anelMoto{0%{transform:scale(0.6);opacity:1}100%{transform:scale(2.4);opacity:0}}
            </style>
        </div>`;

    const icon = L.divIcon({ html, className: '', iconSize: [56, 56], iconAnchor: [28, 28] });

    if (motoMarker) {
        motoMarker.setLatLng(pos);
        motoMarker.setIcon(icon);
    } else {
        motoMarker = L.marker(pos, { icon, zIndexOffset: 1000 })
            .addTo(mapaObj)
            .bindPopup('<b>🛵 Você está aqui</b>');
    }

    if (seguindoMoto) {
        mapaObj.setView(pos, mapaObj.getZoom() || 16, { animate: true, duration: 0.4 });
    }
}

function renderizarMapaCompleto() {
    if (!mapaObj || !window.L) return;

    // Limpa tudo exceto tiles
    mapaObj.eachLayer(l => { if (!(l instanceof L.TileLayer)) mapaObj.removeLayer(l); });
    motoMarker = null;

    const paradas = paradasList.filter(p => p.coords);
    const pendentes = paradas.filter(p => p.status !== 'entregue');
    const proxima = pendentes[0] || null;

    // Marcador fábrica
    L.marker(FABRICA, {
        icon: L.divIcon({
            html: `<div style="width:40px;height:40px;border-radius:12px;
                background:linear-gradient(135deg,#f5a623,#e67e22);
                display:flex;align-items:center;justify-content:center;
                font-size:20px;
                box-shadow:0 4px 16px rgba(245,166,35,0.5);
                border:2px solid rgba(255,255,255,0.2);">🏭</div>`,
            className: '', iconSize: [40, 40], iconAnchor: [20, 20]
        })
    }).addTo(mapaObj).bindPopup('<b>🏭 Fábrica</b>');

    // Linha tracejada rota completa
    if (paradas.length >= 1) {
        const pts = [FABRICA, ...paradas.map(p => p.coords)];
        L.polyline(pts, { color: '#ff4757', weight: 2, opacity: 0.3, dashArray: '8 6' }).addTo(mapaObj);
    }

    // Linha azul para próxima
    if (posAtual && proxima?.coords) {
        L.polyline([posAtual, proxima.coords], { color: '#3d9cff', weight: 4, opacity: 0.85 }).addTo(mapaObj);
    }

    // Marcadores das paradas
    paradas.forEach((p, i) => {
        const entregue = p.status === 'entregue';
        const isProx = proxima && p.id === proxima.id;
        const bg = entregue ? '#00e87a' : isProx ? '#f5a623' : '#3d9cff';
        const pulse = isProx ? 'animation:paradaPulse 1.5s ease-in-out infinite;' : '';
        const lbl = entregue ? '✓' : String(i + 1);

        const icon = L.divIcon({
            html: `<div style="width:34px;height:34px;border-radius:50%;
                background:${bg};display:flex;align-items:center;justify-content:center;
                font-size:13px;font-weight:900;color:${entregue?'#000':'white'};
                border:3px solid rgba(255,255,255,0.3);
                box-shadow:0 3px 12px rgba(0,0,0,0.5);
                opacity:${entregue?0.45:1};
                ${pulse}
            ">${lbl}</div>
            <style>@keyframes paradaPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0.7)}70%{box-shadow:0 0 0 12px rgba(245,166,35,0)}}</style>`,
            className: '', iconSize: [34, 34], iconAnchor: [17, 17]
        });

        const status = entregue ? '✅ Entregue' : isProx ? '▶ Próxima parada' : '⏳ Pendente';
        L.marker(p.coords, { icon }).addTo(mapaObj)
            .bindPopup(`<div style="min-width:140px;">
                <div style="font-weight:800;font-size:14px;color:var(--text);">${p.nome}</div>
                <div style="font-size:11px;color:rgba(240,240,248,0.55);margin-top:3px;">📍 ${p.endereco}</div>
                <div style="margin-top:6px;font-size:12px;font-weight:700;color:${entregue?'#00e87a':isProx?'#f5a623':'#3d9cff'};">${status}</div>
                <div style="font-size:11px;color:rgba(240,240,248,0.4);">⏱️ ~${p.eta_min}min</div>
            </div>`);
    });

    // Posiciona moto
    if (posAtual) posicionarMoto(posAtual);

    // Ajusta zoom
    const pts = [FABRICA, ...paradas.map(p => p.coords)];
    if (pts.length >= 2 && !posAtual) {
        mapaObj.fitBounds(L.latLngBounds(pts), { padding: [50, 50], maxZoom: 16 });
    }
    if (posAtual) {
        mapaObj.setView(posAtual, 15);
        seguindoMoto = true;
    }
}

function recentrarMapa() {
    seguindoMoto = true;
    if (posAtual) mapaObj.setView(posAtual, 16, { animate: true });
    else mapaObj.setView(FABRICA, 14, { animate: true });
}

            <div style="margin-top:10px;">
                <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;">
                    <div style="height:100%;width:${total?Math.round(entregues/total*100):0}%;background:${cor};border-radius:4px;transition:width 0.5s;"></div>
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">📦 ${entregues}/${total} entregas</div>
            </div>` : ''}
        </div>`;
    }).join('');
}

// ===== TABS =====
function abrirTab(nome) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + nome).classList.add('active');
    event.currentTarget.classList.add('active');
}

// ===== TOAST =====
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 4000);
}

// ===== UTILS =====
function calcBearing(c1, c2) {
    const lat1 = c1[0] * Math.PI / 180, lat2 = c2[0] * Math.PI / 180;
    const dLon = (c2[1] - c1[1]) * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function calcDistM(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
