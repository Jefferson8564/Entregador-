<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Entregador · O Rei da Coxinha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a28;
  --border: rgba(255,255,255,0.07);
  --gold: #f5c842;
  --gold2: #e8a020;
  --green: #22d97a;
  --red: #ff4d6d;
  --orange: #ff8c42;
  --text: #f0eeff;
  --muted: rgba(240,238,255,0.45);
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); }

/* ── MAPA ── */
#map { position: fixed; inset: 0; z-index: 0; }
.maplibregl-ctrl-attrib, .maplibregl-ctrl-bottom-right, .maplibregl-ctrl-top-right { display:none !important; }

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  background: linear-gradient(to bottom, rgba(10,10,15,0.98), transparent);
  pointer-events: none;
}
#header > * { pointer-events: auto; }
.header-brand { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; color: var(--gold); }
.header-brand span { color: var(--text); font-weight: 400; }

/* GPS status pill */
#gpsPill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(10,10,15,0.85); border: 1px solid var(--border);
  border-radius: 100px; padding: 5px 12px 5px 8px;
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  backdrop-filter: blur(10px);
}
#gpsDot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
#gpsDot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
#gpsDot.err { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Ping badge dentro do pill */
#gpsPing {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--green); opacity: 0.7; margin-left: 2px;
}

/* Botão reload */
#btnReload {
  background: none; border: none; padding: 4px;
  font-size: 18px; cursor: pointer; opacity: 0.7;
  transition: opacity 0.2s, transform 0.2s;
  line-height: 1;
}
#btnReload:active { opacity: 1; transform: rotate(180deg); }

/* Lista de paradas */
#listaParadas { overflow-y: auto; padding-top: 4px; }
#listaParadas::-webkit-scrollbar { display: none; }

/* Botão painel 📩 — abaixo do 3D */
#btnPainel {
  position: fixed; right: 14px; top: calc(50% + 68px); 
  z-index: 110;
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #9b59f5, #5b21b6);
  border: 2px solid rgba(167,110,255,0.6);
  font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(139,92,246,0.7), 0 0 32px rgba(139,92,246,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: all 0.25s;
}
#btnPainel:active { transform: scale(0.93); }
#btnPainel.ativo {
  background: radial-gradient(circle at 35% 35%, #c084fc, #7c3aed);
  border-color: rgba(192,132,252,0.8);
  box-shadow: 0 0 24px rgba(167,110,255,0.9), 0 0 48px rgba(139,92,246,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
}

/* ── TELA DE INFORMAÇÕES (substitui o mapa) ── */
#telaInfo {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
#telaInfo.aberta { transform: translateX(0); }

/* Header da tela */
#telaInfoHeader {
  display: flex; align-items: center; gap: 12px;
  padding: 52px 20px 16px;
  background: linear-gradient(to bottom, rgba(10,10,15,0.98), transparent);
  flex-shrink: 0;
}
#btnFecharTela {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: rgba(139,92,246,0.15); color: #c084fc;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(139,92,246,0.3); flex-shrink: 0;
}
#telaInfoTitulo {
  font-size: 18px; font-weight: 800; color: var(--text); flex: 1;
}

/* Abas dentro da tela */
#telaAbas {
  display: flex; gap: 8px; padding: 0 20px 16px; flex-shrink: 0;
}
.tela-aba {
  flex: 1; padding: 9px 0; border-radius: 12px; border: none;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  background: rgba(139,92,246,0.08); color: rgba(192,132,252,0.45);
  border: 1px solid rgba(139,92,246,0.12);
}
.tela-aba.ativa {
  background: rgba(139,92,246,0.22); color: #c084fc;
  border-color: rgba(139,92,246,0.5);
  box-shadow: 0 0 12px rgba(139,92,246,0.2);
}

/* Conteúdo das abas */
.tela-tab { display: none; flex: 1; overflow-y: auto; padding: 0 20px 32px; }
.tela-tab.ativa { display: block; }
.tela-tab::-webkit-scrollbar { display: none; }

/* Cards de info roxos */
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 4px;
}
.info-card {
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.22);
  border-radius: 18px; padding: 18px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  position: relative; overflow: hidden;
}
.info-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: radial-gradient(circle at 30% 30%, rgba(192,132,252,0.07), transparent 70%);
}
.info-card-icon { font-size: 24px; line-height: 1; }
.info-card-val {
  font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500;
  color: #c084fc; line-height: 1;
}
.info-card-lbl {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  color: rgba(192,132,252,0.45); text-align: center;
}

.rota-card {
  border-radius: 18px; padding: 16px 18px; margin-bottom: 10px;
  border: 1.5px solid rgba(139,92,246,0.2);
  background: rgba(139,92,246,0.06);
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.rota-card:active { transform: scale(0.98); }
.rota-card.ativa {
  border-color: var(--gold);
  background: rgba(245,200,66,0.07);
}
.rota-card.ativa::before {
  content:''; position:absolute; inset:0; border-radius:18px;
  box-shadow: 0 0 0 1.5px var(--gold) inset;
  animation: glowCard 1.5s ease-in-out infinite alternate;
}
.rota-card.concluida {
  border-color: rgba(34,217,122,0.2);
  background: rgba(34,217,122,0.04);
}
.rota-card-top { display:flex; align-items:center; gap:12px; }
.rota-card-icon {
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; font-family:'DM Mono',monospace;
  background:rgba(139,92,246,0.15); color:rgba(192,132,252,0.7);
  border:1px solid rgba(139,92,246,0.25);
}
.rota-card.ativa .rota-card-icon { background:var(--gold); color:#000; border-color:var(--gold); font-size:16px; }
.rota-card.concluida .rota-card-icon { background:rgba(34,217,122,0.15); color:var(--green); border-color:rgba(34,217,122,0.3); }
.rota-card-info { flex:1; min-width:0; }
.rota-card-nome { font-size:15px; font-weight:800; color:var(--text); }
.rota-card.ativa .rota-card-nome { color:var(--gold); }
.rota-card.concluida .rota-card-nome { color:var(--green); }
.rota-card-meta { font-size:11px; color:var(--muted); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
.rota-card-badge {
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
  padding:3px 9px; border-radius:100px; flex-shrink:0;
}
.rota-card-badge.ag { background:rgba(139,92,246,0.15); color:#c084fc; }
.rota-card-badge.em { background:rgba(245,200,66,0.18); color:var(--gold); }
.rota-card-badge.ok { background:rgba(34,217,122,0.15); color:var(--green); }
.rota-card-progress {
  margin-top:10px; background:rgba(255,255,255,0.06);
  border-radius:20px; height:5px; overflow:hidden;
}
.rota-card-progress-bar {
  height:100%; border-radius:20px; transition:width 0.4s;
}
.rota-card-chevron {
  font-size:16px; color:var(--muted); flex-shrink:0; transition:transform 0.2s;
}

.parada-card {
  border-radius: 14px; padding: 13px 14px; margin-bottom: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative; overflow: hidden;
}
.parada-card.pendente { border-color: rgba(255,140,66,0.3); }
.parada-card.entregue { border-color: rgba(34,217,122,0.25); background: rgba(34,217,122,0.05); }
.parada-card.proxima { border-color: var(--gold); background: rgba(245,200,66,0.08); }
.parada-card.proxima::before {
  content:''; position:absolute; inset:0; border-radius:14px;
  box-shadow: 0 0 0 2px var(--gold) inset;
  animation: glowCard 1.5s ease-in-out infinite alternate;
}
@keyframes glowCard { from{opacity:0.4} to{opacity:1} }

.parada-ordem {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; font-family: 'DM Mono', monospace;
  background: rgba(255,255,255,0.08); color: var(--muted);
}
.parada-card.proxima .parada-ordem { background: var(--gold); color: #000; }
.parada-card.entregue .parada-ordem { background: rgba(34,217,122,0.2); color: var(--green); }

.parada-info { flex: 1; min-width: 0; }
.parada-nome { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.parada-end { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.parada-dist { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; }

.parada-status-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 3px 8px; border-radius: 100px; flex-shrink: 0;
}
.badge-pendente { background: rgba(255,140,66,0.15); color: var(--orange); }
.badge-entregue { background: rgba(34,217,122,0.15); color: var(--green); }
.badge-proxima  { background: var(--gold); color: #000; }

/* ── MODAL DE ENTREGA ── */
#modalEntrega {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
#modalEntrega.open { display: flex; }
#modalBox {
  background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
  border-top: 1px solid var(--border);
  width: 100%; max-width: 600px; padding: 20px 20px 36px;
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-nome { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.modal-end  { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

.modal-pedido-box {
  background: var(--surface2); border-radius: 12px; padding: 12px 14px;
  margin-bottom: 16px; border: 1px solid var(--border);
  font-size: 13px; line-height: 1.7; color: var(--text);
}
.modal-pedido-total { font-weight: 800; font-size: 16px; color: var(--gold); margin-top: 8px; }

.label-sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }

/* Pagamento */
.pag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.pag-btn {
  padding: 12px 10px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--surface2); color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer; text-align: center;
  transition: border-color 0.15s, background 0.15s;
}
.pag-btn.sel { border-color: var(--gold); background: rgba(245,200,66,0.12); color: var(--gold); }
.pag-btn:nth-child(3) { grid-column: 1/-1; }

/* Troco */
#trocoBox { margin-bottom: 16px; display: none; }
#trocoInput {
  width: 100%; padding: 13px 14px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px;
  font-weight: 500; outline: none;
}
#trocoInput:focus { border-color: var(--gold); }

/* Botões do modal */
.modal-btns { display: flex; gap: 10px; }
.btn-cancelar {
  flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-confirmar {
  flex: 2; padding: 14px; border-radius: 14px; border: none;
  background: var(--green); color: #000; font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 800; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-confirmar:disabled { opacity: 0.4; }
.btn-confirmar.fiado-btn { background: var(--orange); }

/* ── TOAST ── */
#toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
  z-index: 300; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 100px; padding: 10px 20px; font-size: 13px; font-weight: 700;
  white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok   { border-color: var(--green); color: var(--green); }
#toast.err  { border-color: var(--red); color: var(--red); }
#toast.info { border-color: var(--gold); color: var(--gold); }

/* ── ALERTA PROXIMIDADE ── */
#alertaProx {
  position: fixed; top: 70px; left: 16px; right: 16px; z-index: 150;
  background: var(--gold); color: #000; border-radius: 16px;
  padding: 14px 18px; font-weight: 800; font-size: 14px;
  display: none; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(245,200,66,0.4);
  animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  cursor: pointer;
}
#alertaProx.show { display: flex; }
@keyframes bounceIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }

/* ── BOTÃO 2D/3D ── */
#btn3D {
  position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
  z-index: 110;
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #9b59f5, #5b21b6);
  border: 2px solid rgba(167,110,255,0.6);
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
  color: #fff; cursor: pointer; letter-spacing: 0.5px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(139,92,246,0.7), 0 0 32px rgba(139,92,246,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: all 0.25s;
}
#btn3D:active { transform: translateY(-50%) scale(0.93); }
#btn3D.ativo {
  background: radial-gradient(circle at 35% 35%, #c084fc, #7c3aed);
  border-color: rgba(192,132,252,0.8);
  box-shadow: 0 0 24px rgba(167,110,255,0.9), 0 0 48px rgba(139,92,246,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
}

/* marcadores custom */
/* ── MARCADORES DE CLIENTES estilo roxo ── */
.mk-ent { 
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--gold); border: 3px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; box-shadow: 0 4px 16px rgba(245,200,66,0.5);
}

/* Wrapper do pin do cliente */
.mk-cli-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
}

/* Círculo roxo com ícone de usuário */
.mk-cli-circle {
  width: 46px; height: 46px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #7c4dbb, #3b1278);
  border: 2px solid rgba(150,100,210,0.45);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(80,30,160,0.35);
  position: relative; overflow: hidden;
  transition: transform 0.15s;
  font-size: 22px; line-height: 1;
}
.mk-cli-circle:active { transform: scale(0.92); }

/* Estado entregue — verde */
.mk-cli-circle.entregue {
  background: radial-gradient(circle at 35% 30%, #1a9e5a, #0f5c33);
  border-color: rgba(60,180,100,0.4);
  box-shadow: 0 2px 6px rgba(20,140,70,0.3);
  opacity: 0.7;
}

/* Número de ordem — badge no canto superior direito */
.mk-cli-badge {
  position: absolute; top: -3px; right: -3px;
  background: #f5c842; color: #000;
  border-radius: 50%; width: 18px; height: 18px;
  font-size: 9px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.mk-cli-circle.entregue .mk-cli-badge { display: none; }

/* Nome do cliente embaixo do círculo */
.mk-cli-label {
  background: rgba(60,20,100,0.88);
  color: #e9d5ff; font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 100px;
  white-space: nowrap; max-width: 90px;
  overflow: hidden; text-overflow: ellipsis;
  border: 1px solid rgba(139,92,246,0.4);
  box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
}
.mk-cli-circle.entregue + .mk-cli-label {
  background: rgba(10,50,30,0.85);
  color: #86efac; border-color: rgba(34,217,122,0.3);
}

/* ── VELOCÍMETRO estilo Waze ── */
#velocimetro {
  position: fixed; left: 14px; bottom: 110px; z-index: 110;
  width: 90px; height: 90px; border-radius: 50%;
  background: rgba(30,30,40,0.75);
  border: 3px solid #9b59f5;
  box-shadow: 0 0 12px rgba(139,92,246,0.45), inset 0 0 12px rgba(139,92,246,0.08);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0; transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  cursor: default; user-select: none;
}
#velocimetro.overspeed {
  background: rgba(255,77,109,0.85);
  border-color: #ff4d6d;
  box-shadow: 0 0 28px rgba(255,77,109,0.9), 0 0 60px rgba(255,77,109,0.4), inset 0 0 20px rgba(255,0,40,0.3);
  animation: veloShake 0.4s ease;
}
#velocimetro.overspeed #veloNum { color: #fff; }
#velocimetro.overspeed #veloUnit { color: rgba(255,255,255,0.8); }
@keyframes veloShake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
}
#veloNum {
  font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500;
  color: #c084fc; line-height: 1; letter-spacing: -1px;
  transition: color 0.3s;
}
#veloUnit {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px;
  color: #9b59f5; text-transform: uppercase; margin-top: 2px;
  transition: color 0.3s; opacity: 0.8;
}
/* limite da via */
#veloLimite {
  position: fixed; left: 14px; bottom: 78px; z-index: 110;
  width: 90px; height: 22px; border-radius: 6px;
  background: rgba(10,10,15,0.7); border: 1px solid rgba(139,92,246,0.25);
  display: none; align-items: center; justify-content: center; gap: 4px;
  font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(155,89,245,0.6);
  backdrop-filter: blur(8px);
}

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://vpeyqgijajywgswmezlh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Posição da fábrica (centro inicial) — mesma do Adm

const FABRICA_LON = -34.9384996;
const RAIO_ALERTA = 80; // metros para disparar alerta de proximidade

// ── ESTADO ──────────────────────────────────────────────────────────────
let map, mkEntregador;
let _modo3D = false;
let _bearingAtual = 0;
let _bearingHist = [];
let _ultimaPosAnterior = null;
let rotaAtiva = null;       // objeto rota do Supabase
let filaRotasHoje = [];     // todas as rotas do dia
let rotaSelecionada = null; // rota cujas paradas estão expandidas no painel

// Exploração livre no 2D: pausa o seguimento enquanto o usuário arrasta
let _explorandoMapa = false;
let _timerRecentrar = null;
const TEMPO_RECENTRAR = 10000; // 10 segundos sem toque → recentra

// Velocímetro
let _veloHist = [];
let _limiteVia = null;
let _limiteTimer = null;

// ── VELOCÍMETRO estilo Waze ──────────────────────────────────────────────

function atualizarVelocimetro(kmh) {
  const vel = Math.max(0, Math.min(kmh, 200));
  document.getElementById('veloNum').textContent = Math.round(vel);

  const el = document.getElementById('velocimetro');
  const overspeed = _limiteVia !== null && vel > _limiteVia + 2;
  el.classList.toggle('overspeed', overspeed);
}

async function buscarLimiteVia(lat, lon) {
  // Consulta Overpass para pegar maxspeed da via mais próxima
  const query = `[out:json][timeout:5];way(around:25,${lat},${lon})[highway][maxspeed];out 1;`;
  try {
    const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
    const json = await res.json();
    const via = json.elements?.[0];
    if (via?.tags?.maxspeed) {
      const raw = via.tags.maxspeed;
      // Suporta "40", "40 mph", "BR:urban", etc.
      const num = parseInt(raw);
      if (!isNaN(num)) {
        // Converte mph para km/h se necessário
        _limiteVia = raw.toLowerCase().includes('mph') ? Math.round(num * 1.609) : num;
        document.getElementById('veloLimVal').textContent = _limiteVia;
        document.getElementById('veloLimite').classList.add('show');
        return;
      }
    }
  } catch(e) { /* sem internet ou timeout — ignora */ }
  // Se não encontrou limite, tenta fallback por tipo de via
  try {
    const q2 = `[out:json][timeout:5];way(around:25,${lat},${lon})[highway];out 1;`;
    const r2 = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q2)}`);
    const j2 = await r2.json();
    const tipo = j2.elements?.[0]?.tags?.highway;
    const defaults = { motorway:120, trunk:100, primary:80, secondary:60, tertiary:50,
                       residential:40, living_street:20, service:30, unclassified:50 };
    if (tipo && defaults[tipo]) {
      _limiteVia = defaults[tipo];
      document.getElementById('veloLimVal').textContent = _limiteVia;
      document.getElementById('veloLimite').classList.add('show');
    }
  } catch(e) {}
}


function _calcBearing(lat1, lon1, lat2, lon2) {
  const r = d => d * Math.PI / 180;
  const dL = r(lon2 - lon1);
  const y  = Math.sin(dL) * Math.cos(r(lat2));
  const x  = Math.cos(r(lat1)) * Math.sin(r(lat2)) - Math.sin(r(lat1)) * Math.cos(r(lat2)) * Math.cos(dL);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
function _suavizarBearing(b) {
  _bearingHist.push(b);
  if (_bearingHist.length > 6) _bearingHist.shift();
  let s = 0, co = 0;
  _bearingHist.forEach(v => { s += Math.sin(v*Math.PI/180); co += Math.cos(v*Math.PI/180); });
  return (Math.atan2(s, co) * 180 / Math.PI + 360) % 360;
}
function toggle3D() {
  _modo3D = !_modo3D;
  const btn = document.getElementById('btn3D');
  btn.classList.toggle('ativo', _modo3D);
  btn.textContent = _modo3D ? '3D' : '2D';
  if (!map || !posEntregador) return;
  if (_modo3D) {
    map.easeTo({ center:[posEntregador.lon, posEntregador.lat], pitch:72, bearing:_bearingAtual, zoom:18.5, duration:900, padding:_getMapPadding() });
  } else {
    map.easeTo({ pitch:0, bearing:0, zoom:15, duration:700, padding:_paddingNormal });
  }
}

// top grande empurra o centro para baixo → moto fica a ~20% da parte inferior da tela
// Usado apenas no modo 3D
function _getMapPadding() {
  const h = window.innerHeight;
  return { top: Math.round(h * 0.60), bottom: 0, left: 0, right: 0 };
}
const _paddingNormal = { top: 0, bottom: 0, left: 0, right: 0 };

function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [FABRICA_LON, FABRICA_LAT], zoom: 14,
    attributionControl: false
  });

  map.on('load', () => {
    // Marcador do entregador
    const elEnt = document.createElement('div');
    elEnt.className = 'mk-ent';
    elEnt.textContent = '🛵';
    mkEntregador = new maplibregl.Marker({ element: elEnt, anchor: 'center' })
      .setLngLat([FABRICA_LON, FABRICA_LAT])
      .addTo(map);
  });

  // No 2D: detecta quando o usuário começa a arrastar/zoom → pausa o seguimento
  map.on('dragstart', () => { if (!_modo3D) _iniciarExploracao(); });
  map.on('zoomstart', (e) => { if (!_modo3D && e.originalEvent) _iniciarExploracao(); });
  map.on('rotatestart', () => { if (!_modo3D) _iniciarExploracao(); });
}

function _iniciarExploracao() {
  if (_explorandoMapa) return; // já explorando, reinicia timer
  _explorandoMapa = true;
  clearTimeout(_timerRecentrar);
  let restante = 10;
  const intervalo = setInterval(() => {
    restante--;
    if (restante <= 0) clearInterval(intervalo);
  }, 1000);

  _timerRecentrar = setTimeout(() => {
    clearInterval(intervalo);
    _explorandoMapa = false;
    if (posEntregador && !_modo3D) {
      map.easeTo({ center:[posEntregador.lon, posEntregador.lat], zoom:15, duration:800, padding:_paddingNormal });
    }
  }, TEMPO_RECENTRAR);
}

// ── GPS ──────────────────────────────────────────────────────────────────
function iniciarGPS() {
  if (!navigator.geolocation) {
    setGPSStatus('err', 'GPS indisponível');
    return;
  }
  gpsWatcher = navigator.geolocation.watchPosition(
    onGPSUpdate,
    onGPSErro,
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

async function onGPSUpdate(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = Math.round(pos.coords.accuracy);
  posEntregador = { lat, lon };

  setGPSStatus('ok', `±${acc}m`);
  mkEntregador.setLngLat([lon, lat]);

  // Velocidade: usa a do GPS se disponível
  let kmh = 0;
  if (pos.coords.speed != null && pos.coords.speed >= 0) {
    kmh = pos.coords.speed * 3.6;
  }
  // Suaviza com média dos últimos 4 valores
  _veloHist.push(kmh);
  if (_veloHist.length > 4) _veloHist.shift();
  const kmhSuave = _veloHist.reduce((a,b) => a+b, 0) / _veloHist.length;
  atualizarVelocimetro(kmhSuave);

  // Busca limite da via a cada ~200m ou na primeira leitura
  const _posAnteriorLimite = window._posAnteriorLimite;
  const deveConsultar = !_posAnteriorLimite ||
    distancia(lat, lon, _posAnteriorLimite[0], _posAnteriorLimite[1]) > 200;
  if (deveConsultar) {
    window._posAnteriorLimite = [lat, lon];
    clearTimeout(_limiteTimer);
    _limiteTimer = setTimeout(() => buscarLimiteVia(lat, lon), 800);
  }

  // Calcular bearing (direção do movimento)
  if (_ultimaPosAnterior) {
    const dLat = Math.abs(lat - _ultimaPosAnterior[0]);
    const dLon = Math.abs(lon - _ultimaPosAnterior[1]);
    if (dLat + dLon > 0.00003) {
      const raw = _calcBearing(_ultimaPosAnterior[0], _ultimaPosAnterior[1], lat, lon);
      _bearingAtual = _suavizarBearing(raw);
    }
  }
  _ultimaPosAnterior = [lat, lon];

  // Câmera segue a moto (moto posicionada a ~20% da parte inferior)
  if (_modo3D) {
    map.easeTo({ center:[lon, lat], bearing:_bearingAtual, pitch:72, zoom:18.5, duration:800, essential:true, padding:_getMapPadding() });
  } else if (!_explorandoMapa) {
    map.easeTo({ center:[lon, lat], zoom:15, duration:600, padding:_paddingNormal });
  }

  // Salva no Supabase
  await salvarGPS(lat, lon, acc);

  // Atualizar distâncias na lista
  renderLista();

  // Verificar proximidade
  verificarProximidade(lat, lon);
}

function onGPSErro(err) {
  setGPSStatus('err', 'sem sinal');
}

let _gpsUltimoTs = null;

function setGPSStatus(tipo, txt) {
  const dot = document.getElementById('gpsDot');
  const lbl = document.getElementById('gpsLabel');
  const ping = document.getElementById('gpsPing');
  dot.className = tipo === 'ok' ? 'ok' : 'err';
  lbl.textContent = txt;

  // Calcula ping entre updates
  if (tipo === 'ok') {
    const agora = Date.now();
    if (_gpsUltimoTs) {
      const ms = agora - _gpsUltimoTs;
      ping.textContent = ms < 2000 ? ` · ${ms}ms` : ` · ${(ms/1000).toFixed(1)}s`;
    }
    _gpsUltimoTs = agora;
  } else {
    ping.textContent = '';
    _gpsUltimoTs = null;
  }
}

async function salvarGPS(lat, lon, acc) {
  const now = new Date().toISOString();
  // Sempre salva em gps.entregador_pos — fonte única de verdade para o Stats
  await sb.from('gps').upsert({ chave: 'entregador_gps', valor: JSON.stringify({ lat, lon, ts: now, acc }) });
  // Se tiver rota ativa, atualiza também para o histórico da rota
  if (rotaAtiva?.id) {
    await sb.from('rotas').update({
      gps_lat: lat, gps_lon: lon,
      gps_ts: now, gps_precisao: acc,
      posicao_entregador: { lat, lon, ts: now }
    }).eq('id', rotaAtiva.id);
  }
}

// ── ROTA ────────────────────────────────────────────────────────────────
async function carregarRota() {
  const hoje = new Date().toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });

  const { data } = await sb.from('rotas')
    .select('*')
    .in('status', ['criada', 'em_andamento', 'aguardando', 'concluido'])
    .order('created_at', { ascending: true });

  if (data && data.length > 0) {
    // Prioridade 1: rota em andamento hoje — entregador é dono, nunca substituir
    const emAndamentoHoje = data.find(r => {
      if (r.status !== 'em_andamento' && r.status !== 'aguardando') return false;
      const saidaData = r.saida_em
        ? new Date(r.saida_em).toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' })
        : null;
      return saidaData === hoje || !r.saida_em;
    });

    if (emAndamentoHoje) {
      // Só atualiza se for a mesma rota (não deixa ADM substituir em meio à entrega)
      if (!rotaAtiva || rotaAtiva.id === emAndamentoHoje.id) {
        rotaAtiva = emAndamentoHoje;
      }
    } else {
      // Prioridade 2: próxima rota criada do dia
      const criada = data.find(r => {
        if (r.status !== 'criada' && r.status !== 'aguardando') return false;
        const dtRota = r.saida_em || r.created_at;
        const dataRota = new Date(dtRota).toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
        return dataRota === hoje || !r.saida_em;
      });
      rotaAtiva = criada || null;
    }
  } else {
    rotaAtiva = null;
  }

  // Pega paradas brutas (sem _meta)
  let paradasBruto = rotaAtiva
    ? (rotaAtiva.paradas || []).filter(p => !p._meta)
    : [];

  // Enriquece com coordenadas da tabela clientes (ADM salva template sem coords)
  if (paradasBruto.length > 0) {
    const phones = paradasBruto.map(p => p.cliente_phone).filter(Boolean);
    const { data: clientes } = await sb.from('clientes')
      .select('phone, delivery_lat, delivery_lon, lat, lon')
      .in('phone', phones);

    const coordMap = {};
    (clientes || []).forEach(c => {
      const cLat = c.delivery_lat ?? c.lat;
      const cLon = c.delivery_lon ?? c.lon;
      if (cLat && cLon) coordMap[c.phone] = [cLat, cLon];
    });

    paradasBruto = paradasBruto.map(p => {
      if (!p.coords && coordMap[p.cliente_phone]) {
        return { ...p, coords: coordMap[p.cliente_phone] };
      }
      return p;
    });
  }

  paradas = paradasBruto;

  // Monta fila de rotas do dia:
  // - Rotas recorrentes: têm _meta com dias_semana → filtra pelo dia de hoje
  // - Rotas avulsas/manuais: sem _meta → inclui se status ativo (criada/em_andamento/aguardando)
  //   ou se foi concluída hoje
  const diaHoje = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', weekday: 'short' });
  const diaFormatado = diaHoje.charAt(0).toUpperCase() + diaHoje.slice(1).replace('.','');
  filaRotasHoje = (data || []).filter(r => {
    const meta = (r.paradas || []).find(x => x._meta) || {};
    const dias = meta.dias_semana || [];
    // Rota recorrente: filtra por dia da semana
    if (dias.length > 0) return dias.includes(diaFormatado);
    // Rota avulsa/manual: inclui se ativa ou concluída hoje
    if (r.status === 'criada' || r.status === 'em_andamento' || r.status === 'aguardando') return true;
    if (r.status === 'concluido' && r.fim_em) {
      const fimData = new Date(r.fim_em).toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
      return fimData === hoje;
    }
    return false;
  }).sort((a, b) => {
    const hA = ((a.paradas || []).find(x => x._meta) || {}).hora_saida || '00:00';
    const hB = ((b.paradas || []).find(x => x._meta) || {}).hora_saida || '00:00';
    return hA.localeCompare(hB);
  });

  renderTudo();
  mostrarSemRota();

  // Se o painel de paradas de uma rota está aberto, atualiza ele também
  if (rotaSelecionada) {
    const rotaAtualizada = filaRotasHoje.find(r => r.id === rotaSelecionada.id);
    if (rotaAtualizada) abrirParadasRota(rotaAtualizada.id);
  }
}

function mostrarSemRota() {
  document.getElementById('semRota').style.display =
    (!rotaAtiva && paradas.length === 0) ? 'block' : 'none';
}

// ── REALTIME ─────────────────────────────────────────────────────────────
function iniciarRealtime() {
  if (realtimeCh) sb.removeChannel(realtimeCh);
  realtimeCh = sb.channel('ent_rota')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rotas' }, async () => {
      await carregarRota();
    })
    .subscribe();
}

// ── RENDER MAPA ───────────────────────────────────────────────────────────
let mkClientesGlobal = {}; // phone → marker (todos os clientes com coords)

async function carregarEPlotarClientes() {
  // Espera o mapa estar pronto
  if (!map || !map.loaded()) {
    map.once('load', () => carregarEPlotarClientes());
    return;
  }

  const { data: clientes } = await sb.from('clientes')
    .select('phone, name, delivery_lat, delivery_lon, lat, lon')
    .eq('active', true);

  if (!clientes || clientes.length === 0) return;

  // Remove todos os marcadores anteriores
  Object.values(mkClientesGlobal).forEach(mk => mk.remove());
  mkClientesGlobal = {};

  // Monta lista com coordenadas válidas
  const lista = clientes.map(cli => ({
    ...cli,
    lat: cli.delivery_lat ?? cli.lat,
    lon: cli.delivery_lon ?? cli.lon,
  })).filter(c => c.lat && c.lon);

  // Atualiza total no header do painel
  const el = document.getElementById('totalComLocalizacao');
  if (el) el.textContent = lista.length;

  // ── SEPARAÇÃO: só dentro de 20m, lado a lado ─────────────────────────
  // 20m em graus ≈ 0.00018°
  const RAIO_20M = 0.00018;

  const posAjustada = lista.map(c => ({ lat: c.lat, lon: c.lon }));
  const visitado = new Set();

  for (let i = 0; i < lista.length; i++) {
    if (visitado.has(i)) continue;
    const grupo = [i];
    for (let j = i + 1; j < lista.length; j++) {
      if (visitado.has(j)) continue;
      const dLat = lista[i].lat - lista[j].lat;
      const dLon = lista[i].lon - lista[j].lon;
      if (Math.sqrt(dLat*dLat + dLon*dLon) < RAIO_20M) {
        grupo.push(j);
        visitado.add(j);
      }
    }
    visitado.add(i);
    if (grupo.length === 1) continue;

    // Espaço lateral entre marcadores (~50px em graus no zoom 15)
    const passo = 0.00045;
    const total = (grupo.length - 1) * passo;
    grupo.forEach((idx, k) => {
      posAjustada[idx] = {
        lat: lista[idx].lat,
        lon: lista[idx].lon - total / 2 + k * passo,
      };
    });
  }
  // ─────────────────────────────────────────────────────────────────────

  lista.forEach((cli, idx) => {
    const { lat, lon } = posAjustada[idx];

    // Verifica se está na rota ativa e qual status
    const paradaRota = paradas.find(p => p.cliente_phone === cli.phone);
    const entregue = paradaRota?.status === 'entregue';
    const ordem = paradaRota ? paradas.indexOf(paradaRota) + 1 : null;
    const nome = (cli.name || '').split(' ')[0] || '?';

    // Wrapper
    const el = document.createElement('div');
    el.className = 'mk-cli-wrap';

    // Círculo roxo com emoji
    const circle = document.createElement('div');
    circle.className = 'mk-cli-circle' + (entregue ? ' entregue' : '');
    circle.innerHTML = `<span style="font-size:22px;line-height:1">👤</span>`;

    // Badge com número de ordem (só quem está na rota e pendente)
    if (ordem && !entregue) {
      const badge = document.createElement('div');
      badge.className = 'mk-cli-badge';
      badge.textContent = ordem;
      circle.appendChild(badge);
    }

    // Label com nome
    const label = document.createElement('div');
    label.className = 'mk-cli-label';
    label.textContent = entregue ? '✓ ' + nome : nome;

    el.appendChild(label);
    el.appendChild(circle);

    const mk = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([lon, lat])
      .addTo(map);

    // Clique abre modal só se estiver na rota
    if (paradaRota) {
      el.addEventListener('click', () => abrirModal(paradaRota));
    }

    mkClientesGlobal[cli.phone] = mk;
  });
}

// ── RENDER CARDS DE ROTAS ────────────────────────────────────────────────
function renderRotaCards() {
  const box = document.getElementById('rotaCardsList');
  const paradasBox = document.getElementById('rotaParadasBox');
  if (!box) return;

  // Atualiza contadores da aba Informações
  const elEnt = document.getElementById('infoEntregues');
  const elPend = document.getElementById('infoPendentes');
  if (elEnt) elEnt.textContent = paradas.filter(p => p.status === 'entregue').length;
  if (elPend) elPend.textContent = paradas.filter(p => p.status !== 'entregue').length;

  // Se não há rotas, mostra vazio
  if (!filaRotasHoje || filaRotasHoje.length === 0) {
    box.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Nenhuma rota para hoje</div>';
    paradasBox.style.display = 'none';
    return;
  }

  const statusLabel = { criada:'⏳ Aguardando', aguardando:'🏭 Na fábrica', em_andamento:'🛵 Em andamento', concluido:'✅ Concluída' };
  const badgeClass = { criada:'ag', aguardando:'ag', em_andamento:'em', concluido:'ok' };

  box.innerHTML = filaRotasHoje.map((r, idx) => {
    const meta = (r.paradas || []).find(x => x._meta) || {};
    const hora = meta.hora_saida || '--:--';
    const paradassRota = (r.paradas || []).filter(p => !p._meta);
    const total = paradassRota.length;
    const entregues = paradassRota.filter(p => p.status === 'entregue').length;
    const progresso = total > 0 ? Math.round((entregues/total)*100) : 0;
    const isAtiva = rotaAtiva && r.id === rotaAtiva.id;
    const isConcluida = r.status === 'concluido';
    const posLabel = ['1ª','2ª','3ª','4ª','5ª'][idx] || `${idx+1}ª`;
    const cardClass = isConcluida ? 'concluida' : isAtiva ? 'ativa' : '';
    const bc = badgeClass[r.status] || 'ag';
    const barColor = isConcluida ? 'var(--green)' : isAtiva ? 'var(--gold)' : 'rgba(192,132,252,0.4)';

    return `<div class="rota-card ${cardClass}" onclick="abrirParadasRota('${r.id}')">
      <div class="rota-card-top">
        <div class="rota-card-icon">${isConcluida ? '✓' : posLabel}</div>
        <div class="rota-card-info">
          <div class="rota-card-nome">${r.nome_rota || 'Rota'}</div>
          <div class="rota-card-meta">
            <span>🕐 ${hora}</span>
            ${total > 0 ? `<span>📦 ${entregues}/${total} entregas</span>` : '<span>Sem clientes hoje</span>'}
          </div>
        </div>
        <span class="rota-card-badge ${bc}">${statusLabel[r.status] || r.status}</span>
        <span class="rota-card-chevron">›</span>
      </div>
      ${total > 0 ? `<div class="rota-card-progress"><div class="rota-card-progress-bar" style="width:${progresso}%;background:${barColor};"></div></div>` : ''}
    </div>`;
  }).join('');
}

// Abre paradas de uma rota específica ao clicar no card
async function abrirParadasRota(rotaId) {
  const r = filaRotasHoje.find(x => x.id === rotaId);
  if (!r) return;
  rotaSelecionada = r;

  document.getElementById('rotaCardsList').style.display = 'none';
  document.getElementById('rotaParadasBox').style.display = 'block';
  document.getElementById('rotaParadasNome').textContent = r.nome_rota || 'Rota';

  // Monta paradas desta rota com coords
  let paradassRota = (r.paradas || []).filter(p => !p._meta);

  if (paradassRota.length > 0) {
    const phones = paradassRota.map(p => p.cliente_phone).filter(Boolean);
    const { data: clientes } = await sb.from('clientes')
      .select('phone, delivery_lat, delivery_lon, lat, lon').in('phone', phones);
    const coordMap = {};
    (clientes || []).forEach(c => {
      const cLat = c.delivery_lat ?? c.lat;
      const cLon = c.delivery_lon ?? c.lon;
      if (cLat && cLon) coordMap[c.phone] = [cLat, cLon];
    });
    paradassRota = paradassRota.map(p => (!p.coords && coordMap[p.cliente_phone])
      ? { ...p, coords: coordMap[p.cliente_phone] } : p);
  }

  const entregues = paradassRota.filter(p => p.status === 'entregue').length;
  const pendentes = paradassRota.filter(p => p.status !== 'entregue').length;
  document.getElementById('rotaParadasStats').textContent = `✅ ${entregues} entregues · ⏳ ${pendentes} restantes`;

  renderListaParadas(paradassRota, r.id === rotaAtiva?.id);
}

function fecharParadasRota() {
  rotaSelecionada = null;
  document.getElementById('rotaCardsList').style.display = 'block';
  document.getElementById('rotaParadasBox').style.display = 'none';
}

// ── RENDER LISTA DE PARADAS ───────────────────────────────────────────────
function renderListaParadas(paradassRota, isRotaAtiva) {
  const lista = document.getElementById('listaParadas');

  if (!paradassRota || paradassRota.length === 0) {
    lista.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Nenhuma parada nesta rota hoje</div>';
    return;
  }

  const pendentes = paradassRota.filter(p => p.status !== 'entregue');
  const proximaPhone = pendentes[0]?.cliente_phone;

  lista.innerHTML = paradassRota.map((p, idx) => {
    const entregue = p.status === 'entregue';
    const proxima = isRotaAtiva && p.cliente_phone === proximaPhone && !entregue;
    const dist = distanciaStr(p);
    const cls = entregue ? 'entregue' : (proxima ? 'proxima' : 'pendente');
    const badge = entregue
      ? '<span class="parada-status-badge badge-entregue">✓ Entregue</span>'
      : (proxima
        ? '<span class="parada-status-badge badge-proxima">Próxima</span>'
        : `<span class="parada-status-badge badge-pendente">#${idx+1}</span>`);
    const clickable = isRotaAtiva && !entregue;

    return `<div class="parada-card ${cls}" ${clickable ? `onclick="abrirModal(paradaSelecionada_${idx})"` : ''} data-idx="${idx}">
      <div class="parada-ordem">${entregue ? '✓' : idx+1}</div>
      <div class="parada-info">
        <div class="parada-nome">${p.nome || 'Cliente'}</div>
        <div class="parada-end">${p.endereco || p.coords ? (p.endereco || (p.coords[0].toFixed(4)+', '+p.coords[1].toFixed(4))) : 'Endereço não definido'}</div>
      </div>
      ${dist ? `<div class="parada-dist">${dist}</div>` : ''}
      ${badge}
    </div>`;
  }).join('');

  // Adiciona eventos de clique nas paradas da rota ativa
  if (isRotaAtiva) {
    lista.querySelectorAll('.parada-card[data-idx]').forEach(el => {
      const idx = parseInt(el.dataset.idx);
      const p = paradassRota[idx];
      if (p && p.status !== 'entregue') {
        el.onclick = () => abrirModal(p);
      }
    });
  }
}

// Mantém compatibilidade — renderLista agora só atualiza info e cards
function renderLista() {

}

function distanciaStr(p) {
  if (!posEntregador || !p.coords) return '';
  const [lat, lon] = p.coords;
  const d = distancia(posEntregador.lat, posEntregador.lon, lat, lon);
  if (d < 1000) return `${Math.round(d)}m`;
  return `${(d/1000).toFixed(1)}km`;
}

function renderTudo() {
  renderMarcadoresClientes();
  renderLista();
}

// ── PROXIMIDADE ───────────────────────────────────────────────────────────
function verificarProximidade(lat, lon) {
  const pendentes = paradas.filter(p => p.status !== 'entregue' && p.coords);
  if (pendentes.length === 0) { esconderAlerta(); return; }

  const prox = pendentes[0]; // primeiro pendente
  const [pLat, pLon] = prox.coords;
  const d = distancia(lat, lon, pLat, pLon);

  if (d <= RAIO_ALERTA) {
    mostrarAlerta(prox);
  } else {
    esconderAlerta();
  }
}

function mostrarAlerta(p) {
  alertaPhone = p.cliente_phone;
  document.getElementById('alertaNome').textContent = `📦 ${p.nome || 'Cliente'} — toque para registrar`;
  document.getElementById('alertaProx').classList.add('show');
}

function esconderAlerta() {
  alertaPhone = null;
  document.getElementById('alertaProx').classList.remove('show');
}

function abrirModalParaProximo() {
  const p = paradas.find(x => x.cliente_phone === alertaPhone);
  if (p) abrirModal(p);
}

// ── MODAL DE ENTREGA ──────────────────────────────────────────────────────
async function abrirModal(p) {
  if (p.status === 'entregue') return; // já entregue, ignora
  modalParada = p;
  pagSelecionado = null;

  // Busca pedido do cliente no ciclo atual
  const { data: pedidos } = await sb.from('pedidos')
    .select('*')
    .eq('customer_phone', p.cliente_phone)
    .eq('entregue', false)
    .order('created_at', { ascending: false })
    .limit(1);

  const pedido = pedidos?.[0];
  modalParada._pedido = pedido;

  document.getElementById('mNome').textContent = p.nome || 'Cliente';
  document.getElementById('mEnd').textContent = p.endereco || '';

  if (pedido) {
    document.getElementById('mItens').textContent = (pedido.items || '').replace(/✅ /g, '');
    document.getElementById('mTotal').textContent = `Total: R$ ${Number(pedido.total || 0).toFixed(2).replace('.', ',')}`;
  } else {
    document.getElementById('mItens').textContent = 'Sem pedido pendente registrado';
    document.getElementById('mTotal').textContent = '';
  }

  // Reset pagamento
  document.querySelectorAll('.pag-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('trocoBox').style.display = 'none';
  document.getElementById('trocoInput').value = '';
  document.getElementById('btnConfirmar').disabled = true;

  document.getElementById('modalEntrega').classList.add('open');
}

function fecharModal() {
  document.getElementById('modalEntrega').classList.remove('open');
  modalParada = null;
  pagSelecionado = null;
}

function selPag(tipo, btn) {
  pagSelecionado = tipo;
  document.querySelectorAll('.pag-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('trocoBox').style.display = tipo === 'dinheiro' ? 'block' : 'none';
  const conf = document.getElementById('btnConfirmar');
  conf.disabled = false;
  conf.className = tipo === 'fiado' ? 'btn-confirmar fiado-btn' : 'btn-confirmar';
  conf.textContent = tipo === 'fiado' ? '📋 Registrar Fiado' : '✅ Confirmar Entrega';
}

async function confirmarEntrega() {
  if (!modalParada || !pagSelecionado) return;
  const btn = document.getElementById('btnConfirmar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  const p = modalParada;
  const pedido = p._pedido;
  const agora = new Date().toISOString();

  try {
    // 1. Marca parada como entregue na rota
    if (rotaAtiva?.id) {
      const novasParadas = (rotaAtiva.paradas || []).map(x => {
        if (!x._meta && x.cliente_phone === p.cliente_phone) {
          return { ...x, status: 'entregue', entregue_em: agora, pagamento: pagSelecionado };
        }
        return x;
      });
      const entreguesCount = novasParadas.filter(x => !x._meta && x.status === 'entregue').length;
      await sb.from('rotas').update({
        paradas: novasParadas,
        phones_entregues: [...(rotaAtiva.phones_entregues || []), p.cliente_phone],
        entregas_realizadas: entreguesCount
      }).eq('id', rotaAtiva.id);
    }

    // 2. Marca pedido como entregue
    if (pedido?.id) {
      const upd = {
        entregue: true,
        entregue_em: agora,
        payment_method: pagSelecionado,
        status_entrega: 'entregue'
      };
      if (pagSelecionado === 'fiado') {
        upd.payment_method = 'FIADO';
      }
      await sb.from('pedidos').update(upd).eq('id', pedido.id);

      // 3. Se fiado: atualiza débito do cliente
      if (pagSelecionado === 'fiado') {
        const { data: cli } = await sb.from('clientes').select('debt').eq('phone', p.cliente_phone).maybeSingle();
        const debtAtual = parseFloat(cli?.debt || 0);
        await sb.from('clientes').update({
          debt: debtAtual + Number(pedido.total || 0),
          fiado: true
        }).eq('phone', p.cliente_phone);
      }
    }

    fecharModal();
    esconderAlerta();
    showToast('✅ Entrega confirmada!', 'ok');

    // Recarrega rota
    await carregarRota();

  } catch(e) {
    console.error(e);
    showToast('Erro ao salvar', 'err');
    btn.disabled = false;
    btn.textContent = '✅ Confirmar Entrega';
  }
}

// ── DISTÂNCIA (Haversine) ─────────────────────────────────────────────────
function distancia(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, tipo='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${tipo}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.className = '', 3000);
}

}
