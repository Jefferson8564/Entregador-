<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛵 Entregador — O Rei da Coxinha</title>
    <link rel="icon" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rei Entregas">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --primary: #f5a623;
            --primary-glow: rgba(245,166,35,0.3);
            --green: #00e87a;
            --green-glow: rgba(0,232,122,0.25);
            --blue: #3d9cff;
            --red: #ff4757;
            --text: #f0f0f8;
            --text-dim: rgba(240,240,248,0.5);
            --text-muted: rgba(240,240,248,0.28);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== LOADING ===== */
        #loadingScreen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        .load-logo {
            font-size: 56px;
            animation: logoPulse 1.4s ease-in-out infinite;
            filter: drop-shadow(0 0 24px var(--primary-glow));
        }
        @keyframes logoPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
        .load-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px; font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .load-sub { font-size: 13px; color: var(--text-muted); }
        .load-bar-wrap {
            width: 160px; height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px; overflow: hidden;
        }
        .load-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), #ff8c00);
            border-radius: 10px;
            animation: loadBar 1.8s ease forwards;
        }
        @keyframes loadBar { to { width: 100%; } }

        /* ===== LAYOUT FULLSCREEN ===== */
        #mainApp {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
        }

        /* ===== TOPO FLUTUANTE ===== */
        #topBar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 600;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px;
            pointer-events: none;
        }
        #topBrandBtn {
            display: flex; align-items: center; gap: 8px;
            background: rgba(10,10,15,0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 8px 14px 8px 10px;
            cursor: pointer; pointer-events: auto;
            transition: background 0.2s;
        }
        #topBrandBtn:active { background: rgba(10,10,15,0.95); }
        .top-brand-logo { font-size: 20px; }
        .top-brand-txt {
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 900;
            color: var(--text); letter-spacing: -0.3px;
        }
        .top-brand-caret {
            font-size: 18px; color: var(--primary);
            font-weight: 700; line-height: 1;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .top-brand-caret.open { transform: rotate(90deg); }
        #gpsBadge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
            background: rgba(0,232,122,0.15);
            border: 1px solid rgba(0,232,122,0.3);
            color: var(--green);
            pointer-events: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s;
        }
        #gpsBadge.off {
            background: rgba(255,71,87,0.12);
            border-color: rgba(255,71,87,0.3);
            color: var(--red);
        }
        .gps-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: currentColor;
            animation: gpsDot 1.2s ease-in-out infinite;
        }
        #gpsBadge.off .gps-dot { animation: none; }
        @keyframes gpsDot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.7);} }

        /* ===== MAPA FULLSCREEN ===== */
        #mapaWrapper {
            position: absolute; inset: 0; z-index: 1;
        }
        #mapaDiv { width: 100%; height: 100%; }

        /* ===== DRAWER (slide-up) ===== */
        #drawer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 700;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            max-height: 75vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.34,1.2,0.64,1);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
        }
        #drawer.open { transform: translateY(0); }

        .drawer-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 12px auto 4px;
            cursor: pointer;
        }

        /* ===== OVERLAY ===== */
        #drawerOverlay {
            position: fixed; inset: 0; z-index: 699;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(2px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #drawerOverlay.show { opacity: 1; pointer-events: auto; }

        /* ===== TABS ===== */
        .tabs {
            display: flex; gap: 4px;
            padding: 8px 14px 0;
        }
        .tab-btn {
            flex: 1; padding: 9px 8px;
            border: none; border-radius: 12px;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .tab-btn.active {
            background: var(--surface2);
            color: var(--text);
        }
        .tab-content { display: none; padding: 14px; }
        .tab-content.active { display: block; }

        /* ===== BOTÕES DO MAPA ===== */

        /* Botão recentrar */
        #btnRecentrar {
            position: absolute; bottom: 16px; right: 16px; z-index: 500;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--primary);
            border: none; cursor: pointer;
            font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px var(--primary-glow);
            transition: transform 0.2s;
        }
        #btnRecentrar:active { transform: scale(0.9); }

        /* Botão bússola */
        #btnBussola {
            position: absolute; bottom: 72px; right: 16px; z-index: 500;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        #btnBussola.heading-up {
            background: rgba(61,156,255,0.15);
            border-color: rgba(61,156,255,0.5);
            box-shadow: 0 4px 16px rgba(61,156,255,0.3);
        }
        #bussolaAgulha {
            transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            display: flex; align-items: center; justify-content: center;
        }

        /* Chip de proximidade */
        #proximidadeChip {
            position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
            z-index: 500; white-space: nowrap;
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
        }
        #proximidadeChip.chegando {
            background: rgba(0,232,122,0.2);
            border: 1px solid rgba(0,232,122,0.5);
            color: var(--green);
            animation: chipPulse 1s ease-in-out infinite;
        }
        #proximidadeChip.longe {
            background: rgba(61,156,255,0.15);
            border: 1px solid rgba(61,156,255,0.35);
            color: var(--blue);
        }
        @keyframes chipPulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

        /* ===== ROTA ATIVA CARD ===== */
        .rota-ativa-card {
            background: linear-gradient(135deg, rgba(245,166,35,0.12), rgba(255,140,0,0.06));
            border: 1px solid rgba(245,166,35,0.25);
            border-radius: 18px; padding: 14px 16px;
            margin-bottom: 12px;
        }
        .rota-ativa-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
        }
        .rota-nome {
            font-family: 'Syne', sans-serif;
            font-size: 16px; font-weight: 900;
            color: var(--primary);
        }
        .rota-status-badge {
            font-size: 10px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            background: rgba(0,232,122,0.15);
            color: var(--green);
            border: 1px solid rgba(0,232,122,0.3);
        }
        .rota-stats {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .rota-stat {
            background: rgba(255,255,255,0.04);
            border-radius: 12px; padding: 10px 8px;
            text-align: center;
        }
        .rota-stat-val {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 900;
        }
        .rota-stat-lbl {
            font-size: 10px; color: var(--text-muted);
            margin-top: 2px;
        }

        /* ===== PRÓXIMA PARADA ===== */
        .proxima-card {
            background: var(--surface2);
            border-radius: 18px; padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .proxima-card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--blue);
            border-radius: 2px 0 0 2px;
        }
        .proxima-card.chegando::before { background: var(--green); }
        .proxima-lbl {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .proxima-nome {
            font-family: 'Syne', sans-serif;
            font-size: 17px; font-weight: 800;
        }
        .proxima-end {
            font-size: 12px; color: var(--text-dim);
            margin-top: 4px;
        }
        .proxima-dist {
            display: flex; align-items: center; gap: 8px;
            margin-top: 10px; flex-wrap: wrap;
        }
        .btn-navegar {
            padding: 5px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            background: rgba(61,156,255,0.2);
            color: var(--blue);
            border: 1px solid rgba(61,156,255,0.4);
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
        }
        .btn-navegar:active { background: rgba(61,156,255,0.35); }
        .dist-badge {
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            background: rgba(61,156,255,0.15);
            color: var(--blue);
            border: 1px solid rgba(61,156,255,0.3);
        }
        .eta-badge {
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            background: rgba(245,166,35,0.12);
            color: var(--primary);
            border: 1px solid rgba(245,166,35,0.25);
        }

        /* ===== LISTA DE PARADAS ===== */
        .parada-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 16px;
            margin-bottom: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            transition: opacity 0.3s;
        }
        .parada-item.entregue { opacity: 0.4; }
        .parada-num {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900;
            flex-shrink: 0;
        }
        .parada-num.pendente { background: rgba(61,156,255,0.2); color: var(--blue); border: 1.5px solid rgba(61,156,255,0.4); }
        .parada-num.proxima { background: rgba(245,166,35,0.2); color: var(--primary); border: 1.5px solid rgba(245,166,35,0.4); animation: gpsDot 1.2s infinite; }
        .parada-num.entregue { background: rgba(0,232,122,0.15); color: var(--green); border: 1.5px solid rgba(0,232,122,0.3); }
        .parada-info { flex: 1; min-width: 0; }
        .parada-nome { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .parada-end { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .parada-eta { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

        /* ===== SEM ROTA ===== */
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text-dim); margin-bottom: 6px; }
        .empty-sub { font-size: 13px; line-height: 1.6; }

        /* ===== TOAST ===== */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px; border-radius: 20px;
            font-size: 13px; font-weight: 700;
            z-index: 9998; opacity: 0;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { background: rgba(0,232,122,0.15); border-color: rgba(0,232,122,0.4); color: var(--green); }
        #toast.warn { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.4); color: var(--primary); }

        /* ===== NAVIGATION BANNER (Google Maps style) ===== */
        #navBanner {
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            display: none;
            flex-direction: column;
            pointer-events: none;
        }
        #navBanner.ativo { display: flex; }

        .nav-main {
            background: #2d6a4f;
            padding: 14px 16px 12px;
            display: flex; align-items: center; gap: 14px;
            pointer-events: auto;
        }
        .nav-dir-icon {
            width: 52px; height: 52px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .nav-dir-icon svg {
            width: 44px; height: 44px; fill: white;
        }
        .nav-info { flex: 1; min-width: 0; }
        .nav-dist {
            font-family: 'Syne', sans-serif;
            font-size: 32px; font-weight: 900;
            color: #fff; line-height: 1;
            letter-spacing: -1px;
        }
        .nav-instrucao {
            font-size: 14px; color: rgba(255,255,255,0.85);
            margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .nav-instrucao b { color: #fff; font-size: 18px; font-family: 'Syne', sans-serif; font-weight: 800; }
        .nav-voice {
            width: 46px; height: 46px; border-radius: 50%;
            background: #fff; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
            pointer-events: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .nav-depois {
            background: rgba(30,70,50,0.95);
            backdrop-filter: blur(8px);
            padding: 9px 16px;
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; color: #fff;
            font-weight: 600;
            pointer-events: auto;
        }
        .nav-depois-icon { font-size: 18px; }
        .nav-depois-txt { opacity: 0.9; }

        /* Bottom nav bar (speed + eta) */
        #navBottom {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
            background: #1a1a26;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 12px 20px 20px;
            display: none; align-items: center; justify-content: space-between;
            pointer-events: auto;
        }
        #navBottom.ativo { display: flex; }
        .nav-speed-box {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.06);
            border-radius: 14px; padding: 8px 16px;
            min-width: 72px;
        }
        .nav-speed-val {
            font-family: 'Syne', sans-serif;
            font-size: 28px; font-weight: 900; color: #fff; line-height: 1;
        }
        .nav-speed-unit { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .nav-eta-box {
            text-align: center;
        }
        .nav-eta-min {
            font-family: 'Syne', sans-serif;
            font-size: 26px; font-weight: 900;
            color: #00e87a; line-height: 1;
        }
        .nav-eta-time {
            font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px;
        }
        .nav-dist-box {
            text-align: right;
        }
        .nav-dist-km {
            font-family: 'Syne', sans-serif;
            font-size: 18px; font-weight: 800; color: #fff;
        }
        .nav-dist-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .nav-close {
            position: fixed; bottom: 80px; left: 16px; z-index: 2100;
            width: 44px; height: 44px; border-radius: 50%;
            background: #1a1a26; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-size: 18px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }
        .nav-close.ativo { display: flex; }

        /* When nav is active, hide top bar and drawer */
        body.nav-ativa #topBar { display: none; }
        body.nav-ativa #drawer { display: none; }
        body.nav-ativa #drawerOverlay { display: none !important; }
        body.nav-ativa #btnRecentrar { bottom: 100px; }
        body.nav-ativa #btnBussola { bottom: 156px; }
        body.nav-ativa #proximidadeChip { display: none !important; }

        /* Perspectiva 3D — inclina o mapa no modo nav estilo Google Maps */
        #mapaWrapper {
            perspective: 1200px;
            perspective-origin: 50% 100%;
        }
        #mapaDiv {
            transform-origin: 50% 100%;
            transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        #mapaDiv.nav-tilt {
            transform: rotateX(30deg) scale(1.18);
        }

        /* Mapa rotacionado (heading-up) — gira o container interno do Leaflet */
        #mapaDiv.heading-up .leaflet-map-pane {
            transform-origin: center center;
            transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        /* Compensação: mantém labels/controles sem rotação */
        #mapaDiv.heading-up .leaflet-control-container {
            transform-origin: center center;
        }

        /* ===== LONG PRESS ROTA ===== */
        #longPressRing {
            position: fixed; z-index: 3000;
            pointer-events: none;
            display: none;
        }
        #longPressRing svg circle {
            transition: stroke-dashoffset 2s linear;
        }
        #longPressToast {
            position: fixed; bottom: 120px; left: 50%;
            transform: translateX(-50%);
            z-index: 3000; pointer-events: none;
            background: rgba(61,156,255,0.92);
            color: #fff; font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 800;
            padding: 10px 20px; border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(61,156,255,0.4);
            opacity: 0; transition: opacity 0.2s;
            white-space: nowrap;
        }
        #longPressToast.show { opacity: 1; }
        #confirmModal {
            position: fixed; inset: 0; z-index: 8000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: none; align-items: flex-end; justify-content: center;
        }
        #confirmModal.show { display: flex; }
        .confirm-box {
            background: var(--surface);
            border-radius: 28px 28px 0 0;
            padding: 24px 20px 36px;
            width: 100%; max-width: 500px;
            border-top: 1px solid var(--border);
            animation: slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }
        @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
        .confirm-icon { font-size: 42px; text-align: center; margin-bottom: 12px; }
        .confirm-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 6px; }
        .confirm-sub { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 20px; }
        .confirm-btn {
            width: 100%; padding: 16px;
            border: none; border-radius: 16px;

<script>
// ===== CONFIGURAÇÃO =====
const SUPABASE_URL = "https://vpeyqgijajywgswmezlh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FABRICA = [-8.1837523, -34.9383004];
const RAIO_ENTREGA = 40; // metros para confirmar entrega
const INTERVALO_GPS = 4000; // ms entre envios de posição

// ===== ESTADO =====
let mapaObj = null;
let motoMarker = null;

// ===== OSRM / ROTA REAL =====
let rotaCompletaLayer = null;   // polyline vermelha tracejada (rota completa pelas ruas)
let rotaProximaLayer = null;    // polyline azul (posição atual → próxima parada)
let cacheRotaCompleta = null;   // cache da rota completa (evita chamadas repetidas)
let cacheRotaCompletaKey = '';  // chave do cache (hash dos pontos)
let ultimaProximaId = null;     // evita redesenhar a azul sem necessidade
const OSRM_BASE = 'https://router.project-osrm.org/route/v1/driving/';

// Limites do mapa — Pernambuco
const PE_BOUNDS = L.latLngBounds
    ? null // será setado após Leaflet carregar
    : null;
const PE_SW = [-9.48, -41.37]; // sudoeste PE
const PE_NE = [-7.15, -34.79]; // nordeste PE

// ===== INIT =====
// Inicia imediatamente assim que o DOM estiver pronto — sem esperar nada
document.addEventListener('DOMContentLoaded', () => {
    // Mostra o app na hora
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('mainApp').style.flexDirection = 'column';

    // Inicia mapa (Leaflet já carregado no <head>)
    try { inicializarMapa(); } catch(e) { console.warn('Mapa err:', e); }

    // Dados e GPS em segundo plano
    carregarDados().catch(e => console.warn('Dados err:', e));

    iniciarRealtimeRotas();
});

window.onload = () => {}; // mantido por compatibilidade

// Leaflet carregado diretamente no <head>

// ===== LIMITE 15KM DA FÁBRICA =====
const RAIO_MAPA_KM = 15;

// Calcula bounds retangulares ~15km ao redor da fábrica
function calcularBounds15km(centro) {
    const kmParaGrau = 1 / 111; // ~111km por grau de latitude
    const lat = centro[0], lon = centro[1];
    const dLat = RAIO_MAPA_KM * kmParaGrau;
    const dLon = RAIO_MAPA_KM * kmParaGrau / Math.cos(lat * Math.PI / 180);
    return L.latLngBounds(
        [lat - dLat, lon - dLon],
        [lat + dLat, lon + dLon]
    );
}

function inicializarMapa() {
    const bounds15km = calcularBounds15km(FABRICA);

    mapaObj = L.map('mapaDiv', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 11,   // impede zoom out além da área
        maxZoom: 20,
        maxBounds: bounds15km,
        maxBoundsViscosity: 1.0  // borda rígida — não deixa sair
    }).setView(FABRICA, 14);

    // Tiles escuros — só dentro dos bounds
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        bounds: bounds15km
    }).addTo(mapaObj);

    // Labels
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
        maxZoom: 20, opacity: 0.6,
        bounds: bounds15km
    }).addTo(mapaObj);

    // Máscara visual — SVG que escurece tudo fora do raio de 15km
    adicionarMascaraCircular(bounds15km);

    L.control.zoom({ position: 'topright' }).addTo(mapaObj);
    mapaObj.on('dragstart', () => { seguindoMoto = false; });
}

function adicionarMascaraCircular(bounds) {
    // Cria um polígono com buraco circular no centro — efeito "donut"
    // O exterior cobre o mundo inteiro, o buraco é o raio de 15km
    const centro = L.latLng(FABRICA[0], FABRICA[1]);

    // Pontos do círculo (buraco) — 64 segmentos para suavidade
    const raioGrau = RAIO_MAPA_KM / 111;
    const circulo = [];
    for (let i = 0; i < 64; i++) {
        const ang = (i / 64) * 2 * Math.PI;
        const lat = FABRICA[0] + raioGrau * Math.sin(ang);
        const lon = FABRICA[1] + raioGrau / Math.cos(FABRICA[0] * Math.PI / 180) * Math.cos(ang);
        circulo.push([lat, lon]);
    }

    // Exterior enorme (cobre o mundo)
    const exterior = [
        [-90, -180], [-90, 180], [90, 180], [90, -180]
    ];

    // Polígono com buraco = área fora do círculo fica escura
    L.polygon([exterior, circulo], {
        color: 'transparent',
        fillColor: '#0a0a0f',
        fillOpacity: 0.82,
        interactive: false,
        pane: 'overlayPane'
    }).addTo(mapaObj);

    // Borda do círculo — linha sutil indicando o limite
    L.circle(centro, {
        radius: RAIO_MAPA_KM * 1000,
        color: 'rgba(245,166,35,0.25)',
        weight: 1.5,
        fill: false,
        dashArray: '6 8',
        interactive: false
    }).addTo(mapaObj);
}

// ===== DADOS =====
async function carregarDados() {
    await calcularMediaEta();

    const hoje = new Date().toISOString().split('T')[0];

    // Busca rotas, clientes e pedidos de hoje em paralelo
    const [{ data: rotas }, { data: clientesCadastrados }, { data: pedidosHoje }] = await Promise.all([
        sb.from("delivery_routes").select("*").order("hora_saida", { ascending: true }),
        sb.from("clients").select("*"),
        sb.from("orders")
            .select("customer_phone")
            .gte("created_at", hoje + 'T00:00:00')
            .lte("created_at", hoje + 'T23:59:59')
    ]);

    // Phones que fizeram pedido hoje
    const phonesComPedido = new Set((pedidosHoje || []).map(p => p.customer_phone));

    // Aplica lógica de status por data
    todasAsRotas = (rotas || []).map(r => {
        const concluidoHoje = r.fim_em && r.fim_em.startsWith(hoje);
        const emAndamentoHoje = r.saida_em && r.saida_em.startsWith(hoje);
        if (r.status === 'concluido' && !concluidoHoje) return { ...r, status: 'criada' };
        if (r.status === 'em_andamento' && !emAndamentoHoje) return { ...r, status: 'criada' };
        return r;
    });

    // Para cada rota com status "criada", regenera as paradas ativas
    // baseado no paradas_template × quem pediu hoje — sem precisar abrir o ADM
    for (const rota of todasAsRotas) {
        const template = rota.paradas_template || [];
        if (template.length === 0) continue;

        const paradasAtivas = template
            .filter(p => p.cliente_phone && phonesComPedido.has(p.cliente_phone))
            .map((p, i) => ({
                ...p,
                status: rota.status === 'em_andamento'
                    ? (rota.paradas?.find(a => a.cliente_phone === p.cliente_phone)?.status || 'pendente')
                    : 'pendente',
                eta_min: Math.round((i + 1) * mediaMinPorParada)
            }));

        // Só atualiza no banco se a rota ainda não começou (criada) e as paradas mudaram
        if (rota.status === 'criada') {
            const ativasAntes = JSON.stringify(rota.paradas || []);
            const ativasAgora = JSON.stringify(paradasAtivas);
            if (ativasAntes !== ativasAgora) {
                await sb.from("delivery_routes")
                    .update({ paradas: paradasAtivas })
                    .eq("id", rota.id);
            }
            rota.paradas = paradasAtivas;
        }
    }

    // Clientes no mapa (todos os cadastrados com coordenadas)
    todosOsClientes = (clientesCadastrados || []).map(c => {
        let coords = null;
        if (c.delivery_lat && c.delivery_lon) {
            coords = [parseFloat(c.delivery_lat), parseFloat(c.delivery_lon)];
        }
        return { ...c, nome: c.name, coords };
    }).filter(c => c.coords);

    const emAndamento = todasAsRotas.find(r => r.status === 'em_andamento');
    if (emAndamento) {
        rotaAtual = emAndamento;
        paradasList = emAndamento.paradas || [];
    } else {
        rotaAtual = null;
        paradasList = [];
    }

    renderTudo();
    renderizarMapaCompleto();
    if (typeof navAtiva !== 'undefined' && navAtiva) { navRotaParadaId = null; carregarStepsParaProxima(); }
}

async function calcularMediaEta() {
    const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
    const base = ontem.toISOString().split('T')[0];
    const { data: hist } = await sb.from("delivery_routes")
        .select("paradas, saida_em, fim_em")
        .gte("created_at", base + 'T00:00:00')
        .lte("created_at", base + 'T23:59:59')
        .eq("status", "concluido").limit(5);
    if (hist?.length) {
        const ts = hist.filter(h => h.saida_em && h.fim_em && h.paradas?.length)
            .map(h => (new Date(h.fim_em) - new Date(h.saida_em)) / 60000 / h.paradas.length);
        if (ts.length) { mediaMinPorParada = ts.reduce((a, b) => a + b, 0) / ts.length; return; }
    }
    mediaMinPorParada = 12;
}

// ===== REALTIME =====
function iniciarRealtimeRotas() {
    if (realtimeCh) { try { sb.removeChannel(realtimeCh); } catch(e){} }
    realtimeCh = sb.channel('entregador_rotas')
        .on('postgres_changes', {
            event: '*', schema: 'public', table: 'delivery_routes'
        }, async () => {
            await carregarDados();
        })
        .subscribe();
}

// ===== GPS =====
let ultimoEnvioGPS = 0; // controle de throttle
const THROTTLE_GPS_MS = 3000; // envia pro Supabase no máximo a cada 3s

function iniciarGPS() {
    if (!navigator.geolocation) {
        setBadge(false, 'Sem suporte');
        return;
    }
    setBadge(true, 'Conectando...');

    // maximumAge: 3000 evita leituras duplicadas em menos de 3s
    watchId = navigator.geolocation.watchPosition(
        pos => processarPosicao(pos),
        err => setBadge(false, 'GPS erro'),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 }
    );
}

async function processarPosicao(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    setBadge(true, `±${Math.round(acc)}m`);

    // Calcula direção e distância movida
    let distMovida = 999;
    if (posAtual) {
        const dx = Math.abs(lat - posAtual[0]);
        const dy = Math.abs(lon - posAtual[1]);
        if (dx > 0.000005 || dy > 0.000005) motoBearing = calcBearing(posAtual, [lat, lon]);
        distMovida = calcDistM(posAtual[0], posAtual[1], lat, lon);
    }
    posAtual = [lat, lon];

    // Atualiza marcador no mapa sempre (visual fluido)
    posicionarMoto([lat, lon]);

    // Heading-up — rotaciona mapa com a direção
    if (headingUp) aplicarRotacaoMapa(motoBearing);

    // Envia pro Supabase no máximo a cada 3s (throttle)
    const agora = Date.now();
    if (agora - ultimoEnvioGPS >= THROTTLE_GPS_MS) {
        ultimoEnvioGPS = agora;
        await enviarPosicaoSupabase(lat, lon, acc);
    }

    // Verifica proximidade com paradas
    if (rotaAtual && paradasList.length) await verificarProximidade(lat, lon);

    // Atualiza banner de navegação
    atualizarNavVelocidade(lat, lon, Date.now());
    if (navAtiva) atualizarNavBanner();

    // Atualiza rota azul se entregador moveu mais de 50m
    if (rotaAtual && distMovida > 50) {
        const proxima = paradasList.find(p => p.status === 'pendente' && p.coords);
        if (proxima) {
            ultimaProximaId = null; // força redesenho da rota azul
            desenharRotaProxima(posAtual, proxima);
        }
    }
}

async function enviarPosicaoSupabase(lat, lon, acc = 0) {
    try {
        const ts = new Date().toISOString();
        await sb.from("config").upsert(
            { key: "admin_gps", value: JSON.stringify({ lat, lon, ts, precisao: acc, rota_id: rotaAtual?.id || null }) },
            { onConflict: 'key' }
        );
        if (rotaAtual?.id) {
            await sb.from("delivery_routes")
                .update({ posicao_entregador: { lat, lon, ts, precisao: acc } })
                .eq("id", rotaAtual.id);
        }
    } catch(e) { console.warn('GPS send err:', e); }
}

function setBadge(on, txt) {
    const badge = document.getElementById('gpsBadge');
    const label = document.getElementById('gpsText');
    badge.className = 'gps-badge' + (on ? '' : ' off');
    label.textContent = txt;
}

// ===== PROXIMIDADE =====
async function verificarProximidade(lat, lon) {
    // Processa todas as paradas pendentes em loop — para encadear paradas no mesmo local
    let continuar = true;
    while (continuar) {
        continuar = false;
        const proxima = paradasList.find(p => p.status === 'pendente' && p.coords);
        if (!proxima) {
            document.getElementById('proximidadeChip').style.display = 'none';
            return;
        }

        const dist = calcDistM(lat, lon, proxima.coords[0], proxima.coords[1]);
        const chip = document.getElementById('proximidadeChip');
        chip.style.display = 'block';

        if (dist <= RAIO_ENTREGA) {
            // ✅ Está na área — marca entregue imediatamente
            chip.className = 'proximidadeChip chegando';
            chip.textContent = `✅ Entregando ${proxima.nome}...`;

            // Só dispara uma vez por parada
            if (paradaAtualId !== proxima.id) {
                paradaAtualId = proxima.id;
                estavaNaParada = true;
                verificarPagamentoEntrega(proxima);
                await executarMarcarEntregue(proxima.id, proxima.nome);
                paradaAtualId = null;
                estavaNaParada = false;
                // Verifica se a próxima parada também está na área (mesmo local)
                continuar = true;
            }
        } else {
            // Fora da área — mostra distância
            chip.className = 'proximidadeChip longe';
            chip.textContent = dist <= 200
                ? `🛵 ${Math.round(dist)}m de ${proxima.nome}`
                : `🏁 ${Math.round(dist)}m — ${proxima.nome}`;
            estavaNaParada = false;
            paradaAtualId = null;
            renderProximaCard(proxima, dist);
        }
    }
}

// ===== PAGAMENTO NA ENTREGA =====
async function verificarPagamentoEntrega(parada) {
    if (!parada.cliente_phone) return;

    // Busca pedido de hoje do cliente
    const hoje = new Date().toISOString().split('T')[0];
    const { data: pedidos } = await sb.from("orders")
        .select("id, total, payment_method, customer_name")
        .eq("customer_phone", parada.cliente_phone)
        .gte("created_at", hoje + 'T00:00:00')
        .lte("created_at", hoje + 'T23:59:59')
        .order("created_at", { ascending: false })
        .limit(1);

    if (!pedidos || !pedidos.length) return;
    const pedido = pedidos[0];

    // Só exibe se o pagamento for exatamente "PAGA NA ENTREGA"
    if ((pedido.payment_method || '').toUpperCase() !== 'PAGA NA ENTREGA') return;

    // Guarda parada para uso na resposta
    paradaPagamentoPendente = { parada, pedido };

    // Preenche modal
    document.getElementById('pagNome').textContent = `${parada.nome} pagou?`;
    document.getElementById('pagSub').textContent = `Pagamento: ${pedido.payment_method} · Pedido de hoje`;
    document.getElementById('pagValor').textContent = `R$ ${Number(pedido.total).toFixed(2).replace('.', ',')}`;

    // Pequeno delay para não sobrepor o confirm modal
    setTimeout(() => {
        document.getElementById('confirmModal').classList.remove('show');
        document.getElementById('pagamentoModal').classList.add('show');
    }, 800);
}

async function responderPagamento(pagou) {
    document.getElementById('pagamentoModal').classList.remove('show');
    if (!paradaPagamentoPendente) return;

    const { parada, pedido } = paradaPagamentoPendente;
    paradaPagamentoPendente = null;

    if (pagou) {
        // ✅ Pagou — marca pedido como pago
        await sb.from("orders")
            .update({ payment_method: pedido.payment_method + ' ✓' })
            .eq("id", pedido.id);
        showToast(`✅ Pagamento de ${parada.nome} confirmado!`, 'success');
    } else {
        // ❌ Não pagou — lança no fiado (débito)
        await sb.from("orders")
            .update({ payment_method: 'FIADO' })
            .eq("id", pedido.id);

        // Adiciona ao débito do cliente
        const { data: cliente } = await sb.from("clients")
            .select("debt").eq("phone", parada.cliente_phone).maybeSingle();
        const debtAtual = cliente?.debt || 0;
        const novaDebt = debtAtual + Number(pedido.total);
        await sb.from("clients")
            .update({ debt: novaDebt })
            .eq("phone", parada.cliente_phone);

        showToast(`⚠️ ${parada.nome} lançado no fiado — R$ ${Number(pedido.total).toFixed(2).replace('.', ',')}`, 'warn');
    }
}

// ===== CONFIRM MODAL =====
function mostrarConfirmModal(parada) {
    paradaEmConfirmacao = parada;
    document.getElementById('confirmTitle').textContent = `Chegou em ${parada.nome}!`;
    document.getElementById('confirmSub').textContent = `📍 ${parada.endereco}\nSaia da área para confirmar automaticamente, ou confirme agora.`;
    document.getElementById('confirmModal').classList.add('show');
}

function fecharConfirmModal() {
    document.getElementById('confirmModal').classList.remove('show');
}

async function confirmarEntregaModal() {
    fecharConfirmModal();
    if (paradaEmConfirmacao) {
        estavaNaParada = false;
        paradaAtualId = null;
        await executarMarcarEntregue(paradaEmConfirmacao.id, paradaEmConfirmacao.nome);
        paradaEmConfirmacao = null;
    }
}

async function executarMarcarEntregue(paradaId, nome) {
    const p = paradasList.find(x => x.id === paradaId);
    if (!p || p.status === 'entregue') return;
    p.status = 'entregue';

    // Invalida cache da rota completa e força redesenho da azul
    cacheRotaCompleta = null;
    cacheRotaCompletaKey = '';
    ultimaProximaId = null;
    if (rotaProximaLayer) { try { mapaObj.removeLayer(rotaProximaLayer); } catch(e){} rotaProximaLayer = null; }

    await sb.from("delivery_routes")
        .update({ paradas: paradasList })
        .eq("id", rotaAtual.id);

    const proxNome = paradasList.find(x => x.status === 'pendente')?.nome;
    showToast(proxNome ? `✅ ${nome} entregue! Próximo: ${proxNome}` : `✅ ${nome} entregue! Rota concluída!`, 'success');

    // Verifica se todas as paradas foram entregues
    const todasEntregues = paradasList.every(p => p.status === 'entregue');
    if (todasEntregues) {
        await sb.from("delivery_routes")
            .update({ status: 'concluido', fim_em: new Date().toISOString() })
            .eq("id", rotaAtual.id);
        await sb.from("config").upsert({ key: "admin_gps", value: JSON.stringify({ lat: null, lon: null, ts: null }) }, { onConflict: 'key' });
        showToast('🏁 Todas as entregas concluídas!', 'success');
        rotaAtual = null;
        limparTodasRotasVisuais();
    }

    renderTudo();
    renderizarMapaCompleto();
    if (navAtiva) { navRotaParadaId = null; carregarStepsParaProxima(); }
}

// ===== OSRM — ROTA REAL PELAS RUAS =====

// Busca rota no OSRM e retorna array de [lat, lon]
async function buscarRotaOSRM(pontos) {
    if (pontos.length < 2) return null;
    // OSRM recebe lon,lat
    const coords = pontos.map(p => `${p[1]},${p[0]}`).join(';');
    const url = `${OSRM_BASE}${coords}?overview=full&geometries=geojson&steps=false`;
    try {
        const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
        if (!resp.ok) return null;
        const json = await resp.json();
        if (json.code !== 'Ok' || !json.routes?.length) return null;
        // GeoJSON vem como [lon, lat] → inverter para Leaflet [lat, lon]
        return json.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    } catch(e) {
        console.warn('OSRM err:', e);
        return null;
    }
}

// Desenha a rota completa (fábrica → todas as paradas) em vermelho tracejado
async function desenharRotaCompleta(paradas) {
    // Monta chave de cache com os IDs das paradas
    const key = paradas.map(p => p.id + p.status).join('|');
    let coords;

    if (cacheRotaCompletaKey === key && cacheRotaCompleta) {
        coords = cacheRotaCompleta;
    } else {
        const pontos = [FABRICA, ...paradas.map(p => p.coords)];
        coords = await buscarRotaOSRM(pontos);
        if (coords) {
            cacheRotaCompleta = coords;
            cacheRotaCompletaKey = key;
        }
    }

    // Remove layer anterior
    if (rotaCompletaLayer) { try { mapaObj.removeLayer(rotaCompletaLayer); } catch(e){} rotaCompletaLayer = null; }

    if (coords) {
        rotaCompletaLayer = L.polyline(coords, {
            color: '#ff4757', weight: 3, opacity: 0.45, dashArray: '10 7'
        }).addTo(mapaObj);
    } else {
        // Fallback: linha reta se OSRM falhar
        const pts = [FABRICA, ...paradas.map(p => p.coords)];
        rotaCompletaLayer = L.polyline(pts, {
            color: '#ff4757', weight: 2, opacity: 0.3, dashArray: '8 6'
        }).addTo(mapaObj);
    }
    // Garante que a moto fique por cima
    if (motoMarker) motoMarker.bringToFront();
}

// Desenha trecho azul da posição atual até a próxima parada
async function desenharRotaProxima(posAtual, proxima) {
    if (!posAtual || !proxima?.coords) {
        if (rotaProximaLayer) { try { mapaObj.removeLayer(rotaProximaLayer); } catch(e){} rotaProximaLayer = null; }
        ultimaProximaId = null;
        return;
    }

    // Só redesenha se a próxima parada mudou
    if (ultimaProximaId === proxima.id) {
        // Só atualiza o ponto de origem (posição do entregador mudou)
        // Para não ficar chamando OSRM a cada 4s, redesenha só quando próxima muda
        // ou quando ainda não tem layer
        if (rotaProximaLayer) return;
    }
    ultimaProximaId = proxima.id;

    const coords = await buscarRotaOSRM([posAtual, proxima.coords]);

    if (rotaProximaLayer) { try { mapaObj.removeLayer(rotaProximaLayer); } catch(e){} rotaProximaLayer = null; }

    if (coords) {
        rotaProximaLayer = L.polyline(coords, {
            color: '#3d9cff', weight: 5, opacity: 0.9
        }).addTo(mapaObj);
    } else {
        // Fallback linha reta
        rotaProximaLayer = L.polyline([posAtual, proxima.coords], {
            color: '#3d9cff', weight: 4, opacity: 0.85
        }).addTo(mapaObj);
    }
    if (motoMarker) motoMarker.bringToFront();
}

        if (navAtiva && (offset[0] !== 0 || offset[1] !== 0)) {
            // Converte posição GPS para pixel, aplica offset, converte de volta
            const ponto = mapaObj.latLngToContainerPoint(pos);
            const pontoCentro = L.point(ponto.x - offset[0], ponto.y - offset[1]);
            const latLngCentro = mapaObj.containerPointToLatLng(pontoCentro);
            mapaObj.setView(latLngCentro, mapaObj.getZoom() || 17, { animate: true, duration: 0.5, easeLinearity: 0.5, noMoveStart: true });

// Layers estáticos do mapa (paradas, linhas, fábrica) — separados da moto
let layersEstaticos = [];

function limparLayersEstaticos() {
    layersEstaticos.forEach(l => { try { mapaObj.removeLayer(l); } catch(e){} });
    layersEstaticos = [];
}

function limparTodasRotasVisuais() {
    limparLayersEstaticos();
    if (rotaCompletaLayer) { try { mapaObj.removeLayer(rotaCompletaLayer); } catch(e){} rotaCompletaLayer = null; }
    if (rotaProximaLayer) { try { mapaObj.removeLayer(rotaProximaLayer); } catch(e){} rotaProximaLayer = null; }
    cacheRotaCompleta = null;
    cacheRotaCompletaKey = '';
    ultimaProximaId = null;
}

async function renderizarMapaCompleto() {
    if (!mapaObj || !window.L) return;

    // Remove apenas layers estáticos (paradas, marcadores) — linhas de rota gerenciadas separadamente
    limparLayersEstaticos();

    // Paradas da rota ativa (para lógica de rota e próxima parada)
    const paradas = paradasList.filter(p => p.coords);
    const pendentes = paradas.filter(p => p.status !== 'entregue');
    const proxima = pendentes[0] || null;

    // TODOS os clientes históricos (já extraídos em carregarDados)
    const todasParadas = todosOsClientes;

    // Marcador fábrica
    const fabMarker = L.marker(FABRICA, {
        icon: L.divIcon({
            html: `<div style="width:40px;height:40px;border-radius:12px;
                background:linear-gradient(135deg,#f5a623,#e67e22);
                display:flex;align-items:center;justify-content:center;
                font-size:20px;
                box-shadow:0 4px 16px rgba(245,166,35,0.5);
                border:2px solid rgba(255,255,255,0.2);">🏭</div>`,
            className: '', iconSize: [40, 40], iconAnchor: [20, 20]
        })
    }).addTo(mapaObj).bindPopup('<b>🏭 Fábrica</b>');
    layersEstaticos.push(fabMarker);

    // Rota completa pelas ruas (vermelho tracejado) — async, não bloqueia
    if (paradas.length >= 1) {
        desenharRotaCompleta(paradas); // não aguarda — atualiza quando chegar
    } else {
        // Sem paradas: limpa layer de rota completa
        if (rotaCompletaLayer) { try { mapaObj.removeLayer(rotaCompletaLayer); } catch(e){} rotaCompletaLayer = null; }
    }

    // Rota até a próxima parada (azul) — só redesenha quando a parada muda
    desenharRotaProxima(posAtual, proxima); // também async

    // Agrupa clientes próximos (raio ~30m) para exibir lado a lado
    const RAIO_GRUPO = 0.00027; // ~30 metros em graus
    const grupos = [];
    const usados = new Set();

    todasParadas.forEach((p, i) => {
        if (usados.has(i)) return;
        const grupo = [p];
        usados.add(i);
        todasParadas.forEach((q, j) => {
            if (usados.has(j)) return;
            const dlat = Math.abs(p.coords[0] - q.coords[0]);
            const dlon = Math.abs(p.coords[1] - q.coords[1]);
            if (dlat < RAIO_GRUPO && dlon < RAIO_GRUPO) {
                grupo.push(q);
                usados.add(j);
            }
        });
        grupos.push({ coords: p.coords, clientes: grupo });
    });

    // Renderiza cada grupo — se tiver mais de um cliente, coloca lado a lado num único marker
    grupos.forEach(grupo => {
        const { coords, clientes } = grupo;

        // Monta HTML de cada cliente no grupo
        const clientesHTML = clientes.map(p => {
            const paradaAtiva = paradasList.find(pa => pa.coords && pa.coords[0] === p.coords[0] && pa.coords[1] === p.coords[1] && pa.nome === (p.name || p.nome));
            const entregue = paradaAtiva ? paradaAtiva.status === 'entregue' : false;
            const isProx = proxima && paradaAtiva && paradaAtiva.id === proxima.id;
            const isRotaAtiva = !!paradaAtiva;

            let bg, borderColor, labelBg, labelColor;
            if (entregue) {
                bg = '#00e87a'; borderColor = 'rgba(0,232,122,0.4)'; labelBg = 'rgba(0,0,0,0.65)'; labelColor = '#aaa';
            } else if (isProx) {
                bg = '#f5a623'; borderColor = 'rgba(245,166,35,0.6)'; labelBg = 'rgba(245,166,35,0.92)'; labelColor = '#000';
            } else if (isRotaAtiva) {
                bg = '#3d9cff'; borderColor = 'rgba(61,156,255,0.4)'; labelBg = 'rgba(10,10,15,0.85)'; labelColor = '#f0f0f8';
            } else {
                bg = '#7c5cbf'; borderColor = 'rgba(124,92,191,0.4)'; labelBg = 'rgba(20,10,40,0.85)'; labelColor = 'rgba(240,240,248,0.7)';
            }

            const pulse = isProx ? 'animation:paradaPulse 1.5s ease-in-out infinite;' : '';
            const nome = p.name || p.nome;

            return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="
                    background:${labelBg};color:${labelColor};
                    font-size:10px;font-weight:800;
                    padding:2px 7px;border-radius:10px;
                    white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;
                    border:1px solid ${borderColor};
                    box-shadow:0 2px 8px rgba(0,0,0,0.6);
                    backdrop-filter:blur(6px);
                    pointer-events:none;
                ">${nome}</div>
                <div style="width:36px;height:36px;border-radius:50%;
                    background:${bg};display:flex;align-items:center;justify-content:center;
                    font-size:19px;
                    border:3px solid rgba(255,255,255,0.3);
                    box-shadow:0 3px 12px rgba(0,0,0,0.5);
                    opacity:${entregue ? 0.5 : 1};
                    ${pulse}
                ">👤</div>
            </div>`;
        }).join('');

        const largura = clientes.length * 50 + (clientes.length - 1) * 4;
        const icon = L.divIcon({
            html: `<div style="display:flex;flex-direction:row;align-items:flex-end;gap:4px;">
                ${clientesHTML}
            </div>
            <style>@keyframes paradaPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0.7)}70%{box-shadow:0 0 0 12px rgba(245,166,35,0)}}</style>`,
            className: '',
            iconSize: [largura, 62],
            iconAnchor: [largura / 2, 62]
        });

        // Popup com todos os clientes do grupo
        const popupHTML = clientes.map(p => {
            const paradaAtiva = paradasList.find(pa => pa.coords && pa.coords[0] === p.coords[0] && pa.coords[1] === p.coords[1] && pa.nome === (p.name || p.nome));
            const entregue = paradaAtiva ? paradaAtiva.status === 'entregue' : false;
            const isProx = proxima && paradaAtiva && paradaAtiva.id === proxima.id;
            const isRotaAtiva = !!paradaAtiva;
            const statusLabel = entregue ? '✅ Entregue hoje' : isProx ? '▶ Próxima parada' : isRotaAtiva ? '⏳ Pendente' : '📍 Cliente cadastrado';
            const statusColor = entregue ? '#00e87a' : isProx ? '#f5a623' : isRotaAtiva ? '#3d9cff' : '#7c5cbf';
            const debtInfo = p.debt > 0 ? `<div style="font-size:11px;font-weight:700;color:#ff4757;margin-top:2px;">💳 Fiado: R$ ${Number(p.debt).toFixed(2).replace('.',',')}</div>` : '';
            const phoneInfo = p.phone ? `<div style="font-size:11px;color:rgba(240,240,248,0.45);">📞 ${p.phone}</div>` : '';
            return `<div style="padding:6px 0;${clientes.length > 1 ? 'border-bottom:1px solid rgba(255,255,255,0.08);' : ''}">
                <div style="font-weight:800;font-size:13px;color:#f0f0f8;">${p.name || p.nome}</div>
                <div style="font-size:11px;color:rgba(240,240,248,0.55);">📍 ${p.delivery_address || p.endereco || ''}</div>
                ${phoneInfo}${debtInfo}
                <div style="font-size:11px;font-weight:700;color:${statusColor};margin-top:2px;">${statusLabel}</div>
            </div>`;
        }).join('');

        const m = L.marker(coords, { icon }).addTo(mapaObj)
            .bindPopup(`<div style="min-width:160px;max-width:220px;">${popupHTML}</div>`);
        layersEstaticos.push(m);

        // Long press — recalcula rota para o cliente (usa o primeiro do grupo com coords)
        const clienteAlvo = clientes.find(c => c.coords) || clientes[0];
        m.on('add', () => attachLongPress(m, clienteAlvo));
    });

    // Posiciona moto por cima de tudo (zIndexOffset alto)
    if (posAtual) posicionarMoto(posAtual);

    // Ajusta zoom só na primeira carga (sem posição GPS ainda)
    const pts = [FABRICA, ...todasParadas.map(p => p.coords)];
    if (pts.length >= 2 && !posAtual) {
        mapaObj.fitBounds(L.latLngBounds(pts), { padding: [50, 50], maxZoom: 16 });
    }
}

// ===== LONG PRESS — RECALCULAR ROTA =====
let lpTimer = null;
let lpCliente = null;
let lpCancelado = false;

function iniciarLongPress(e, cliente) {
    lpCancelado = false;
    lpCliente = cliente;

    // Posição do toque na tela
    const toque = e.touches ? e.touches[0] : e;
    const x = toque.clientX, y = toque.clientY;

    // Mostra o anel de progresso centrado no toque
    const ring = document.getElementById('longPressRing');
    ring.style.display = 'block';
    ring.style.left = (x - 36) + 'px';
    ring.style.top  = (y - 36) + 'px';

    // Anima o arco (stroke-dashoffset de 188.5 → 0 em 2s)
    const arc = document.getElementById('longPressArc');
    arc.style.transition = 'none';
    arc.style.strokeDashoffset = '188.5';
    // Força reflow para reiniciar animação
    arc.getBoundingClientRect();
    arc.style.transition = 'stroke-dashoffset 2s linear';
    arc.style.strokeDashoffset = '0';

    // Feedback tátil ao começar
    if (navigator.vibrate) navigator.vibrate(30);

    lpTimer = setTimeout(() => {
        if (lpCancelado) return;
        confirmarRotaParaCliente(cliente);
    }, 2000);
}

function cancelarLongPress() {
    lpCancelado = true;
    clearTimeout(lpTimer);
    lpTimer = null;
    // Para o anel no estado atual
    const arc = document.getElementById('longPressArc');
    const curr = arc.style.strokeDashoffset;
    arc.style.transition = 'none';
    arc.style.strokeDashoffset = curr;
    // Esconde com fade
    document.getElementById('longPressRing').style.display = 'none';
}

async function confirmarRotaParaCliente(cliente) {
    // Esconde anel
    document.getElementById('longPressRing').style.display = 'none';

    // Vibra para confirmar
    if (navigator.vibrate) navigator.vibrate([60, 40, 60]);

    const nome = cliente.name || cliente.nome;
    const toast = document.getElementById('longPressToast');
    toast.textContent = `🗺️ Rota para ${nome}...`;
    toast.classList.add('show');

    if (!posAtual) {
        toast.textContent = '⚠️ GPS não disponível';
        setTimeout(() => toast.classList.remove('show'), 2500);
        return;
    }

    // Busca rota OSRM até o cliente
    const resultado = await buscarRotaComSteps(posAtual, cliente.coords);

    setTimeout(() => toast.classList.remove('show'), 2200);

    if (!resultado) {
        showToast(`⚠️ Sem rota para ${nome}`, 'warn');
        return;
    }

    // Se nav não estava ativa, abre
    if (!navAtiva) await abrirNavegacao();

    // Injeta a rota direto, ignorando a fila de paradas
    navGeomFull = resultado.geometry;
    navSteps = mapearStepsNaPolilinha(resultado.steps, navGeomFull);
    navStepIdx = 0;
    navGeomSegIdx = 0;
    navRotaParadaId = '__manual__' + nome; // id fictício
    navDuracao = resultado.duracao;
    navUltimaFalaKey = '';

    // Desenha rota azul no mapa
    if (rotaProximaLayer) { try { mapaObj.removeLayer(rotaProximaLayer); } catch(e){} rotaProximaLayer = null; }
    rotaProximaLayer = L.polyline(resultado.geometry, {
        color: '#3d9cff', weight: 5, opacity: 0.9
    }).addTo(mapaObj);
    if (motoMarker) motoMarker.bringToFront();

    showToast(`✅ Rota para ${nome} — ${formatarDistNav(resultado.distancia)}`, 'success');
    navFalar(`Rota calculada para ${nome}. ${formatarDistNav(resultado.distancia)}.`, 'manual-route');

    atualizarNavBanner();
}

function attachLongPress(marker, cliente) {
    const el = marker.getElement();
    if (!el) return;

    // Touch (mobile)
    el.addEventListener('touchstart', e => {
        e.stopPropagation();
        iniciarLongPress(e, cliente);
    }, { passive: true });

    el.addEventListener('touchend',   () => cancelarLongPress(), { passive: true });
    el.addEventListener('touchmove',  () => cancelarLongPress(), { passive: true });
    el.addEventListener('touchcancel',() => cancelarLongPress(), { passive: true });

    // Mouse (desktop fallback)
    el.addEventListener('mousedown', e => iniciarLongPress(e, cliente));
    el.addEventListener('mouseup',   () => cancelarLongPress());
    el.addEventListener('mouseleave',() => cancelarLongPress());
}

function recentrarMapa() {
    seguindoMoto = true;
    if (posAtual) {
        const offset = getNavOffset();
        if (navAtiva && offset[1] !== 0) {
            const ponto = mapaObj.latLngToContainerPoint(posAtual);
            const pontoCentro = L.point(ponto.x, ponto.y - offset[1]);
            const latLngCentro = mapaObj.containerPointToLatLng(pontoCentro);
            mapaObj.setView(latLngCentro, 17, { animate: true });
        } else {
            mapaObj.setView(posAtual, 16, { animate: true });
        }
    } else {
        mapaObj.setView(FABRICA, 14, { animate: true });
    }
}

// ===== UTILS =====
function calcBearing(c1, c2) {
    const lat1 = c1[0] * Math.PI / 180, lat2 = c2[0] * Math.PI / 180;
    const dLon = (c2[1] - c1[1]) * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

function calcDistM(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── Geometria: projeção de ponto num segmento ──
// Retorna { distPerpendicular, distAoFinal, projecao:[lat,lon] }
function projetarPontoNoSegmento(P, A, B) {
    // Converte para coordenadas aproximadas em metros (equiretangular)
    const R = 6371000;
    const lat0 = (A[0] + B[0]) / 2 * Math.PI / 180;
    const ax = A[1] * Math.cos(lat0) * R * Math.PI / 180;
    const ay = A[0] * R * Math.PI / 180;
    const bx = B[1] * Math.cos(lat0) * R * Math.PI / 180;
    const by = B[0] * R * Math.PI / 180;
    const px = P[1] * Math.cos(lat0) * R * Math.PI / 180;
    const py = P[0] * R * Math.PI / 180;

    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return { distPerp: calcDistM(P[0], P[1], A[0], A[1]), t: 0, distAoFinal: calcDistM(P[0], P[1], B[0], B[1]) };

    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));

    const projx = ax + t * dx;
    const projy = ay + t * dy;
    const distPerp = Math.sqrt((px - projx) ** 2 + (py - projy) ** 2);
    const distAoFinal = Math.sqrt((projx - bx) ** 2 + (projy - by) ** 2);
    return { distPerp, t, distAoFinal };
}

// Distância percorrida na polilinha a partir do segmento idx, ponto projetado com fração t
function distRestanteNaPolilinha(geom, segIdx, t) {
    if (!geom || geom.length < 2) return 0;
    const A = geom[segIdx], B = geom[segIdx + 1] || geom[segIdx];
    // Distância do ponto projetado até o final do segmento atual
    const segLen = calcDistM(A[0], A[1], B[0], B[1]);
    let d = segLen * (1 - t);
    // Soma os segmentos restantes
    for (let i = segIdx + 1; i < geom.length - 1; i++) {
        d += calcDistM(geom[i][0], geom[i][1], geom[i + 1][0], geom[i + 1][1]);
    }
    return d;
}

// Encontra o segmento da polilinha global mais próximo da posição, começando a busca em segIdx
// Retorna { segIdx, t, distPerp }
function encontrarSegmentoMaisProximo(pos, geom, inicioIdx) {
    if (!geom || geom.length < 2) return { segIdx: 0, t: 0, distPerp: Infinity };
    let melhorIdx = inicioIdx;
    let melhorT = 0;
    let melhorPerp = Infinity;

    // Busca numa janela de ±10 segmentos à frente (sem voltar atrás)
    const fim = Math.min(geom.length - 1, inicioIdx + 15);
    for (let i = inicioIdx; i < fim; i++) {
        const { distPerp, t } = projetarPontoNoSegmento(pos, geom[i], geom[i + 1]);
        if (distPerp < melhorPerp) {
            melhorPerp = distPerp;
            melhorIdx = i;
            melhorT = t;
        }
    }
    return { segIdx: melhorIdx, t: melhorT, distPerp: melhorPerp };
}

// Mapeia cada step para o intervalo de índices na polilinha global
function mapearStepsNaPolilinha(steps, geom) {
    // Cada step tem seu próprio geometry.coordinates
    // Encontra onde começa cada step na polilinha global pelo ponto de manobra
    const mapeado = steps.map((step, si) => {
        const [mlon, mlat] = step.maneuver?.location || [0, 0];
        // Encontra o índice mais próximo na geom global
        let melhorIdx = 0, melhorDist = Infinity;
        for (let i = 0; i < geom.length; i++) {
            const d = calcDistM(mlat, mlon, geom[i][0], geom[i][1]);
            if (d < melhorDist) { melhorDist = d; melhorIdx = i; }
        }
        return { ...step, _geomIdx: melhorIdx };
    });
    return mapeado;
}

// Distância ao longo da polilinha até o próximo ponto de manobra
function distAteManobra(geom, segIdx, t, stepGeomIdx) {
    if (!geom || geom.length < 2) return 0;
    const A = geom[segIdx], B = geom[Math.min(segIdx + 1, geom.length - 1)];
    const segLen = calcDistM(A[0], A[1], B[0], B[1]);
    let d = segLen * (1 - t);
    for (let i = segIdx + 1; i < Math.min(stepGeomIdx, geom.length - 1); i++) {
        d += calcDistM(geom[i][0], geom[i][1], geom[i + 1][0], geom[i + 1][1]);
    }
    return Math.max(0, d);
}

// ── API ──
async function buscarRotaComSteps(origem, destino) {
    const url = `${OSRM_BASE}${origem[1]},${origem[0]};${destino[1]},${destino[0]}` +
        `?overview=full&geometries=geojson&steps=true&annotations=false`;
    try {
        const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!resp.ok) return null;
        const json = await resp.json();
        if (json.code !== 'Ok' || !json.routes?.length) return null;
        const route = json.routes[0];
        const steps = route.legs.flatMap(leg => leg.steps);
        const geometry = route.geometry.coordinates.map(c => [c[1], c[0]]); // → [lat,lon]
        return { steps, geometry, duracao: route.duration, distancia: route.distance };
    } catch(e) {
        console.warn('OSRM err:', e);
        return null;
    }
}

async function carregarStepsParaProxima() {
    if (navFetchLock || !posAtual) return;
    const proxima = paradasList?.find(p => p.status === 'pendente' && p.coords);
    if (!proxima) return;
    if (navRotaParadaId === proxima.id && navSteps.length) return;

    navFetchLock = true;
    const resultado = await buscarRotaComSteps(posAtual, proxima.coords);
    navFetchLock = false;

    if (!resultado) { showToast('⚠️ Sem rota — verifique conexão', 'warn'); return; }

    navGeomFull = resultado.geometry;
    navSteps = mapearStepsNaPolilinha(resultado.steps, navGeomFull);
    navStepIdx = 0;
    navGeomSegIdx = 0;
    navRotaParadaId = proxima.id;
    navDuracao = resultado.duracao;
    navDistanciaRest = resultado.distancia;
    navUltimaFalaKey = '';

    showToast(`✅ ${navSteps.length - 1} manobras — ${formatarDistNav(navDistanciaRest)}`, 'success');
    atualizarNavBanner();
}

// ── Controles ──
async function abrirNavegacao() {
    navAtiva = true;
    navSteps = [];
    navStepIdx = 0;
    navGeomFull = [];
    navGeomSegIdx = 0;
    navRotaParadaId = null;
    document.body.classList.add('nav-ativa');
    document.getElementById('navBanner').classList.add('ativo');
    document.getElementById('navBottom').classList.add('ativo');
    document.getElementById('navCloseBtn').classList.add('ativo');
    seguindoMoto = true;
    if (mapaObj) mapaObj.setZoom(17);
    // Ativa heading-up automaticamente ao navegar
    if (!headingUp) toggleHeadingUp();
    // Ativa perspectiva 3D
    document.getElementById('mapaDiv').classList.add('nav-tilt');
    showToast('🗺️ Calculando rota...', '');
    await carregarStepsParaProxima();
}

function fecharNavegacao() {
    navAtiva = false;
    navSteps = [];
    navGeomFull = [];
    document.body.classList.remove('nav-ativa');
    document.getElementById('navBanner').classList.remove('ativo');
    document.getElementById('navBottom').classList.remove('ativo');
    document.getElementById('navCloseBtn').classList.remove('ativo');
    // Desativa heading-up ao fechar navegação
    if (headingUp) toggleHeadingUp();
    // Remove perspectiva 3D
    document.getElementById('mapaDiv').classList.remove('nav-tilt');
}

function toggleNavVoz() {
    navVozAtiva = !navVozAtiva;
    document.getElementById('navVoiceBtn').textContent = navVozAtiva ? '🔊' : '🔇';
    showToast(navVozAtiva ? '🔊 Voz ativada' : '🔇 Voz desativada');
}

function navFalar(texto, chave) {
    if (!navVozAtiva || !window.speechSynthesis) return;
    if (chave && chave === navUltimaFalaKey) return; // não repete
    if (chave) navUltimaFalaKey = chave;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'pt-BR'; u.rate = 1.05;
    window.speechSynthesis.speak(u);
}

// ── Banner principal ──
function atualizarNavBanner() {
    if (!navAtiva) return;

    const proxima = paradasList?.find(p => p.status === 'pendente' && p.coords);
    if (!proxima || !posAtual) {
        document.getElementById('navDist').textContent = '— m';
        document.getElementById('navInstrucao').textContent = 'Aguardando GPS...';
        return;
    }

    // Parada mudou → recarrega
    if (navRotaParadaId !== proxima.id) { carregarStepsParaProxima(); return; }

    if (!navSteps.length || !navGeomFull.length) return;

    // 1. Encontra segmento mais próximo na polilinha global (janela deslizante)
    const { segIdx, t, distPerp } = encontrarSegmentoMaisProximo(posAtual, navGeomFull, navGeomSegIdx);

    // Só avança o índice global (nunca volta)
    if (segIdx > navGeomSegIdx) navGeomSegIdx = segIdx;

    // 2. Descobre em qual step estamos com base no segIdx vs _geomIdx dos steps
    //    O step atual é o último cujo _geomIdx <= segIdx
    let novoStepIdx = navStepIdx;
    for (let i = navStepIdx; i < navSteps.length - 1; i++) {
        if (navSteps[i + 1]._geomIdx <= segIdx) {
            novoStepIdx = i + 1;
        } else {
            break;
        }
    }
    navStepIdx = novoStepIdx;

    // 3. Step atual e distância até sua manobra pela polilinha
    const step = navSteps[navStepIdx];
    const proximoStep = navSteps[navStepIdx + 1];
    const manobra = getManobra(step.maneuver?.type, step.maneuver?.modifier);

    // Distância pela rua até o próximo ponto de manobra
    const idxManobra = proximoStep ? proximoStep._geomIdx : navGeomFull.length - 1;
    const distManobra = distAteManobra(navGeomFull, segIdx, t, idxManobra);

    // 4. Distância restante total pela rua
    const distRest = distRestanteNaPolilinha(navGeomFull, segIdx, t);

    // 5. Atualiza UI
    document.getElementById('navDist').textContent = formatarDistNav(distManobra);
    document.getElementById('navDirIcon').innerHTML = manobra.svg;

    const rua = step.name || step.ref || '';
    document.getElementById('navInstrucao').innerHTML =
        `${manobra.txt}${rua ? ` em <b>${rua}</b>` : ''}`;

    // "Depois"
    if (proximoStep) {
        const mNext = getManobra(proximoStep.maneuver?.type, proximoStep.maneuver?.modifier);
        const ruaNext = proximoStep.name || proximoStep.ref || '';
        document.getElementById('navDepois').style.display = 'flex';
        document.getElementById('navDepoisTxt').textContent =
            `${mNext.txt}${ruaNext ? ' em ' + ruaNext : ''}`;
    } else {
        document.getElementById('navDepois').innerHTML =
            `<span class="nav-depois-icon">🏁</span><span class="nav-depois-txt">Chegando em ${proxima.nome}</span>`;
    }

    // 6. Barra inferior — ETA dinâmico baseado em distância restante real
    const velMs = navSpeedSmooth > 3 ? (navSpeedSmooth / 3.6) : 6; // mínimo 6 m/s (~22 km/h)
    const etaSeg = distRest / velMs;
    const etaMin = Math.max(1, Math.round(etaSeg / 60));
    const etaHora = new Date(Date.now() + etaSeg * 1000)
        .toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('navEtaMin').textContent = `${etaMin}min`;
    document.getElementById('navEtaTime').textContent = etaHora;
    document.getElementById('navDistKm').textContent = formatarDistNav(distRest);

    // 7. Voz — por distância na polilinha, não em linha reta
    const ruaFala = rua || proxima.nome;
    if (distManobra <= 200 && distManobra > 100) {
        navFalar(`Em ${Math.round(distManobra / 10) * 10} metros, ${manobra.txt}${ruaFala ? ' em ' + ruaFala : ''}`,
            `pre-${navStepIdx}`);
    } else if (distManobra <= 50 && distManobra > 5) {
        navFalar(`Agora, ${manobra.txt}`, `now-${navStepIdx}`);
    }
}

// ===== HEADING-UP (mapa rotaciona com a direção) =====
let headingUp = false;
let mapRotacaoAtual = 0; // graus atuais de rotação do mapa

function toggleHeadingUp() {
    headingUp = !headingUp;
    const btn = document.getElementById('btnBussola');
    const mapaEl = document.getElementById('mapaDiv');

    if (headingUp) {
        btn.classList.add('heading-up');
        mapaEl.classList.add('heading-up');
        seguindoMoto = true;
        showToast('🧭 Heading-up ativado', 'success');
        aplicarRotacaoMapa(motoBearing);
    } else {
        btn.classList.remove('heading-up');
        mapaEl.classList.remove('heading-up');
        // Volta ao norte — anima suavemente de volta a 0°
        animarRotacaoParaNorte();
        showToast('🧭 Norte fixo', '');
    }
}

function aplicarTransformMapa() {
    const pane = mapaObj?.getPanes()?.mapPane;
    if (!pane) return;

    const rot = headingUp ? -mapRotacaoAtual : 0;
    pane.style.transition = 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
    pane.style.transformOrigin = 'center center';
    pane.style.transform = `rotate(${rot}deg)`;

    // Agulha da bússola sempre aponta para o norte
    const agulha = document.getElementById('bussolaAgulha');
    if (agulha) agulha.style.transform = `rotate(${mapRotacaoAtual}deg)`;
}

function aplicarRotacaoMapa(bearing) {
    if (!mapaObj || !headingUp) return;
    const diff = ((bearing - mapRotacaoAtual + 540) % 360) - 180;
    mapRotacaoAtual = mapRotacaoAtual + diff * 0.25;
    aplicarTransformMapa();
}

function animarRotacaoParaNorte() {
    mapRotacaoAtual = 0;
    aplicarTransformMapa();
}

function atualizarNavVelocidade(lat, lon, ts) {
    if (navPosAnterior && navTsAnterior) {
        const dtSeg = (ts - navTsAnterior) / 1000;
        if (dtSeg > 0.3 && dtSeg < 30) {
            const distM = calcDistM(navPosAnterior[0], navPosAnterior[1], lat, lon);
            const kmh = (distM / dtSeg) * 3.6;
            // Suavização exponencial mais agressiva para moto urbana
            navSpeedSmooth = navSpeedSmooth * 0.7 + kmh * 0.3;
        }
    }
    navPosAnterior = [lat, lon];
    navTsAnterior = ts;
    if (navAtiva) document.getElementById('navSpeed').textContent = Math.round(navSpeedSmooth);
}

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[PWA] Service Worker registrado:', reg.scope))
        .catch(err => console.warn('[PWA] Falha ao registrar SW:', err));
    });
  }
</script>
<script>
  // ===== WAKE LOCK — Mantém a tela acesa =====
  let wakeLock = null;

  async function ativarWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('[WakeLock] Tela mantida acesa ✅');
    } catch (err) {
      console.warn('[WakeLock] Não foi possível ativar:', err);
    }
  }

  // Reativa ao voltar para a aba (ex: usuário minimizou e voltou)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') ativarWakeLock();
  });

  // Ativa assim que a página carrega
  window.addEventListener('load', ativarWakeLock);
</script>
