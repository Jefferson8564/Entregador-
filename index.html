<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛵 Entregador — O Rei da Coxinha</title>
<link rel="icon" href="icone.png">
<link rel="apple-touch-icon" href="icone.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rei Entregas">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
  --border: rgba(255,255,255,0.07); --primary: #f5a623;
  --primary-glow: rgba(245,166,35,0.3); --green: #00e87a;
  --blue: #3d9cff; --red: #ff4757;
  --text: #f0f0f8; --text-dim: rgba(240,240,248,0.5);
  --text-muted: rgba(240,240,248,0.28);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }
#map { position:fixed; inset:0; z-index:1; }

/* LOADING */
#loadingScreen { position:fixed; inset:0; z-index:9999; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.load-logo { font-size:56px; animation:logoPulse 1.4s ease-in-out infinite; filter:drop-shadow(0 0 24px var(--primary-glow)); }
@keyframes logoPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.load-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:900; }
.load-sub { font-size:13px; color:var(--text-muted); }
.load-bar-wrap { width:160px; height:3px; background:rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; }
.load-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#ff8c00); border-radius:10px; animation:loadBar 1.8s ease forwards; }
@keyframes loadBar{to{width:100%;}}

/* HEADER */
#appHeader { position:fixed; top:0; left:0; right:0; z-index:400; padding:14px 12px; display:flex; align-items:center; justify-content:space-between; pointer-events:none; }
#appHeader > * { pointer-events:all; }
.tabs { display:flex; gap:6px; }
.tab-btn { padding:8px 14px; border:1px solid var(--border); border-radius:22px; font-size:12px; font-weight:700; cursor:pointer; background:rgba(10,10,15,0.82); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); color:var(--text-dim); transition:all 0.2s; font-family:'DM Sans',sans-serif; }
.tab-btn:active { transform:scale(0.94); }
.tab-btn.active { background:rgba(245,166,35,0.18); border-color:rgba(245,166,35,0.45); color:var(--primary); }

/* GPS BADGE */
.gps-badge { display:flex; align-items:center; gap:6px; padding:7px 13px; border-radius:22px; font-size:11px; font-weight:700; background:rgba(0,232,122,0.15); border:1px solid rgba(0,232,122,0.35); color:var(--green); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); white-space:nowrap; transition:all 0.3s; }
.gps-badge.off { background:rgba(255,71,87,0.1); border-color:rgba(255,71,87,0.25); color:var(--red); }
.gps-dot { width:7px; height:7px; border-radius:50%; background:currentColor; animation:gpsDot 1.2s ease-in-out infinite; }
.gps-badge.off .gps-dot { animation:none; }
@keyframes gpsDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}

/* BOTÕES FLUTUANTES */
#btnRecentrar { position:fixed; bottom:26px; right:18px; z-index:500; width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#f5a828,#e07012); border:none; cursor:pointer; font-size:26px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 22px var(--primary-glow),0 2px 6px rgba(0,0,0,0.3); transition:transform 0.2s; }
#btnRecentrar:active { transform:scale(0.92); }
#btnToggle3D { position:fixed; bottom:98px; right:18px; z-index:500; width:48px; height:48px; border-radius:50%; background:rgba(10,10,15,0.88); border:1px solid rgba(61,156,255,0.4); backdrop-filter:blur(14px); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; font-weight:900; font-family:'Syne',sans-serif; color:var(--blue); box-shadow:0 2px 14px rgba(0,0,0,0.5); transition:all 0.2s; }
#btnToggle3D:active { transform:scale(0.9); }
#btnToggle3D.ativo { background:rgba(61,156,255,0.2); border-color:rgba(61,156,255,0.7); box-shadow:0 2px 20px rgba(61,156,255,0.3); }
#indicadorRotacao { position:fixed; top:70px; right:16px; z-index:500; width:44px; height:44px; border-radius:50%; background:rgba(10,10,15,0.88); border:1px solid var(--border); backdrop-filter:blur(14px); display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; box-shadow:0 2px 14px rgba(0,0,0,0.5); }
#indicadorRotacao .seta { display:block; font-size:20px; transition:transform 0.5s ease; }
#headingBadge { position:fixed; bottom:158px; right:18px; z-index:500; padding:5px 10px; border-radius:12px; background:rgba(10,10,15,0.85); border:1px solid var(--border); backdrop-filter:blur(10px); font-size:10px; font-weight:700; color:var(--primary); font-family:'Syne',sans-serif; display:none; text-align:center; }

/* CHIP PROXIMIDADE */
#proximidadeChip { position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:500; white-space:nowrap; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:700; backdrop-filter:blur(12px); display:none; }
#proximidadeChip.chegando { background:rgba(0,232,122,0.2); border:1px solid rgba(0,232,122,0.5); color:var(--green); animation:chipPulse 1s ease-in-out infinite; }
#proximidadeChip.longe { background:rgba(61,156,255,0.15); border:1px solid rgba(61,156,255,0.35); color:var(--blue); }
@keyframes chipPulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

/* NAV AVULSA */
#navAvulsaChip { display:none !important; }
#navAvulsaChip.visivel { display:flex; animation:chipEntrada 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes chipEntrada{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.nav-chip-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:gpsDot 1s ease-in-out infinite; flex-shrink:0; }
.nav-chip-info { flex:1; }
.nav-chip-nome { font-family:'Syne',sans-serif; font-size:13px; font-weight:900; color:var(--green); }
.nav-chip-dist { font-size:11px; color:var(--text-dim); margin-top:1px; }
.nav-chip-fechar { width:28px; height:28px; border-radius:50%; background:rgba(255,71,87,0.15); border:1px solid rgba(255,71,87,0.4); color:var(--red); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; flex-shrink:0; }

/* PAINEL INFERIOR */
#paradasPanel { position:fixed; bottom:0; left:0; right:0; background:rgba(12,12,26,0.97); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px); border-top:1px solid var(--border); border-radius:22px 22px 0 0; z-index:700; display:flex; flex-direction:column; max-height:80vh; box-shadow:0 -6px 40px rgba(0,0,0,0.6); transform:translateY(100%); transition:transform 0.32s cubic-bezier(0.32,0.72,0,1); padding-bottom:24px; }
#paradasPanel.aberto { transform:translateY(0); }
#overlayPainel { position:fixed; inset:0; z-index:690; background:rgba(0,0,0,0.5); backdrop-filter:blur(3px); display:none; }
#overlayPainel.visivel { display:block; }
.drag-handle { width:40px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:12px auto 6px; flex-shrink:0; }
.panel-tabs { display:flex; gap:6px; padding:0 14px 8px; flex-shrink:0; border-bottom:1px solid var(--border); }
.tab-content { display:none; padding:14px; overflow-y:auto; }
.tab-content.active { display:block; }

/* ROTA ATIVA */
.rota-ativa-card { background:linear-gradient(135deg,rgba(245,166,35,0.12),rgba(255,140,0,0.06)); border:1px solid rgba(245,166,35,0.25); border-radius:18px; padding:14px 16px; margin-bottom:12px; }
.rota-ativa-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.rota-nome { font-family:'Syne',sans-serif; font-size:16px; font-weight:900; color:var(--primary); }
.rota-status-badge { font-size:10px; font-weight:700; padding:4px 10px; border-radius:20px; background:rgba(0,232,122,0.15); color:var(--green); border:1px solid rgba(0,232,122,0.3); }
.rota-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.rota-stat { background:rgba(255,255,255,0.04); border-radius:12px; padding:10px 8px; text-align:center; }
.rota-stat-val { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; }
.rota-stat-lbl { font-size:10px; color:var(--text-muted); margin-top:2px; }

/* PRÓXIMA PARADA */
.proxima-card { background:var(--surface2); border-radius:18px; padding:14px 16px; margin-bottom:12px; border:1px solid var(--border); position:relative; overflow:hidden; }
.proxima-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--blue); border-radius:2px 0 0 2px; }
.proxima-card.chegando::before { background:var(--green); }
.proxima-lbl { font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.proxima-nome { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; }
.proxima-end { font-size:12px; color:var(--text-dim); margin-top:4px; }
.proxima-dist { display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
.dist-badge { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; background:rgba(61,156,255,0.15); color:var(--blue); border:1px solid rgba(61,156,255,0.3); }
.eta-badge { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; background:rgba(245,166,35,0.12); color:var(--primary); border:1px solid rgba(245,166,35,0.25); }
.nav-btns { display:flex; gap:6px; margin-top:10px; }
.btn-nav-maps { flex:1; padding:9px; border:1px solid rgba(52,152,219,0.3); border-radius:10px; background:rgba(52,152,219,0.12); color:#5dade2; font-size:12px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-nav-waze { flex:1; padding:9px; border:1px solid rgba(39,174,96,0.3); border-radius:10px; background:rgba(39,174,96,0.12); color:#2ecc71; font-size:12px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* PARADAS */
.parada-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:16px; margin-bottom:8px; background:var(--surface2); border:1px solid var(--border); transition:opacity 0.3s; }
.parada-item.entregue { opacity:0.4; }
.parada-num { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; flex-shrink:0; }
.parada-num.pendente { background:rgba(61,156,255,0.2); color:var(--blue); border:1.5px solid rgba(61,156,255,0.4); }
.parada-num.proxima { background:rgba(245,166,35,0.2); color:var(--primary); border:1.5px solid rgba(245,166,35,0.4); animation:gpsDot 1.2s infinite; }
.parada-num.entregue { background:rgba(0,232,122,0.15); color:var(--green); border:1.5px solid rgba(0,232,122,0.3); }
.parada-info { flex:1; min-width:0; }
.parada-nome-item { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.parada-end-item { font-size:11px; color:var(--text-muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.parada-eta { font-size:11px; color:var(--text-muted); flex-shrink:0; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
.empty-icon { font-size:48px; margin-bottom:12px; opacity:0.5; }
.empty-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--text-dim); margin-bottom:6px; }
.empty-sub { font-size:13px; line-height:1.6; }

/* TOAST */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px 20px; border-radius:20px; font-size:13px; font-weight:700; z-index:9998; opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,0.5); pointer-events:none; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.success { background:rgba(0,232,122,0.15); border-color:rgba(0,232,122,0.4); color:var(--green); }
#toast.warn { background:rgba(245,166,35,0.15); border-color:rgba(245,166,35,0.4); color:var(--primary); }

/* CONFIRM MODAL */
#confirmModal { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:none; align-items:flex-end; justify-content:center; }
#confirmModal.show { display:flex; }
.confirm-box { background:var(--surface); border-radius:28px 28px 0 0; padding:24px 20px 36px; width:100%; max-width:500px; border-top:1px solid var(--border); animation:slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1); }
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.confirm-icon { font-size:42px; text-align:center; margin-bottom:12px; }
.confirm-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; text-align:center; margin-bottom:6px; }
.confirm-sub { font-size:13px; color:var(--text-dim); text-align:center; margin-bottom:20px; }
.confirm-btn { width:100%; padding:16px; border:none; border-radius:16px; font-size:15px; font-weight:800; cursor:pointer; font-family:'DM Sans',sans-serif; background:var(--green); color:#000; margin-bottom:8px; }
.confirm-cancel { width:100%; padding:14px; border:1px solid var(--border); border-radius:16px; background:transparent; color:var(--text-muted); font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* PAGAMENTO MODAL */
#pagamentoModal { position:fixed; top:16px; left:12px; right:12px; z-index:8500; display:none; max-width:420px; margin:0 auto; }
#pagamentoModal.show { display:block; animation:slideDown 0.45s cubic-bezier(0.34,1.4,0.64,1); }
@keyframes slideDown { from{transform:translateY(-120%);opacity:0;} to{transform:translateY(0);opacity:1;} }
.pag-box { background:rgba(18,18,26,0.97); border:1px solid rgba(245,166,35,0.35); border-radius:22px; padding:16px 16px 14px; box-shadow:0 8px 40px rgba(0,0,0,0.7); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
.pag-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.pag-icon { width:44px; height:44px; border-radius:14px; background:rgba(245,166,35,0.15); border:1px solid rgba(245,166,35,0.3); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.pag-info { flex:1; min-width:0; }
.pag-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pag-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
.pag-valor { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; color:var(--primary); flex-shrink:0; }

.pag-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pag-sim { padding:13px; border:none; border-radius:14px; font-size:15px; font-weight:800; cursor:pointer; font-family:'DM Sans',sans-serif; background:var(--green); color:#000; }
.pag-nao { padding:13px; border:1.5px solid rgba(255,71,87,0.4); border-radius:14px; font-size:15px; font-weight:800; cursor:pointer; font-family:'DM Sans',sans-serif; background:rgba(255,71,87,0.1); color:var(--red); }

/* MAPLIBRE POPUP */
.maplibregl-popup-content { background:rgba(16,16,36,0.97) !important; color:white !important; border-radius:16px !important; padding:12px 16px !important; font-size:13px !important; box-shadow:0 8px 32px rgba(0,0,0,0.6) !important; border:1px solid rgba(255,255,255,0.09) !important; font-family:'DM Sans',sans-serif !important; }
.maplibregl-popup-close-button { color:rgba(255,255,255,0.5) !important; font-size:17px !important; right:6px !important; top:4px !important; }
.maplibregl-ctrl-attrib, .maplibregl-ctrl-bottom-right { display:none !important; }

@keyframes destinoPulse{0%{box-shadow:0 0 0 0 rgba(0,232,122,0.8);}70%{box-shadow:0 0 0 18px rgba(0,232,122,0);}100%{box-shadow:0 0 0 0 rgba(0,232,122,0);}}
@keyframes paradaPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0.7)}70%{box-shadow:0 0 0 12px rgba(245,166,35,0)}}

/* VELOCÍMETRO */
#velocimetro {
  position:fixed; bottom:90px; left:18px; z-index:500;
  width:90px; height:90px; border-radius:50%;
  background:rgba(10,10,15,0.92); border:2px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(14px); display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#velValor { font-family:'Syne',sans-serif; font-size:26px; font-weight:900; color:var(--text); line-height:1; }
#velUnidade { font-size:9px; font-weight:700; color:var(--text-muted); letter-spacing:1px; margin-top:1px; }
#velArc { position:absolute; top:0; left:0; width:90px; height:90px; transform:rotate(-90deg); }

/* INSTRUÇÕES DE VOZ */
#instrucaoVoz { display:none !important; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="load-logo">🛵</div>
  <div class="load-title">O Rei da Coxinha</div>
  <div class="load-sub">Carregando rotas...</div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
</div>

<div id="toast"></div>

<!-- PAGAMENTO MODAL -->
<div id="pagamentoModal">
  <div class="pag-box">
    <div class="pag-top">
      <div class="pag-icon">💰</div>
      <div class="pag-info">
        <div class="pag-title" id="pagNome">Cliente pagou?</div>
        <div class="pag-sub" id="pagSub">Pagar na entrega</div>
      </div>
      <div class="pag-valor" id="pagValor">R$ 0,00</div>
    </div>

    <div class="pag-btns">
      <button class="pag-nao" onclick="responderPagamento(false)">❌ Não</button>
      <button class="pag-sim" onclick="responderPagamento(true)">✅ Sim</button>
    </div>
  </div>
</div>

<!-- FINALIZAR ROTA MODAL -->
<div id="finalizarModal" style="position:fixed;inset:0;z-index:8300;background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;">
  <div style="background:var(--surface);border-radius:28px 28px 0 0;padding:28px 20px 40px;width:100%;max-width:500px;border-top:1px solid rgba(0,232,122,0.3);animation:slideUp 0.35s cubic-bezier(0.34,1.4,0.64,1);">
    <div style="font-size:44px;text-align:center;margin-bottom:12px;" id="finalizarIcon">🏁</div>
    <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:900;text-align:center;margin-bottom:6px;" id="finalizarTitulo">Finalizar rota?</div>
    <div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:8px;line-height:1.6;" id="finalizarSub">Todas as paradas serão marcadas como entregues e a rota será concluída.</div>
    <div style="font-size:12px;color:var(--primary);text-align:center;margin-bottom:24px;font-weight:700;" id="finalizarInfo"></div>
    <!-- Botões rota normal -->
    <div id="finalizarBtnsNormal">
      <button onclick="executarFinalizarRota()" style="width:100%;padding:16px;border:none;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--green);color:#000;margin-bottom:10px;">🏁 Sim, finalizar rota</button>
      <button onclick="document.getElementById('finalizarModal').style.display='none'" style="width:100%;padding:14px;border:1px solid var(--border);border-radius:16px;background:transparent;color:var(--text-muted);font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">Cancelar</button>
    </div>

// ── Timeout sem AbortSignal (compatível com todos os Androids) ───────────────
function _fetchTimeout(url, opts, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error('timeout')), ms);
    fetch(url, opts || {}).then(r => { clearTimeout(t); resolve(r); }).catch(e => { clearTimeout(t); reject(e); });
  });
}
function _fetchPostTimeout(url, body, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error('timeout')), ms);
    fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body })
      .then(r => { clearTimeout(t); resolve(r); }).catch(e => { clearTimeout(t); reject(e); });
  });
}
// ── Decodificador polyline precisão 6 (Valhalla) ─────────────────────────────
function _decodPoly6(enc) {
  const out = []; let i = 0, lat = 0, lng = 0;
  while (i < enc.length) {
    let b, sh = 0, res = 0;
    do { b = enc.charCodeAt(i++) - 63; res |= (b & 0x1f) << sh; sh += 5; } while (b >= 0x20);
    lat += (res & 1) ? ~(res >> 1) : (res >> 1);
    sh = 0; res = 0;
    do { b = enc.charCodeAt(i++) - 63; res |= (b & 0x1f) << sh; sh += 5; } while (b >= 0x20);
    lng += (res & 1) ? ~(res >> 1) : (res >> 1);
    out.push([lng / 1e6, lat / 1e6]);
  }
  return out;
}

// ===== FUSO HORÁRIO BRASÍLIA (America/Sao_Paulo) =====
const TZ_SP = 'America/Sao_Paulo';

/**
 * Retorna um objeto com as partes de data/hora em São Paulo para uma dada Date.
 * Usa Intl.DateTimeFormat para respeitar automaticamente horário de verão.
 */
function _partesSP(d) {
  const src = d || new Date();
  const fmt = new Intl.DateTimeFormat('en-CA', {
    timeZone: TZ_SP,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  const p = Object.fromEntries(fmt.formatToParts(src).filter(x => x.type !== 'literal').map(x => [x.type, x.value]));
  return p; // { year, month, day, hour, minute, second }
}

/**
 * Retorna um objeto Date "espelhado" para o horário de São Paulo.
 * Útil para chamar .getHours(), .getMinutes() etc. e obter valores em BRT/BRST.
 */
function horasBRT(d) {
  const p = _partesSP(d);
  // Cria Date como se o horário de SP fosse UTC — permite usar getHours()/getMinutes() diretamente
  return new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`);
}

/**
 * Retorna "YYYY-MM-DD" no horário de São Paulo.
 */
function hojeStr() {
  const p = _partesSP();
  return `${p.year}-${p.month}-${p.day}`;
}

/**
 * Janela de pedido com a regra das 14h:
 * - Antes das 14h: janela = ontem 14h → hoje 13:59
 * - Depois das 14h: janela = hoje 14h → amanhã 13:59
 * Retorna { inicio, fim } como strings ISO com offset de SP.
 */
function _janelaPedido() {
  const agora = new Date();
  const p = _partesSP(agora);
  const hoje = `${p.year}-${p.month}-${p.day}`;
  const horaAtual = parseInt(p.hour) * 60 + parseInt(p.minute);
  const corte14h = 14 * 60;

  let diaInicio, diaFim;
  if (horaAtual >= corte14h) {
    // Depois das 14h → janela começa hoje 14h, vai até amanhã 13:59
    diaInicio = hoje;
    const amanhaDate = new Date(agora.getTime() + 86400000);
    const pa = _partesSP(amanhaDate);
    diaFim = `${pa.year}-${pa.month}-${pa.day}`;
  } else {
    // Antes das 14h → janela começa ontem 14h, vai até hoje 13:59
    const ontemDate = new Date(agora.getTime() - 86400000);
    const po = _partesSP(ontemDate);
    diaInicio = `${po.year}-${po.month}-${po.day}`;
    diaFim = hoje;
  }
  return {
    inicio: diaInicio + 'T14:00:00-03:00',
    fim:    diaFim   + 'T13:59:59-03:00'
  };
}

/**
 * Retorna ISO string com offset correto de São Paulo (ex: "2025-03-01T14:05:00-03:00").
 * O offset é calculado dinamicamente via Intl, então funciona mesmo após fim do horário de verão.
 */
function agoraISO() {
  const now = new Date();
  const p = _partesSP(now);
  // Calcula o offset real de SP em relação a UTC
  const localMs = new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`).getTime();
  const utcMs = now.getTime();
  const offsetMin = Math.round((localMs - utcMs) / 60000);
  const sign = offsetMin >= 0 ? '+' : '-';
  const absH = String(Math.floor(Math.abs(offsetMin) / 60)).padStart(2, '0');
  const absM = String(Math.abs(offsetMin) % 60).padStart(2, '0');
  return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}${sign}${absH}:${absM}`;
}

function calcularAngulo(lat1, lng1, lat2, lng2) {
  const r = d => d * Math.PI / 180;
  const dL = r(lng2 - lng1);
  const y = Math.sin(dL) * Math.cos(r(lat2));
  const x = Math.cos(r(lat1)) * Math.sin(r(lat2)) - Math.sin(r(lat1)) * Math.cos(r(lat2)) * Math.cos(dL);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
function suavizarBearing(b) {
  bearingHistorico.push(b);
  if (bearingHistorico.length > MAX_HIST) bearingHistorico.shift();
  let s = 0, c = 0;
  bearingHistorico.forEach(v => { s += Math.sin(v*Math.PI/180); c += Math.cos(v*Math.PI/180); });
  return (Math.atan2(s, c) * 180 / Math.PI + 360) % 360;
}

function toggle3D() {
  modo3DAtivo = !modo3DAtivo;
  document.getElementById('btnToggle3D').classList.toggle('ativo', modo3DAtivo);
  if (!modo3DAtivo) {
    map.easeTo({ pitch:0, bearing:0, duration:600 });
    document.getElementById('headingBadge').style.display = 'none';
  } else {
    seguindoMoto = true;
    if (posAtual) moverEntregador(posAtual[0], posAtual[1], null);
  }
}
function resetarRotacao() {
  ultimaDirecao = 0; bearingHistorico = [];
  map.easeTo({ bearing:0, pitch:modo3DAtivo?65:0, duration:600 });
  document.getElementById('setaNorte').style.transform = 'rotate(0deg)';
  document.getElementById('headingBadge').textContent = '0°';
  seguindoMoto = true;
}
function recentrarMapa() {
  if (autoResumeTimer) { clearTimeout(autoResumeTimer); autoResumeTimer = null; }
  seguindoMoto = true; modo3DAtivo = true;
  document.getElementById('btnToggle3D').classList.add('ativo');
  if (posAtual) moverEntregador(posAtual[0], posAtual[1], null);
  else map.flyTo({ center:[FABRICA[1],FABRICA[0]], zoom:17 });
}

// ===== GPS =====
function iniciarGPS() {
  if (!navigator.geolocation) { setBadge(false,'Sem GPS'); return; }
  setBadge(true,'Conectando...');
  if (_gpsWatchId !== null) { navigator.geolocation.clearWatch(_gpsWatchId); _gpsWatchId = null; }
  _gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      if (_gpsErroTimer) { clearTimeout(_gpsErroTimer); _gpsErroTimer = null; }
      processarPosicao(pos);
    },
    (err) => {
      if (!_gpsErroTimer) {
        _gpsErroTimer = setTimeout(() => {
          setBadge(false, 'GPS erro');
          gpsOk = false;
          setTimeout(() => iniciarGPS(), 3000);
        }, 10000);
      }
    },
    { enableHighAccuracy:true, timeout:30000, maximumAge:2000 }
  );
  setInterval(() => {
    if (_ultimaPosicaoTs > 0 && Date.now() - _ultimaPosicaoTs > 20000) {
      _ultimaPosicaoTs = Date.now();
      iniciarGPS();
    }
  }, 10000);
}
async function processarPosicao(pos) {
  _ultimaPosicaoTs = Date.now();
  const lat = pos.coords.latitude, lon = pos.coords.longitude;
  const acc = pos.coords.accuracy, heading = pos.coords.heading;
  const speedMs = pos.coords.speed || 0;
  const speedKmh = Math.round(speedMs * 3.6);
  setBadge(true, `±${Math.round(acc)}m`);
  gpsOk = true;
  atualizarVelocimetro(speedKmh);
  let distMovida = 999;
  if (posAtual) distMovida = calcDistM(posAtual[0],posAtual[1],lat,lon);

  moverEntregador(lat, lon, heading);
  _onMoveNavAvulsa();

  const agora = Date.now();
  if (agora - ultimoEnvioGPS >= THROTTLE_GPS_MS) {
    ultimoEnvioGPS = agora;
    await enviarPosicaoSupabase(lat, lon, acc, speedKmh);
  }
  if (rotaAtual && paradasList.length) await verificarProximidade(lat, lon);
  if (rotaAtual) {
    const prox = paradasList.find(p => p.status==='pendente' && p.coords);
    if (prox) {
      // Recalcula linha azul se moveu >80m (atualização normal)
      if (distMovida > 80) {
        ultimaProximaId = null;
        desenharRotaProxima([lat,lon], prox);
      }
      // Recalcula se desviou >60m da linha azul atual
      _verificarDesvioRota(lat, lon, prox);
    }
  }
  await tickRotaAleatoria(lat, lon);
}
// ===== RECÁLCULO POR DESVIO =====
let _cacheLinhaProxima = null; // coordenadas [lng,lat] da linha azul atual
let _ultimoRecalculo = 0;

// Intercepta setGJ para guardar cache da linha azul
const _setGJOrig = setGJ;
function setGJ(src, coords, fallbackPts) {
  if (src === 'rota-proxima') _cacheLinhaProxima = coords || null;
  _setGJOrig(src, coords, fallbackPts);
}

function _distPontoSegmento(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay;
  if (dx===0 && dy===0) return Math.hypot(px-ax, py-ay);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}

function _distPontoLinha(lat, lon, linha) {
  // linha = [[lng,lat], ...] — converte para graus simples (suficiente para 60m)
  if (!linha || linha.length < 2) return Infinity;
  let minDist = Infinity;
  for (let i = 0; i < linha.length-1; i++) {
    const d = _distPontoSegmento(lon, lat, linha[i][0], linha[i][1], linha[i+1][0], linha[i+1][1]);
    // Converte graus → metros (aproximação: 1° ≈ 111000m)
    if (d * 111000 < minDist) minDist = d * 111000;
  }
  return minDist;
}

async function _verificarDesvioRota(lat, lon, prox) {
  const agora = Date.now();
  if (agora - _ultimoRecalculo < 10000) return; // no máximo 1x a cada 10s
  const dist = _distPontoLinha(lat, lon, _cacheLinhaProxima);
  if (dist > 60) {
    _ultimoRecalculo = agora;
    ultimaProximaId = null;
    desenharRotaProxima([lat, lon], prox);
  }
}

// ===== PROXIMIDADE =====
async function verificarProximidade(lat, lon) {
  // Se todas entregues, verifica se chegou na fábrica
  if (rotaAtual && paradasList.length && paradasList.every(p => p.status==='entregue')) {
    const distFab = calcDistM(lat, lon, FABRICA[0], FABRICA[1]);
    const chip = document.getElementById('proximidadeChip');
    chip.style.display = 'block';
    if (distFab <= RAIO_ENTREGA * 3) {
      chip.className = 'proximidadeChip chegando';
      chip.textContent = '🏭 Chegou na fábrica!';
      const rotaId = rotaAtual.id;
      rotaAtual = null; setGJ('rota-completa',null); setGJ('rota-proxima',null);
      await sb.from("rotas").update({
        status:'concluido', fim_em:agoraISO(),
        gps_lat:null, gps_lon:null, gps_ts:null
      }).eq("id", rotaId);
      chip.style.display = 'none';
      falarVoz('Rota finalizada. Você chegou à fábrica.');
      showToast('🏭 Rota finalizada!', 'success');
      renderTudo(); renderizarMarcadores();
    } else {
      chip.className = 'proximidadeChip longe';
      chip.textContent = `🏭 ${Math.round(distFab)}m da fábrica`;
    }
    return;
  }

  let continuar = true;
  while (continuar) {
    continuar = false;
    const prox = paradasList.find(p => p.status==='pendente' && p.coords);
    if (!prox) { document.getElementById('proximidadeChip').style.display='none'; return; }
    const dist = calcDistM(lat, lon, prox.coords[0], prox.coords[1]);
    const chip = document.getElementById('proximidadeChip');
    chip.style.display = 'block';
    if (dist <= RAIO_ENTREGA) {
      chip.className = 'proximidadeChip chegando';
      chip.textContent = `✅ Entregando ${prox.nome}...`;
      if (paradaAtualId !== prox.id) {
        paradaAtualId = prox.id; estavaNaParada = true;
        // Inicia fluxo: popup de pagamento (se não for fiado) + timer 5s para confirmar
        iniciarFluxoEntrega(prox);
      }
    } else {
      chip.className = 'proximidadeChip longe';
      chip.textContent = dist<=200 ? `🛵 ${Math.round(dist)}m de ${prox.nome}` : `🏁 ${Math.round(dist)}m — ${prox.nome}`;
      if (paradaAtualId === prox.id && _timersEntrega[prox.id]) {
        clearTimeout(_timersEntrega[prox.id]);
        delete _timersEntrega[prox.id];
      }
      estavaNaParada = false; paradaAtualId = null;
      renderProximaCard(prox, dist);
    }
  }
}

// ===== FLUXO DE ENTREGA: popup + timer 5s + voz =====
let _timersEntrega = {}; // guarda timers por parada id

async function iniciarFluxoEntrega(parada) {
  if (_timersEntrega[parada.id]) return; // já iniciado

  // Busca pedido na janela correta (regra das 14h)
  const _janelaEnt = _janelaPedido();
  const { data: pedidos } = await sb.from("pedidos")
    .select("id,total,payment_method,customer_name")
    .eq("customer_phone", parada.cliente_phone)
    .gte("created_at", _janelaEnt.inicio).lte("created_at", _janelaEnt.fim)
    .order("created_at",{ascending:false}).limit(1);

  const pedido = pedidos?.[0] || null;
  const metodo = (pedido?.payment_method || '').toUpperCase();
  const eFiado = metodo === 'FIADO' || metodo.includes('FIADO');

  // Abre popup se não for fiado e tiver pedido
  if (pedido && !eFiado) {
    filaPagamentos.push({ parada, pedido });
    processarFilaPagamentos();
  }

  // Timer de 5 segundos — confirma entrega independente do popup
  _timersEntrega[parada.id] = setTimeout(async () => {
    delete _timersEntrega[parada.id];
    // Fecha popup desta parada se ainda aberto
    if (paradaPagamentoPendente?.parada?.id === parada.id) {
      document.getElementById('pagamentoModal').classList.remove('show');
      paradaPagamentoPendente = null;
      pagamentoEmAndamento = false;
      filaPagamentos = filaPagamentos.filter(x => x.parada.id !== parada.id);
      if (filaPagamentos.length > 0) setTimeout(() => processarFilaPagamentos(), 400);
    }
    // Confirma entrega
    await executarMarcarEntregue(parada.id, parada.nome);
    paradaAtualId = null; estavaNaParada = false;
    // Voz: entrega concluída
    falarVoz(`Entrega de ${parada.nome} concluída`);
    // Próxima parada
    setTimeout(() => {
      const prox = paradasList.find(p => p.status==='pendente');
      if (prox) falarVoz(`Próxima entrega: ${prox.nome}`);
    }, 3500);
  }, 5000);
}

// ===== OSRM =====
async function buscarOSRM(pontos) {
  if (!pontos || pontos.length < 2) return null;
  const coordStr = pontos.map(p => `${p[1]},${p[0]}`).join(';');

  // 1) OSRM servidor principal
  const osrmServers = [
    'https://router.project-osrm.org/route/v1/driving/',
    'https://routing.openstreetmap.de/routed-car/route/v1/driving/',
  ];
  for (const base of osrmServers) {
    try {
      const url = `${base}${coordStr}?overview=full&geometries=geojson&steps=false`;
      const r = await _fetchTimeout(url, {}, 7000);
      if (!r.ok) continue;
      const j = await r.json();
      if (j.code === 'Ok' && j.routes?.[0]?.geometry?.coordinates?.length > 1) {
        console.log('[Rota] OSRM OK:', base);
        return j.routes[0].geometry.coordinates;
      }
    } catch(e) { console.warn('[Rota] OSRM falhou:', e.message); }
  }

  // 2) Valhalla — otima cobertura no Brasil
  try {
    const locations = pontos.map(p => ({ lon: p[1], lat: p[0] }));
    const body = JSON.stringify({ locations, costing: 'auto', directions_options: { units: 'km' } });
    const r = await _fetchPostTimeout('https://valhalla.openstreetmap.de/route', body, 10000);
    if (r.ok) {
      const j = await r.json();
      if (j.trip?.legs?.length) {
        const allCoords = [];
        for (const leg of j.trip.legs) { allCoords.push(..._decodPoly6(leg.shape)); }
        if (allCoords.length > 1) {
          console.log('[Rota] Valhalla OK:', allCoords.length, 'pontos');
          return allCoords;
        }
      }
    }
  } catch(e) { console.warn('[Rota] Valhalla falhou:', e.message); }

  console.warn('[Rota] Todos falharam - linha reta');
  return null;
}
function setGJ(src, coords, fallbackPts) {
  try {
    if (!coords && !fallbackPts) { map.getSource(src)?.setData({type:'FeatureCollection',features:[]}); return; }
    const lnglat = coords || fallbackPts.map(p=>[p[1],p[0]]);
    map.getSource(src)?.setData({type:'Feature',geometry:{type:'LineString',coordinates:lnglat}});
  } catch(e){}
}
async function desenharRotaCompleta(paradas) {
  if (!paradas.length) { setGJ('rota-completa',null); setGJ('rota-volta',null); return; }

  // IDA: fábrica → todos os clientes (vermelho)
  const pontosIda = [FABRICA, ...paradas.map(p=>p.coords)];
  // VOLTA: último cliente → fábrica (laranja)
  const pontosVolta = [paradas[paradas.length-1].coords, FABRICA];

  const key = paradas.map(p=>p.id+p.status).join('|');
  let coordsIda;
  if (cacheRotaCompletaKey===key && cacheRotaCompleta) {
    coordsIda = cacheRotaCompleta;
  } else {
    coordsIda = await buscarOSRM(pontosIda);
    if (coordsIda) { cacheRotaCompleta=coordsIda; cacheRotaCompletaKey=key; }
  }
  setGJ('rota-completa', coordsIda, pontosIda);

  // Volta sempre busca separado (sem cache pois depende da posição atual)
  const coordsVolta = await buscarOSRM(pontosVolta);
  setGJ('rota-volta', coordsVolta, pontosVolta);
}
async function desenharRotaProxima(pa, prox) {
  if (!pa || !prox?.coords) { setGJ('rota-proxima',null); ultimaProximaId=null; return; }
  if (ultimaProximaId===prox.id) return;
  ultimaProximaId = prox.id;
  const coords = await buscarOSRM([pa, prox.coords]);
  setGJ('rota-proxima', coords, [pa, prox.coords]);
  // Fala instrução da próxima manobra
  setTimeout(() => iniciarNavegacaoVoz(), 800);
}

// ===== DADOS =====
async function carregarDados() {
  await calcularMediaEta();
  const hoje = hojeStr();
  const agora = new Date();
  const agoraBRT = horasBRT(agora);
  const horaAgora = agoraBRT.getHours() * 60 + agoraBRT.getMinutes(); // minutos desde meia-noite (BRT)
  const diaSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][agoraBRT.getDay()];

  // Regra das 14h: pedidos após 14h entram na rota do dia seguinte
  const _janela = _janelaPedido();

  const [{ data:rotas },{ data:clientes },{ data:pedidosHoje }] = await Promise.all([
    sb.from("rotas").select('*').order("hora_saida",{ascending:true}),
    sb.from("cadastros").select("*"),
    sb.from("pedidos")
      .select("customer_phone, customer_name, total, payment_method, id, items")
      .gte("created_at", _janela.inicio).lte("created_at", _janela.fim)
  ]);

  const phonesComPedido = new Set((pedidosHoje||[]).map(p=>p.customer_phone).filter(Boolean));
  // Mapa phone → pedido completo (para enriquecer paradas)
  const pedidoPorPhone = {};
  (pedidosHoje||[]).forEach(p=>{ if(p.customer_phone) pedidoPorPhone[p.customer_phone]=p; });


  // Converte ISO (pode ser UTC) para "YYYY-MM-DD" no fuso de SP
  function _dataEmSP(isoStr) {
    if (!isoStr) return null;
    try { const p = _partesSP(new Date(isoStr)); return `${p.year}-${p.month}-${p.day}`; }
    catch(e) { return isoStr.slice(0,10); }
  }

  // Normaliza nome
  const rotasNorm = (rotas||[]).map(r => ({ ...r, nome: r["Rotas"] || r.nome || r.name || "Sem nome" }));
  // Normaliza status das rotas conforme o dia
  todasAsRotas = rotasNorm.map(r => {
    const cHoje = _dataEmSP(r.fim_em) === hoje, aHoje = _dataEmSP(r.saida_em) === hoje;
    if (r.status==='concluido'&&!cHoje) return {...r,status:'criada'};
    if (r.status==='em_andamento'&&!aHoje) return {...r,status:'criada'};
    return r;
  });

  // Filtra apenas rotas do dia de hoje
  // (rota especial não tem dias_semana, mas também não tem paradas_template — é incluída sempre)
  todasAsRotas = todasAsRotas.filter(r => !r.dias_semana || r.dias_semana.length===0 || r.dias_semana.includes(diaSemana));

  // Mapa de clientes por phone para enriquecer coordenadas
  const clientePorPhone = {};
  (clientes||[]).forEach(c=>{ if(c.phone) clientePorPhone[c.phone]=c; });

  for (const rota of todasAsRotas) {
    const tmpl = rota.paradas_template||[];
    if (!tmpl.length) continue;

    // Monta paradas ativas cruzando template × pedidos de hoje
    const ativas = tmpl
      .filter(p => p.cliente_phone && phonesComPedido.has(p.cliente_phone))
      .map((p, i) => {
        const pedido = pedidoPorPhone[p.cliente_phone];
        const cli    = clientePorPhone[p.cliente_phone];

        // Tenta obter coordenadas: template → cliente cadastrado
        let coords = p.coords || null;
        if (!coords && cli?.delivery_lat && cli?.delivery_lon)
          coords = [parseFloat(cli.delivery_lat), parseFloat(cli.delivery_lon)];

        // Endereço: template → cliente
        const endereco = p.endereco || cli?.delivery_address || '';

        // Status preservado se rota já em andamento
        // Preserva status salvo tanto em rotas em andamento quanto concluídas
        const _paradaSalva = (rota.status==='em_andamento'||rota.status==='concluido') ? rota.paradas?.find(a=>a.cliente_phone===p.cliente_phone) : null;
        const statusSalvo = _paradaSalva?.status || 'pendente';

        return {
          ...p,
          coords,
          endereco,
          nome: p.nome || p.name || cli?.name || pedido?.customer_name || p.cliente_phone,
          status: statusSalvo,
          eta_min: Math.round((i+1)*mediaMinPorParada),
          total: pedido?.total || p.total || 0,
          payment_method: pedido?.payment_method || p.payment_method || ''
        };
      })
      // Só inclui paradas que têm coordenadas
      .filter(p => p.coords);

    // Persiste paradas se mudaram (só em rotas ainda não iniciadas)
    if (rota.status==='criada' && JSON.stringify(rota.paradas||[])!==JSON.stringify(ativas)) {
      await sb.from("rotas").update({paradas:ativas}).eq("id",rota.id);
    }
    rota.paradas = ativas;
  }

  todosOsClientes = (clientes||[]).map(c => {
    const coords = c.delivery_lat&&c.delivery_lon ? [parseFloat(c.delivery_lat),parseFloat(c.delivery_lon)] : null;
    return {...c, nome:c.name, coords, temPedidoHoje: phonesComPedido.has(c.phone)};
  }).filter(c => c.coords); // todos com endereço cadastrado aparecem no mapa

  // Verifica se alguma rota do dia deve ser iniciada automaticamente
  await verificarAutoInicioRotas(horaAgora);

  const em = todasAsRotas.find(r=>r.status==='em_andamento');
  rotaAtual = em||null; paradasList = em?.paradas||[];
  renderTudo();
  if (map.isStyleLoaded()) renderizarMarcadores();
  else map.once('load', renderizarMarcadores);
}

// ===== AUTO-INÍCIO DE ROTA =====
async function verificarAutoInicioRotas(horaAgoraMin) {
  // Já tem rota em andamento → nada a fazer
  if (todasAsRotas.some(r=>r.status==='em_andamento')) return;

  // Encontra rotas prontas: status criada/aguardando, com paradas, e horário chegou
  const candidatas = todasAsRotas.filter(r => {
    if (r.status==='em_andamento'||r.status==='concluido') return false;
    if (!r.paradas?.length) return false;
    if (!r.hora_saida) return true; // sem horário definido → sempre elegível
    const [h,m] = r.hora_saida.split(':').map(Number);
    const horaSaida = h*60 + m;
    // Só inicia se estiver dentro da janela: horário chegou E não passou mais de 60 min
    return horaAgoraMin >= horaSaida && horaAgoraMin <= horaSaida + 60;
  });

  if (candidatas.length === 0) return;

  // Sempre inicia automaticamente: escolhe a de horário mais cedo (ou a primeira da lista)
  const melhor = candidatas.sort((a, b) => {
    const toMin = h => { if (!h) return 9999; const [hh,mm]=h.split(':').map(Number); return hh*60+mm; };
    return toMin(a.hora_saida) - toMin(b.hora_saida);
  })[0];

  await iniciarRota(melhor);
}

async function iniciarRota(rota) {
  const ts = agoraISO();
  const agora = new Date();
  const agoraBRT2 = horasBRT(agora);
  const hoje = hojeStr();
  const ontemDate = new Date(new Date().getTime() - 86400000);
  const ontem = (() => { const p = _partesSP(ontemDate); return `${p.year}-${p.month}-${p.day}`; })();
  const depoisDas1130 = agoraBRT2.getHours() > 11 || (agoraBRT2.getHours() === 11 && agoraBRT2.getMinutes() >= 30);
  const janela_inicio = depoisDas1130 ? hoje + 'T11:30:00' : ontem + 'T11:30:00';

  // Rotas ainda não iniciadas (proximas_rotas para o cardápio calcular ETA)
  const proximas = todasAsRotas
    .filter(r => r.id !== rota.id && r.status === 'criada' && r.paradas?.length > 0)
    .map(r => ({ id: r.id, nome: r.nome, hora_saida: r.hora_saida, qtd_paradas: r.paradas.length }));

  await sb.from("rotas").update({
    status: 'em_andamento',
    saida_em: ts,
    janela_inicio,
    proximas_rotas: proximas,
    total_paradas_dia: rota.paradas?.length || 0,
    entregas_realizadas: 0,
    phones_entregues: []
  }).eq("id", rota.id);

  rota.status = 'em_andamento';
  rota.saida_em = ts;
  rotaAtual = rota;
  paradasList = rota.paradas || [];

  showToast(`🛵 Rota "${rota.nome}" iniciada!`, 'success');
  renderTudo();
  if (map.isStyleLoaded()) renderizarMarcadores();
}

async function calcularMediaEta() {
  const ontem = new Date(); ontem.setDate(ontem.getDate()-1);
  const base = (() => { const p = _partesSP(ontem); return `${p.year}-${p.month}-${p.day}`; })();
  const {data:hist} = await sb.from("rotas").select("paradas,saida_em,fim_em")
    .gte("created_at",base+'T00:00:00').lte("created_at",base+'T23:59:59').eq("status","concluido").limit(5);
  if (hist?.length) {
    const ts = hist.filter(h=>h.saida_em&&h.fim_em&&h.paradas?.length).map(h=>(new Date(h.fim_em)-new Date(h.saida_em))/60000/h.paradas.length);
    if (ts.length) { mediaMinPorParada=ts.reduce((a,b)=>a+b,0)/ts.length; return; }
  }
  mediaMinPorParada = 12;
}
function iniciarRealtime() {
  if (realtimeCh) { try{sb.removeChannel(realtimeCh);}catch(e){} }
  realtimeCh = sb.channel('entregador_rotas')
    .on('postgres_changes',{event:'*',schema:'public',table:'rotas'}, async()=>{ await carregarDados(); })
    .subscribe();
}

      .setLngLat([coords[1],coords[0]])
      .addTo(map);

    // LONG-PRESS 2s
    const HOLD_MS=2000;
    let pTimer=null,rAF=null,pStart=0,pAtivo=false,uidAtivo=null;
    function iniciarHold(e) {
      let elT=e.target||e; let uid=null;
      for(let i=0;i<6&&elT;i++){if(elT.dataset?.uid){uid=elT.dataset.uid;break;}elT=elT.parentElement;}
      if(!uid) uid=`cm_${coords[0].toFixed(5).replace('.','')}_${coords[1].toFixed(5).replace('.','')}_0`;
      uidAtivo=uid; pAtivo=true; pStart=performance.now();
      const ico=document.getElementById(uid+'_ico');
      if(ico)ico.style.transform='scale(1.1)';
      function tick(){
        if(!pAtivo)return;
        const pct=Math.min((performance.now()-pStart)/HOLD_MS,1);
        const ring=document.getElementById(uid+'_ring');
        if(ring)ring.style.strokeDashoffset=(C*(1-pct)).toFixed(2);
        if(pct<1)rAF=requestAnimationFrame(tick); else completarHold(uid);
      }
      rAF=requestAnimationFrame(tick);
      pTimer=setTimeout(()=>completarHold(uid),HOLD_MS+50);
    }
    async function completarHold(uid){
      pAtivo=false; cancelAnimationFrame(rAF); clearTimeout(pTimer);
      const ring=document.getElementById(uid+'_ring'),ico=document.getElementById(uid+'_ico');
      if(ring){ring.style.transition='stroke-dashoffset 0s,opacity 0.4s';ring.style.strokeDashoffset='0';ring.style.opacity='1';

      if(ico){ico.style.transform='scale(1.25)';setTimeout(()=>{ico.style.transform='';},300);}
      const ci=parseInt((uid.split('_').pop()))||0;

    }
    function cancelarHold(){
      if(!pAtivo)return; pAtivo=false; cancelAnimationFrame(rAF); clearTimeout(pTimer);
      if(uidAtivo){
        const ring=document.getElementById(uidAtivo+'_ring'),ico=document.getElementById(uidAtivo+'_ico');
        if(ring){ring.style.transition='stroke-dashoffset 0.2s ease';ring.style.strokeDashoffset=C.toFixed(1);}
        if(ico)ico.style.transform='';
      }
      uidAtivo=null;
    }
    el.addEventListener('mousedown',iniciarHold);
    el.addEventListener('touchstart',iniciarHold,{passive:true});
    el.addEventListener('mouseup',cancelarHold);
    el.addEventListener('mouseleave',cancelarHold);
    el.addEventListener('touchend',cancelarHold);
    el.addEventListener('touchcancel',cancelarHold);
  });
}

// ===== FINALIZAR ROTA MANUAL =====
function abrirFinalizarRota() {
  if (!rotaAtual) return;
  fecharPainel();
  const ent = paradasList.filter(p => p.status === 'entregue').length;
  const pend = paradasList.length - ent;
  const ehAleatoria = rotaAtual._ehAleatoria;

  document.getElementById('finalizarIcon').textContent = ehAleatoria ? '🎲' : '🏁';
  document.getElementById('finalizarTitulo').textContent = ehAleatoria ? 'Finalizar saída?' : 'Finalizar rota?';
  document.getElementById('finalizarInfo').textContent = `📦 ${ent}/${paradasList.length} entregues`;

  if (ehAleatoria) {
    document.getElementById('finalizarBtnsNormal').style.display = 'none';
    document.getElementById('finalizarBtnsAleatoria').style.display = 'block';
    if (pend > 0) {
      document.getElementById('finalizarSub').textContent =
        `${ent} entregue${ent!==1?'s':''}, ${pend} pendente${pend!==1?'s':''}. O que deseja fazer com os pendentes?`;
    } else {
      document.getElementById('finalizarSub').textContent = 'Todas as entregas concluídas! Confirme para encerrar a saída.';
      // Se não há pendentes, esconde o botão de descartar
      document.querySelector('#finalizarBtnsAleatoria button:nth-child(2)').style.display = 'none';
    }
  } else {
    document.getElementById('finalizarBtnsNormal').style.display = 'block';
    document.getElementById('finalizarBtnsAleatoria').style.display = 'none';
    document.getElementById('finalizarSub').textContent =
      pend > 0 ? `Ainda há ${pend} parada${pend>1?'s':''} pendente${pend>1?'s':''}. Ao confirmar, todas serão marcadas como entregues e a rota será finalizada.`
               : 'Todas as paradas já estão entregues. A rota será marcada como concluída.';
  }
  document.getElementById('finalizarModal').style.display = 'flex';
}



// Chamado pelos botões do modal de rota aleatória
async function executarFinalizarAleatoria(opcao) {
  document.getElementById('finalizarModal').style.display = 'none';
  if (!rotaAtual?._ehAleatoria) return;
  Object.keys(_timersEntrega).forEach(k => { clearTimeout(_timersEntrega[k]); delete _timersEntrega[k]; });
  paradaAtualId = null; estavaNaParada = false;

  if (opcao === 'entregar') {
    // Marca todos os pendentes como entregues antes de finalizar
    const agora = agoraISO();
    paradasList.forEach(p => {
      if (p.status !== 'entregue') { p.status = 'entregue'; p.entregue_em = agora; }
    });
    showToast('✅ Todos marcados como entregues!', 'success');
  } else {
    // Descarta: pendentes voltam pra fila (comportamento padrão do finalizarSaidaAleatoria)
    showToast('↩️ Pendentes voltaram para a fila', '');
  }
  await finalizarSaidaAleatoria();
}

async function executarFinalizarRota() {
  document.getElementById('finalizarModal').style.display = 'none';
  if (!rotaAtual) return;

  // Rota aleatória — redireciona para o fluxo correto com opção
  if (rotaAtual._ehAleatoria) {
    // Não deve chegar aqui pois o modal aleatório usa executarFinalizarAleatoria
    // mas como fallback, trata como descartar
    await executarFinalizarAleatoria('descartar');
    return;
  }

  // Rota normal — marca TODAS as paradas como entregues
  const agora = agoraISO();
  const totalParadas = paradasList.length;
  const rotaId = rotaAtual.id;

  // PASSO 1: Monta array de paradas todas entregues
  const paradasFinal = paradasList.map(p => ({...p, status: 'entregue', entregue_em: p.entregue_em || agora}));

  // PASSO 2: Atualiza a rota como concluída com todas as paradas entregues em UMA única chamada
  try {
    await sb.from("rotas").update({
      status: 'concluido',
      fim_em: agora,
      paradas: paradasFinal,
      entregas_realizadas: paradasFinal.length,
      phones_entregues: paradasFinal.map(p => p.cliente_phone).filter(Boolean),
      gps_lat: null, gps_lon: null, gps_ts: null
    }).eq("id", rotaId);
  } catch(e) {
    console.error('Erro ao finalizar rota:', e);
    showToast('❌ Erro ao finalizar rota. Tente novamente.', 'warn');
    return;
  }

  // PASSO 3: Cancela timers de entrega pendentes para não reprocessar
  Object.keys(_timersEntrega).forEach(k => { clearTimeout(_timersEntrega[k]); delete _timersEntrega[k]; });
  paradaAtualId = null; estavaNaParada = false;

  // PASSO 4: Limpa a rota atual da memória
  rotaAtual = null;
  paradasList = [];
  cacheRotaCompleta = null;
  cacheRotaCompletaKey = '';
  ultimaProximaId = null;
  setGJ('rota-completa', null);
  setGJ('rota-proxima', null);
  document.getElementById('proximidadeChip').style.display = 'none';

  // PASSO 5: Renderiza a UI para indicar que não há rota ativa
  renderTudo();
  renderizarMarcadores();

  // PASSO 6: Mostra notificação
  showToast(`🏁 Rota finalizada! ${totalParadas} entrega${totalParadas!==1?'s':''} concluída${totalParadas!==1?'s':''}! ✓`, 'success');
  falarVoz('Rota finalizada com sucesso.');

  // PASSO 7: Recarrega dados após 3 segundos (tempo suficiente para o banco processar)
  setTimeout(() => {
    carregarDados().catch(e => console.error('Erro ao recarregar:', e));
  }, 3000);
}

async function iniciarRotaManual(rotaId) {
  const rota = todasAsRotas.find(r=>r.id===rotaId);
  if (!rota) return;

  // Verifica horário — nunca inicia antes do horário definido
  if (rota.hora_saida) {
    const agora = new Date();
    const horaAgoraMin = horasBRT(agora).getHours()*60 + horasBRT(agora).getMinutes();
    const [h,m] = rota.hora_saida.split(':').map(Number);
    const horaSaidaMin = h*60 + m;
    if (horaAgoraMin < horaSaidaMin) {
      showToast(`⏰ Esta rota só pode iniciar às ${rota.hora_saida.substring(0,5)}`, 'error');
      return;
    }
  }

  await iniciarRota(rota);
  fecharPainel();
}

// ===== ROTA ALEATÓRIA — LÓGICA COMPLETA =====
// Regras:
// - Config salva no banco (chave: rota_aleatoria) — mesma tabela rota_especial_gps
// - Tem janela de horário (hora_inicio → hora_fim) e dias da semana
// - Clientes que fazem pedido dentro da janela entram na fila automaticamente
// - O ENTREGADOR decide quando sair (botão "Sair agora com X clientes")
// - Saída confirmada apenas após ultrapassar o raio da fábrica (configurável pelo ADM)
// - Não-entregues voltam automaticamente para pendente na próxima saída
// - ADM pode "empurrar" cliente para próxima saída pelo painel do ADM

async function carregarConfigRA() {
  try {
    const { data } = await sb.from('rota_especial_gps').select('valor').eq('chave', RA_CHAVE).maybeSingle();
    _raConfig = data ? JSON.parse(data.valor) : null;
  } catch(e) { console.warn('RA config:', e); _raConfig = null; }
}

async function _salvarRA() {
  await sb.from('rota_especial_gps').upsert(
    { chave: RA_CHAVE, valor: JSON.stringify(_raConfig) },
    { onConflict: 'chave' }
  );
}

// Verifica se a rota aleatória está ativa agora (horário + dia da semana)
function raAtiva() {
  if (!_raConfig?.ativa) return false;
  const agoraBRT = horasBRT(new Date());
  // Dias: ADM salva como ['seg','ter','qua','qui','sex','sab','dom']
  const diasMap = ['dom','seg','ter','qua','qui','sex','sab'];
  const hoje = diasMap[agoraBRT.getDay()];
  if (_raConfig.dias_operacao?.length && !_raConfig.dias_operacao.includes(hoje)) return false;
  const toMin = h => { const [hh, mm] = (h || '00:00').split(':').map(Number); return hh * 60 + mm; };
  const agoraMin = agoraBRT.getHours() * 60 + agoraBRT.getMinutes();
  // Usa < estrito: às hora_fim exato já NÃO aceita mais pedidos
  return agoraMin >= toMin(_raConfig.hora_inicio) && agoraMin < toMin(_raConfig.hora_fim);
}

// tickRotaAleatoria: verifica proximidade da fábrica usando raio configurado pelo ADM
async function tickRotaAleatoria(lat, lon) {
  if (!_raConfig) return;
  const raio = _raConfig.raio_fabrica || 100;
  const dist = calcDistM(lat, lon, FABRICA[0], FABRICA[1]);
  const dentroAgora = dist <= raio;

  // Saiu da fábrica → confirma saída da rota aleatória
  if (_dentroFabrica && !dentroAgora && rotaAtual?._ehAleatoria) {
    _dentroFabrica = false;
    showToast(`🛵 Saída confirmada! ${paradasList.length} entrega(s)`, 'success');
    falarVoz(`Saída confirmada. ${paradasList.length} entregas.`);
    renderTudo();
  }

  // Voltou à fábrica com rota aleatória em andamento
  if (!_dentroFabrica && dentroAgora) {
    _dentroFabrica = true;
    if (rotaAtual?._ehAleatoria) {
      await finalizarSaidaAleatoria();
    }
    await carregarConfigRA();
    const filaAcum = (_raConfig?.clientes_fila || []).filter(c => c.status === 'pendente').length;
    showToast(filaAcum > 0 ? `🏭 Voltou! ${filaAcum} cliente(s) aguardando` : '🏭 Voltou à fábrica!', 'success');
    renderTudo();
  }

  if (_dentroFabrica && !dentroAgora && !rotaAtual?._ehAleatoria) {
    _dentroFabrica = false;
  }
}

// Entregador decide sair com os clientes pendentes na fila
async function sairComFilaAleatoria() {
  await carregarConfigRA();
  if (!_raConfig) { showToast('⚠️ Rota aleatória não configurada', 'warn'); return; }

  const fila = (_raConfig.clientes_fila || []).filter(c => c.status === 'pendente' && c.coords);
  if (!fila.length) { showToast('🎲 Nenhum cliente na fila ainda', 'warn'); return; }

  const paradas = fila.map((c, i) => ({
    id: Date.now().toString() + '_' + i,
    cliente_phone: c.phone,
    nome: c.nome,
    endereco: c.endereco,
    coords: c.coords,
    status: 'pendente',
    eta_min: (i + 1) * mediaMinPorParada
  }));

  // Marca clientes desta saída como em_rota
  _raConfig.clientes_fila = (_raConfig.clientes_fila || []).map(c =>
    fila.find(f => f.phone === c.phone) ? { ...c, status: 'em_rota' } : c
  );
  await _salvarRA();

  const rotaTemp = {
    id: 'aleatoria_temp_' + Date.now(),
    nome: '🎲 Rota Aleatória',
    status: 'em_andamento',
    saida_em: agoraISO(),
    paradas,
    _ehAleatoria: true
  };

  rotaAtual = rotaTemp;
  paradasList = paradas;
  _dentroFabrica = true; // Saída confirmada só ao ultrapassar o raio

  showToast(`🎲 Pronto! Saia da fábrica para confirmar (${paradas.length} cliente(s))`, 'success');
  renderTudo();
  if (map.isStyleLoaded()) renderizarMarcadores();
}

// Finaliza a saída atual da rota aleatória
async function finalizarSaidaAleatoria() {
  if (!rotaAtual?._ehAleatoria) return;
  await carregarConfigRA();
  if (_raConfig) {
    const phonesEntregues = paradasList.filter(p => p.status === 'entregue').map(p => p.cliente_phone);
    // Entregues → remove da fila | Não-entregues → volta para pendente
    _raConfig.clientes_fila = (_raConfig.clientes_fila || [])
      .filter(c => !phonesEntregues.includes(c.phone))
      .map(c => c.status === 'em_rota' ? { ...c, status: 'pendente' } : c);
    await _salvarRA();
  }
  // Cancela todos os timers de entrega pendentes
  Object.keys(_timersEntrega).forEach(k => { clearTimeout(_timersEntrega[k]); delete _timersEntrega[k]; });
  paradaAtualId = null; estavaNaParada = false;
  rotaAtual = null;
  paradasList = [];
  cacheRotaCompleta = null; cacheRotaCompletaKey = ''; ultimaProximaId = null;
  setGJ('rota-completa', null); setGJ('rota-proxima', null); setGJ('rota-avulsa', null);
  document.getElementById('proximidadeChip').style.display = 'none';
  renderTudo();
  // Recarrega dados do banco para os marcadores voltarem ao estado correto (sem rota)
  await carregarDados();
  renderizarMarcadores();
}

// Listener de novos pedidos → adiciona automaticamente na fila se dentro do horário e dia
async function adicionarNaFilaRA(pedido) {
  await carregarConfigRA();
  if (!_raConfig || !raAtiva()) return;

  const { data: cli } = await sb.from('cadastros')
    .select('name,phone,delivery_lat,delivery_lon,delivery_address')
    .eq('phone', pedido.customer_phone).maybeSingle();
  if (!cli?.delivery_lat || !cli?.delivery_lon) return;

  const fila = _raConfig.clientes_fila || [];
  if (fila.find(x => x.phone === pedido.customer_phone && (x.status === 'pendente' || x.status === 'em_rota'))) return;

  fila.push({
    id: Date.now().toString(),
    phone: cli.phone,
    nome: cli.name || pedido.customer_name,
    endereco: cli.delivery_address || `${cli.delivery_lat}, ${cli.delivery_lon}`,
    coords: [parseFloat(cli.delivery_lat), parseFloat(cli.delivery_lon)],
    hora_pedido: agoraISO().substring(11, 16),
    status: 'pendente'
  });
  _raConfig.clientes_fila = fila;
  await _salvarRA();
  showToast(`🎲 ${cli.name} entrou na fila!`, 'success');
  renderTodasRotas();
}

function iniciarRotaAleatoria() {
  carregarConfigRA();
  if (_realtimePedidos) { try { sb.removeChannel(_realtimePedidos); } catch(e) {} }
  _realtimePedidos = sb.channel('ra_pedidos')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'pedidos' }, async (payload) => {
      await adicionarNaFilaRA(payload.new);
    })
    .subscribe();
}

// ===== ADICIONAR CLIENTE À ROTA =====
async function adicionarClienteNaRota(nome, phone, coords, endereco) {
  await carregarConfigRA();
  // Fecha popups abertos
  marcadoresMapLibre.forEach(m => { try { m.getPopup()?.remove(); } catch(e){} });

  // CASO 1: Tem rota ativa → adiciona como parada imediata
  if (rotaAtual && !rotaAtual._ehAleatoria) {
    const jaExiste = paradasList.find(p => p.cliente_phone === phone && p.status === "pendente");
    if (jaExiste) { showToast("⚠️ " + nome + " já está na rota", "warn"); return; }
    const novaParada = {
      id: Date.now().toString(),
      cliente_phone: phone,
      nome, endereco, coords,
      status: "pendente",
      eta_min: (paradasList.filter(p => p.status === "pendente").length + 1) * mediaMinPorParada
    };
    const novasParadas = [...(rotaAtual.paradas || []), novaParada];
    const { error } = await sb.from("rotas").update({ paradas: novasParadas }).eq("id", rotaAtual.id);
    if (error) { showToast("❌ Erro ao adicionar", ""); return; }
    showToast("✅ " + nome + " adicionado à rota!", "success");
    falarVoz(nome + " adicionado à rota");
    await carregarDados();
    return;
  }

  // CASO 2: Sem rota ativa (ou rota aleatória) → coloca na fila da rota aleatória
  if (!_raConfig) { showToast("⚠️ Rota aleatória não configurada no admin", "warn"); return; }
  const fila = _raConfig.clientes_fila || [];
  if (fila.find(x => x.phone === phone && (x.status === "pendente" || x.status === "em_rota"))) {
    showToast("⚠️ " + nome + " já está na fila da rota aleatória", "warn"); return;
  }
  fila.push({
    id: Date.now().toString(),
    phone, nome, endereco, coords,
    hora_pedido: agoraISO().substring(11, 16),
    status: "pendente"
  });
  _raConfig.clientes_fila = fila;
  await _salvarRA();
  showToast("🎲 " + nome + " adicionado à fila da rota aleatória!", "success");
  falarVoz(nome + " adicionado à fila");
  renderTodasRotas();
}

// ===== VELOCÍMETRO =====
function atualizarVelocimetro(kmh) {
  const el = document.getElementById('velValor');
  const arc = document.getElementById('velArcFill');
  if (!el || !arc) return;
  el.textContent = kmh;
  // Arco: max 80 km/h = 251.2 circunferência
  const pct = Math.min(kmh / 80, 1);
  const offset = 251.2 * (1 - pct);
  arc.style.strokeDashoffset = offset;
  // Cor: verde até 40, amarelo até 60, vermelho acima
  arc.style.stroke = kmh > 60 ? 'var(--red)' : kmh > 40 ? 'var(--primary)' : 'var(--green)';
}

// Navegação por rua — fala instruções baseado na rota OSRM com steps
async function iniciarNavegacaoVoz() {
  if (!rotaAtual || !posAtual) return;
  const prox = paradasList.find(p => p.status==='pendente' && p.coords);
  if (!prox) return;
  try {
    const url = `${OSRM_BASE}${posAtual[1]},${posAtual[0]};${prox.coords[1]},${prox.coords[0]}?overview=full&geometries=geojson&steps=true`;
    const r = await _fetchTimeout(url, {}, 6000);
    if (!r.ok) return;
    const j = await r.json();
    if (j.code !== 'Ok' || !j.routes?.length) return;
    const steps = j.routes[0].legs?.[0]?.steps || [];
    // Pega o próximo step relevante (ignora 'depart')
    const step = steps.find(s => s.maneuver?.type !== 'depart' && s.distance > 10) || steps[0];
    if (!step) return;
    // Só fala se estiver a 300 metros ou menos da manobra
    if (step.distance > 300) {
      // Reseta para falar quando chegar nos 300m
      _ultimaInstrucao = '';
      return;
    }
    const instrucao = traduzirManobra(step);
    if (instrucao && instrucao !== _ultimaInstrucao) {
      _ultimaInstrucao = instrucao;
      falarVoz(instrucao);
    }
  } catch(e) {}
}

function traduzirManobra(step) {
  const tipo = step?.maneuver?.type || '';
  const mod  = step?.maneuver?.modifier || '';
  const dist = step?.distance ? Math.round(step.distance) : 0;
  const distTxt = dist > 0 ? ` em ${dist >= 1000 ? (dist/1000).toFixed(1) + ' quilômetros' : dist + ' metros'}`: '';

  if (tipo === 'turn' || tipo === 'end of road') {
    if (mod === 'left')        return `Vire à esquerda${distTxt}`;
    if (mod === 'right')       return `Vire à direita${distTxt}`;
    if (mod === 'slight left') return `Mantenha à esquerda${distTxt}`;
    if (mod === 'slight right') return `Mantenha à direita${distTxt}`;
    if (mod === 'sharp left')  return `Vire totalmente à esquerda${distTxt}`;
    if (mod === 'sharp right') return `Vire totalmente à direita${distTxt}`;
    if (mod === 'uturn')       return `Faça o retorno${distTxt}`;
  }
  if (tipo === 'new name' || tipo === 'continue') return `Continue em frente${distTxt}`;
  if (tipo === 'depart')     return `Siga em frente${distTxt}`;
  if (tipo === 'arrive')     return `Chegando ao destino`;
  if (tipo === 'roundabout') return `Entre na rotatória${distTxt}`;
  if (tipo === 'rotary')     return `Entre na rotatória${distTxt}`;
  if (tipo === 'fork') {
    if (mod === 'left')  return `Mantenha à esquerda${distTxt}`;
    if (mod === 'right') return `Mantenha à direita${distTxt}`;
  }
  return '';
}

// ===== UTILS =====
function calcDistM(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

<!-- CACHE DE TILES -->
<script>
const TILE_CACHE='rei-coxinha-tiles-v2';
function bboxToTiles(swLat,swLon,neLat,neLon,z){
  const l2t=lon=>Math.floor((lon+180)/360*Math.pow(2,z));
  const lat2t=lat=>Math.floor((1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z));
  return{xMin:l2t(swLon),xMax:l2t(neLon),yMin:lat2t(neLat),yMax:lat2t(swLat)};
}
(function(){
  if(!('caches'in window))return;
  const oF=window.fetch.bind(window);
  window.fetch=async function(input,init){
    const url=typeof input==='string'?input:(input?.url||'');
    if(!url.includes('cartocdn.com')&&!url.includes('openstreetmap.org'))return oF(input,init);
    try{
      const cache=await caches.open(TILE_CACHE),cached=await cache.match(url);
      if(cached)return cached.clone();
      const r=await oF(input,init);
      if(r&&r.ok)cache.put(url,r.clone()).catch(()=>{});
      return r;
    }catch(e){try{const c=await caches.open(TILE_CACHE),ca=await c.match(url);if(ca)return ca.clone();}catch(_){}throw e;}
  };
})();
async function cachearTiles(){
  if(!('caches'in window))return;
  try{const c=await caches.open(TILE_CACHE);const k=await c.keys();if(k.length>500)return;}catch(e){return;}
  const bbox={swLat:-8.26,swLon:-35.10,neLat:-8.05,neLon:-34.85},sv=['a','b','c'],z=[12,13,14,15,16,17],urls=[];
  z.forEach(zl=>{const{xMin,xMax,yMin,yMax}=bboxToTiles(bbox.swLat,bbox.swLon,bbox.neLat,bbox.neLon,zl);
    for(let x=xMin;x<=xMax;x++)for(let y=yMin;y<=yMax;y++){const s=sv[Math.abs(x+y)%3];urls.push(`https://${s}.basemaps.cartocdn.com/dark_all/${zl}/${x}/${y}.png`);if(urls.length>=1400)return;}
  });
  try{const c=await caches.open(TILE_CACHE);for(let i=0;i<urls.length;i+=15){await Promise.allSettled(urls.slice(i,i+15).map(u=>fetch(u,{mode:'cors'}).then(r=>{if(r.ok)c.put(u,r);}).catch(()=>{})));await new Promise(r=>setTimeout(r,60));}}catch(e){}
}
window.addEventListener('load',()=>setTimeout(()=>cachearTiles().catch(()=>{}),4000));
</script>
